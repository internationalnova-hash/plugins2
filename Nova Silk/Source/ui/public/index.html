<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Silk</title>
  <style>
    :root {
      --bg-1: #050a1b;
      --bg-2: #070f28;
      --bg-3: #020612;
      --panel: rgba(6, 12, 30, 0.9);
      --panel-strong: rgba(5, 10, 26, 0.96);
      --panel-edge: rgba(177, 151, 224, 0.28);
      --text-main: #ece8f4;
      --text-soft: #bda6dc;
      --text-muted: rgba(213, 201, 235, 0.7);
      --violet: #a56dff;
      --violet-soft: #c089ff;
      --gold: #f2c880;
      --gold-soft: #ffdca2;
      --violet-glow: rgba(175, 125, 255, 0.48);
      --gold-glow: rgba(245, 200, 126, 0.42);
      --ease: 250ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(1200px 540px at 15% 14%, rgba(70, 40, 132, 0.24), transparent 52%),
        radial-gradient(980px 420px at 74% 76%, rgba(241, 196, 122, 0.14), transparent 48%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      color: var(--text-main);
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .plugin {
      width: min(1536px, calc(100vw - 28px));
      height: min(940px, calc(100vh - 28px));
      border-radius: 28px;
      border: 1px solid rgba(164, 137, 221, 0.4);
      background:
        radial-gradient(1200px 600px at 48% 8%, rgba(14, 34, 86, 0.24), transparent 55%),
        radial-gradient(900px 420px at 80% 68%, rgba(72, 31, 120, 0.14), transparent 56%),
        linear-gradient(180deg, rgba(4, 9, 24, 0.99) 0%, rgba(2, 6, 18, 1) 100%);
      box-shadow:
        0 30px 84px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 0 0 1px rgba(148, 120, 205, 0.16),
        inset 0 -24px 56px rgba(20, 24, 54, 0.42);
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: 95px 1fr 310px 98px;
      gap: 0;
      padding: 0 22px 16px;
      min-width: 980px;
      min-height: 640px;
    }

    .plugin::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 22px;
      border: 1px solid rgba(228, 212, 255, 0.12);
      pointer-events: none;
    }

    .plugin::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 50% 48%, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.20) 100%);
      pointer-events: none;
    }

    .header {
      grid-row: 1;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 1px solid rgba(178, 151, 230, 0.22);
      padding: 14px 10px 10px;
      position: relative;
      z-index: 2;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-wrap {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      border: 1px solid rgba(208, 185, 255, 0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 32% 28%, rgba(255, 227, 178, 0.24), transparent 40%),
        linear-gradient(165deg, rgba(23, 21, 52, 0.95) 0%, rgba(5, 9, 24, 1) 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.26),
        0 14px 26px rgba(0, 0, 0, 0.32);
    }

    .logo-n {
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255, 201, 132, 0.35)) drop-shadow(0 0 16px rgba(255, 201, 132, 0.22));
    }

    .title-stack {
      display: flex;
      flex-direction: column;
      line-height: 0.95;
      gap: 6px;
    }

    .title-nova {
      font-size: clamp(14px, 1.1vw, 20px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
    }

    .title-silk {
      font-size: clamp(38px, 3.6vw, 72px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f2edf8;
      font-weight: 730;
    }

    .title-sub {
      margin-top: 3px;
      font-size: clamp(14px, 0.95vw, 22px);
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: #cfa3ff;
      font-weight: 550;
      text-shadow: 0 0 12px rgba(207, 163, 255, 0.28);
    }

    .top-center {
      justify-self: center;
      align-self: start;
      display: flex;
      align-items: center;
      border: 1px solid rgba(173, 142, 226, 0.34);
      border-radius: 17px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(8, 15, 36, 0.94), rgba(5, 10, 24, 0.97));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .top-center .presets-label {
      padding: 10px 20px;
      font-size: clamp(14px, 1vw, 20px);
      letter-spacing: 0.05em;
      color: var(--text-main);
      min-width: 134px;
      text-align: center;
    }

    .top-btn {
      width: 52px;
      height: 42px;
      border: none;
      border-left: 1px solid rgba(170, 142, 224, 0.25);
      background: transparent;
      color: #9c81d4;
      font-size: 34px;
      line-height: 1;
      padding-bottom: 7px;
      cursor: default;
      opacity: 0.86;
    }

    .top-right {
      justify-self: end;
      align-self: center;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .byline {
      font-family: "Snell Roundhand", "Apple Chancery", "URW Chancery L", "Brush Script MT", cursive;
      color: #e8bf7d;
      font-size: clamp(30px, 2.3vw, 46px);
      font-weight: 500;
      letter-spacing: 0.02em;
      white-space: nowrap;
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.12),
        0 0 16px rgba(240, 191, 120, 0.22);
    }

    .field-wrap {
      grid-row: 2;
      margin-top: 2px;
      border-radius: 26px;
      border: 1px solid rgba(189, 160, 236, 0.34);
      background: linear-gradient(180deg, rgba(7, 12, 31, 0.95), rgba(3, 8, 22, 0.95));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 -24px 42px rgba(7, 6, 24, 0.5),
        0 16px 30px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      position: relative;
      display: grid;
      grid-template-rows: 1fr 44px;
    }

    #silk-canvas {
      width: 100%;
      height: 100%;
      display: block;
      filter: saturate(1.08) contrast(1.03);
    }

    .field-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-top: 1px solid rgba(170, 145, 223, 0.2);
      background: linear-gradient(180deg, rgba(8, 13, 32, 0.84), rgba(6, 10, 25, 0.92));
      gap: 10px;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 34px;
      margin-left: auto;
      margin-right: 8px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: clamp(22px, 1.35vw, 28px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.78;
    }

    .legend-line {
      width: 34px;
      height: 4px;
      border-radius: 999px;
    }

    .legend-low { background: linear-gradient(90deg, #8e57e7, #be8cff); }
    .legend-mid { background: linear-gradient(90deg, #b97bf3, #d2a3ff); }
    .legend-high { background: linear-gradient(90deg, #f0cc86, #ffdca8); }

    .freq-labels {
      position: absolute;
      bottom: 44px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .freq-label {
      font-size: clamp(12px, 0.9vw, 20px);
      letter-spacing: 0.06em;
      color: rgba(233, 223, 250, 0.65);
      text-shadow: 0 0 6px rgba(33, 24, 61, 0.4);
    }

    .controls {
      grid-row: 3;
      margin-top: 14px;
      border-radius: 24px;
      border: 1px solid rgba(179, 149, 231, 0.32);
      background:
        radial-gradient(900px 320px at 50% 0%, rgba(31, 42, 86, 0.28), transparent 70%),
        linear-gradient(180deg, rgba(7, 12, 31, 0.92), rgba(3, 8, 21, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 -20px 36px rgba(7, 7, 24, 0.45);
      padding: 12px 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      gap: clamp(18px, 2vw, 34px);
    }

    .knob-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex: 1;
      max-width: 240px;
    }

    .knob-label {
      color: var(--gold);
      font-size: clamp(15px, 1.1vw, 26px);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      font-weight: 560;
    }

    .macro-knob {
      width: clamp(130px, 10vw, 182px);
      height: clamp(130px, 10vw, 182px);
      cursor: ns-resize;
      touch-action: none;
      user-select: none;
      position: relative;
      border-radius: 50%;
      filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.48)) drop-shadow(0 0 24px rgba(172, 116, 255, 0.18));
      transition: filter 150ms ease-out;
    }

    .macro-knob:hover {
      filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.52)) drop-shadow(0 0 28px rgba(172, 116, 255, 0.26));
    }

    .macro-knob svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .knob-value {
      min-width: 104px;
      text-align: center;
      font-size: clamp(24px, 1.6vw, 34px);
      color: #e8c487;
      letter-spacing: 0.04em;
      font-weight: 560;
      padding: 4px 14px;
      margin-top: -2px;
      border-radius: 999px;
      border: 1px solid rgba(177, 145, 227, 0.52);
      background: linear-gradient(180deg, rgba(11, 17, 40, 0.94), rgba(6, 11, 29, 0.94));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -5px 10px rgba(0, 0, 0, 0.32),
        0 0 8px rgba(170, 130, 240, 0.16);
      outline: none;
      cursor: text;
      transition: border-color var(--ease), box-shadow var(--ease), color var(--ease);
    }

    .knob-value:focus {
      border-color: rgba(223, 189, 255, 0.7);
      color: #f6d79c;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 0 16px rgba(198, 150, 255, 0.34);
    }

    .footer {
      grid-row: 4;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 10px;
    }

    .preset-bar {
      display: flex;
      gap: 13px;
      flex-wrap: nowrap;
      align-items: center;
    }

    .preset-btn {
      border: 1px solid rgba(152, 125, 206, 0.45);
      border-radius: 19px;
      background:
        linear-gradient(180deg, rgba(7, 14, 34, 0.95), rgba(4, 9, 24, 0.95));
      color: #b88af6;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: clamp(14px, 0.95vw, 22px);
      font-weight: 600;
      padding: 12px 24px;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--ease);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        0 8px 18px rgba(0, 0, 0, 0.28);
      white-space: nowrap;
    }

    .preset-btn:hover {
      border-color: rgba(197, 166, 248, 0.68);
      color: #e4c0ff;
    }

    .preset-btn.active {
      border-color: rgba(228, 196, 255, 0.76);
      color: #ffe3b4;
      background:
        radial-gradient(circle at 12% 50%, rgba(197, 136, 255, 0.3), transparent 58%),
        linear-gradient(90deg, rgba(101, 57, 173, 0.65) 0%, rgba(160, 102, 232, 0.4) 48%, rgba(236, 189, 116, 0.42) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.26),
        0 0 0 1px rgba(243, 212, 255, 0.3),
        0 0 18px rgba(183, 125, 255, 0.45),
        0 0 26px rgba(246, 201, 126, 0.25);
    }

    .magic-wrap {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-right: 4px;
      user-select: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 4px 8px;
      transition: box-shadow var(--ease), transform var(--ease);
    }

    .magic-label {
      color: #b995ee;
      text-transform: uppercase;
      letter-spacing: 0.36em;
      font-size: clamp(22px, 1.4vw, 30px);
      font-weight: 620;
      transition: color var(--ease), text-shadow var(--ease);
    }

    .magic-switch {
      width: 128px;
      height: 58px;
      border-radius: 999px;
      border: 1px solid rgba(170, 136, 222, 0.55);
      background: linear-gradient(180deg, rgba(11, 18, 44, 0.95), rgba(4, 10, 27, 0.95));
      position: relative;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        0 8px 18px rgba(0, 0, 0, 0.32);
      transition: all var(--ease);
      overflow: hidden;
    }

    .magic-switch::before,
    .magic-switch::after {
      content: "";
      position: absolute;
      top: 7px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      transition: all var(--ease);
    }

    .magic-switch::before {
      left: 8px;
      background:
        radial-gradient(circle at 34% 34%, rgba(255, 255, 255, 0.95), rgba(187, 133, 255, 0.88));
      box-shadow:
        0 0 12px rgba(177, 124, 255, 0.58),
        inset 0 -6px 10px rgba(71, 22, 140, 0.45);
      clip-path: polygon(50% 0%, 61% 36%, 100% 50%, 61% 64%, 50% 100%, 39% 64%, 0% 50%, 39% 36%);
    }

    .magic-switch::after {
      right: 8px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95), rgba(246, 197, 120, 0.92));
      box-shadow:
        0 0 14px rgba(244, 197, 121, 0.64),
        inset 0 -6px 10px rgba(130, 78, 18, 0.42);
      clip-path: polygon(50% 0%, 61% 36%, 100% 50%, 61% 64%, 50% 100%, 39% 64%, 0% 50%, 39% 36%);
    }

    .magic-wrap.on .magic-label {
      color: #f3ce91;
      text-shadow:
        0 0 12px rgba(241, 200, 130, 0.4),
        0 0 18px rgba(176, 124, 255, 0.32);
    }

    .magic-wrap.on .magic-switch {
      border-color: rgba(230, 193, 255, 0.7);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 0 22px rgba(180, 128, 255, 0.55),
        0 0 26px rgba(245, 200, 126, 0.36);
      animation: magicPulse 4.8s ease-in-out infinite, magicShimmer 5.4s ease-in-out infinite;
      background-size: 180% 100%;
      background-image:
        linear-gradient(120deg, rgba(11, 18, 44, 0.95) 0%, rgba(90, 48, 170, 0.28) 45%, rgba(245, 200, 126, 0.28) 58%, rgba(4, 10, 27, 0.95) 100%);
    }

    .magic-wrap.on {
      box-shadow:
        0 0 24px rgba(174, 125, 255, 0.12),
        0 0 36px rgba(245, 200, 126, 0.08);
      animation: magicAura 6.5s ease-in-out infinite;
    }

    .magic-wrap:hover .magic-switch {
      transform: scale(1.03);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        0 0 18px rgba(180, 128, 255, 0.38),
        0 0 24px rgba(245, 200, 126, 0.24);
    }

    .magic-wrap:hover .magic-label {
      color: #f3ce91;
    }

    @keyframes magicPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.02); }
    }

    @keyframes magicShimmer {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 0%; }
    }

    @keyframes magicAura {
      0%, 100% { box-shadow: 0 0 24px rgba(174, 125, 255, 0.10), 0 0 36px rgba(245, 200, 126, 0.07); }
      50% { box-shadow: 0 0 28px rgba(174, 125, 255, 0.14), 0 0 42px rgba(245, 200, 126, 0.11); }
    }

    .analyze-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid rgba(170, 142, 224, 0.32);
      background: linear-gradient(180deg, rgba(8, 15, 36, 0.84), rgba(5, 10, 24, 0.92));
      cursor: pointer;
      user-select: none;
      transition: all 200ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .analyze-wrap:hover {
      border-color: rgba(170, 142, 224, 0.52);
      box-shadow: 0 0 12px rgba(170, 142, 224, 0.18);
      background: linear-gradient(180deg, rgba(12, 20, 44, 0.88), rgba(8, 14, 32, 0.94));
    }

    .analyze-wrap.active {
      border-color: rgba(255, 200, 120, 0.64);
      background: linear-gradient(180deg, rgba(20, 18, 44, 0.92), rgba(12, 10, 28, 0.94));
      box-shadow: 0 0 18px rgba(255, 200, 120, 0.24);
    }

    .analyze-label {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9c81d4;
      font-weight: 560;
      transition: color 200ms ease-out;
    }

    .analyze-wrap.active .analyze-label {
      color: #f2c880;
      text-shadow: 0 0 8px rgba(242, 200, 128, 0.28);
    }

    @media (max-width: 1280px) {
      .plugin {
        min-width: 940px;
        min-height: 620px;
        grid-template-rows: 82px 1fr 278px 90px;
      }

      .logo-wrap {
        width: 60px;
        height: 60px;
      }

      .title-silk {
        font-size: clamp(34px, 3.2vw, 54px);
      }

      .top-center .presets-label {
        min-width: 110px;
      }

      .top-btn {
        width: 44px;
        height: 38px;
        font-size: 28px;
      }

      .legend-item {
        font-size: 24px;
      }

      .magic-switch {
        width: 108px;
        height: 50px;
      }

      .magic-switch::before,
      .magic-switch::after {
        top: 7px;
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="plugin">
    <header class="header">
      <div class="brand">
        <div class="logo-wrap">
          <img src="n_logo.png" alt="N" class="logo-n" />
        </div>
        <div class="title-stack">
          <span class="title-nova">NOVA</span>
          <span class="title-silk">SILK</span>
          <span class="title-sub">SPECTRAL REFINEMENT ENGINE</span>
        </div>
      </div>

      <div class="top-center" aria-hidden="true">
        <div class="presets-label">Presets</div>
        <button class="top-btn">&#x2039;</button>
        <button class="top-btn">&#x203A;</button>
        <button class="top-btn">&#x2212;</button>
        <button class="top-btn">&#x00D7;</button>
      </div>

      <div class="top-right">
        <span class="byline">by International Nova</span>
      </div>
    </header>

    <section class="field-wrap">
      <canvas id="silk-canvas"></canvas>

      <div class="freq-labels">
        <span class="freq-label">20 Hz</span>
        <span class="freq-label">100 Hz</span>
        <span class="freq-label">500 Hz</span>
        <span class="freq-label">1 kHz</span>
        <span class="freq-label">5 kHz</span>
        <span class="freq-label">10 kHz</span>
        <span class="freq-label">20 kHz</span>
      </div>

      <div class="field-meta">
        <div class="legend">
          <span class="legend-item"><span class="legend-line legend-low"></span>LOW</span>
          <span class="legend-item"><span class="legend-line legend-mid"></span>MID</span>
          <span class="legend-item"><span class="legend-line legend-high"></span>HIGH</span>
        </div>
      </div>
    </section>

    <section class="controls">
      <div class="knob-group">
        <span class="knob-label">SMOOTH</span>
        <div class="macro-knob" id="smooth-knob" data-param="smooth" data-default="42" tabindex="-1">
          <svg viewBox="0 0 152 152" aria-hidden="true">
            <defs>
              <radialGradient id="body-smooth" cx="34%" cy="28%" r="78%">
                <stop offset="0%" stop-color="#f2e6ff" stop-opacity="0.5"/>
                <stop offset="22%" stop-color="#31407f" stop-opacity="0.36"/>
                <stop offset="78%" stop-color="#0b122f" stop-opacity="0.96"/>
                <stop offset="100%" stop-color="#070d22" stop-opacity="1"/>
              </radialGradient>
              <linearGradient id="arc-smooth" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ac74ff"/>
                <stop offset="100%" stop-color="#f4ca84"/>
              </linearGradient>
            </defs>
