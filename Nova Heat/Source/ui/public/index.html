<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Heat</title>
  <style>
    :root {
      --face: #eed9bb;
      --face-rich: #e4cca8;
      --panel: #d7ba90;
      --text-main: #4a4036;
      --text-soft: #6f6253;
      --gold: #c68d1e;
      --amber: #c27612;
      --gold-pale: #e6bf67;
      --heat-copper: #a85c3b;
      --heat-copper-light: #c98561;
      --heat-copper-deep: #8f472a;
      --heat-copper-soft: #9d654d;
      --white: #fffaf4;
      --ease: 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #d9c29f 0%, #c9ac7f 100%);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      display: grid;
      place-items: center;
    }

    .plugin {
      position: relative;
      width: min(980px, 100vw);
      height: min(620px, 100vh);
      border-radius: 34px;
      background: linear-gradient(180deg, var(--face) 0%, var(--face-rich) 100%);
      border: 1px solid rgba(194, 148, 77, 0.76);
      box-shadow:
        0 22px 46px rgba(92, 70, 40, 0.15),
        inset 0 1px 0 rgba(255,255,255,0.72),
        inset 0 -10px 18px rgba(177, 114, 32, 0.14);
      overflow: hidden;
    }

    .plugin::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent 14%);
      pointer-events: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 34px 42px 18px;
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-size: 56px;
      line-height: 1;
      letter-spacing: 0.01em;
      color: #2f241c;
    }

    .title .heat-word {
      background: linear-gradient(180deg, #be7754 0%, var(--heat-copper) 44%, #864126 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.30),
        0 2px 5px rgba(110, 63, 35, 0.12);
    }

    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      letter-spacing: 0.20em;
      color: var(--text-soft);
    }

    .descriptor {
      margin-top: 2px;
      font-family: "Snell Roundhand", "Apple Chancery", "URW Chancery L", "Brush Script MT", cursive;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--heat-copper-soft);
      text-align: right;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.42),
        0 2px 3px rgba(126, 98, 62, 0.10);
    }

    .inner-panel {
      position: absolute;
      left: 26px;
      right: 26px;
      top: 118px;
      bottom: 94px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(216, 186, 145, 0.98) 0%, rgba(198, 164, 118, 0.91) 100%);
      border: 1px solid rgba(177, 131, 61, 0.56);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.42),
        inset 0 -14px 22px rgba(128,94,52,0.11),
        0 8px 16px rgba(104, 77, 43, 0.06);
      padding: 22px 22px 18px;
    }

    .sections {
      display: grid;
      grid-template-columns: 1fr 1.15fr 0.9fr;
      gap: 16px;
      height: 100%;
    }

    .section {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      padding: 16px 14px 14px;
      background: linear-gradient(180deg, rgba(252, 243, 231, 0.74) 0%, rgba(231, 209, 177, 0.58) 100%);
      border: 1px solid rgba(181, 132, 62, 0.46);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.44),
        inset 0 -10px 14px rgba(138, 98, 52, 0.08),
        0 6px 10px rgba(106, 78, 43, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .section-title {
      align-self: stretch;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.26em;
      color: #3e3127;
      text-align: left;
    }

    .curve-buttons,
    .preset-buttons {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .curve-buttons {
      margin-bottom: 6px;
    }

    .curve-buttons button,
    .preset-buttons button {
      border: 1px solid rgba(191, 160, 116, 0.52);
      background: linear-gradient(180deg, rgba(255, 252, 248, 0.94) 0%, rgba(244, 234, 219, 0.92) 100%);
      color: #655847;
      cursor: pointer;
      transition: all var(--ease);
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .curve-buttons button {
      flex: 1;
      padding: 10px 0;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      box-shadow: 0 4px 10px rgba(108, 80, 46, 0.06);
    }

    .curve-buttons button.active,
    .preset-buttons button.active {
      background: linear-gradient(180deg, #efc671 0%, #c97e27 100%);
      color: #fffaf4;
      border-color: #a8681d;
      box-shadow: 0 8px 14px rgba(184, 117, 28, 0.22);
    }

    .dual-knobs {
      display: flex;
      justify-content: center;
      align-items: end;
      gap: 14px;
      width: 100%;
      flex: 1;
    }

    .knob-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 92px;
    }

    .knob-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--text-soft);
      text-align: center;
    }

    .knob {
      position: relative;
      width: 98px;
      height: 98px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.88) 0%, rgba(255,255,255,0.30) 20%, transparent 34%),
        repeating-conic-gradient(from 0deg, rgba(255,255,255,0.14) 0deg 11deg, rgba(173, 140, 92, 0.10) 11deg 22deg),
        linear-gradient(145deg, #fbf4ea 0%, #eadcc8 45%, #d6bb93 100%);
      border: 1px solid rgba(186, 150, 98, 0.92);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        inset 0 -12px 20px rgba(154, 118, 70, 0.14),
        0 12px 18px rgba(109, 83, 48, 0.12);
      cursor: ns-resize;
      user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .knob.dragging {
      transform: scale(0.995);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        inset 0 -12px 20px rgba(154, 118, 70, 0.18),
        0 14px 22px rgba(124, 79, 34, 0.16);
    }

    .knob.drive-focus {
      width: 110px;
      height: 110px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        inset 0 -13px 22px rgba(160, 113, 54, 0.16),
        0 14px 22px rgba(130, 92, 42, 0.14);
    }

    .knob.hero {
      width: 122px;
      height: 122px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        inset 0 -14px 24px rgba(170, 104, 28, 0.18),
        0 16px 24px rgba(168, 105, 28, 0.16);
    }

    .knob::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 14px;
      width: 7px;
      height: 26px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, #fff1d8 0%, var(--heat-copper-light) 48%, var(--heat-copper-deep) 100%);
      box-shadow: 0 0 0 1px rgba(255, 249, 239, 0.52), 0 2px 6px rgba(132, 81, 44, 0.20);
    }

    .arc {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      transform: rotate(var(--turn, -42deg));
    }

    .arc::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 218deg, rgba(230,216,188,0.82) 0deg 26deg, var(--gold-pale) 26deg 74deg, var(--gold) 74deg 112deg, transparent 112deg 360deg);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
    }

    .hero .arc::before {
      background: conic-gradient(from 218deg, rgba(239,214,162,0.88) 0deg 24deg, #efc671 24deg 70deg, var(--amber) 70deg 118deg, transparent 118deg 360deg);
    }

    .readout {
      min-width: 82px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(193, 158, 107, 0.46);
      background: linear-gradient(180deg, rgba(255,252,247,0.96) 0%, rgba(239,228,212,0.96) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 4px 10px rgba(110,84,48,0.06);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #2f241c;
      text-align: center;
    }

    .mix-strip {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 251, 246, 0.56);
      border: 1px solid rgba(197,171,131,0.34);
    }

    .mix-strip label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    #mix-value {
      padding: 4px 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,250,243,0.96) 0%, rgba(240,226,205,0.98) 100%);
      border: 1px solid rgba(193, 158, 107, 0.42);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 4px 8px rgba(109, 83, 48, 0.08);
      font-size: 14px;
      color: #3a2c21;
      letter-spacing: 0.06em;
      min-width: 58px;
      text-align: center;
    }

    .mix-strip input {
      width: 100%;
      accent-color: var(--amber);
    }

    .output-layout {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      width: 100%;
      align-items: center;
      flex: 1;
    }

    .meter {
      width: 28px;
      height: 186px;
      border-radius: 15px;
      padding: 8px 6px;
      background: linear-gradient(180deg, rgba(255, 251, 246, 0.92) 0%, rgba(238, 224, 204, 0.82) 100%);
      border: 1px solid rgba(197,171,131,0.48);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.7),
        0 6px 14px rgba(136, 96, 34, 0.08),
        0 0 18px rgba(216, 138, 43, 0.08);
      display: flex;
      flex-direction: column-reverse;
      justify-content: space-between;
      gap: 4px;
    }

    .meter-bar {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(202,181,143,0.70) 0%, rgba(182,158,122,0.40) 100%);
    }

    .meter-bar.active {
      background: linear-gradient(180deg, #f1c989 0%, #c9783f 100%);
      box-shadow: 0 0 12px rgba(184, 106, 74, 0.28);
    }

    .meter-bar.hot {
      background: linear-gradient(180deg, #f1b199 0%, #b95531 100%);
      box-shadow: 0 0 14px rgba(169, 83, 53, 0.36);
    }

    .footer {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 18px;
    }

    .output-magic {
      margin-top: 18px;
      padding-bottom: 2px;
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      width: 100%;
    }

    .magic-button {
      min-width: 132px;
      height: 34px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(186, 136, 78, 0.56);
      background: linear-gradient(180deg, rgba(255,251,246,0.98) 0%, rgba(242,228,212,0.96) 100%);
      color: #6c5841;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.22em;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.82),
        0 6px 12px rgba(109,84,48,0.08),
        0 0 10px rgba(184, 106, 74, 0.05);
      transition: all var(--ease);
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .magic-button.active {
      background: linear-gradient(180deg, #efd59a 0%, #ca8845 100%);
      color: #fffaf4;
      border-color: #aa6f33;
      box-shadow:
        0 0 0 1px rgba(255, 244, 218, 0.56),
        0 0 22px rgba(184, 106, 74, 0.22),
        0 10px 18px rgba(165, 103, 47, 0.18);
    }

    .plugin.magic-on .meter-bar.active {
      box-shadow: 0 0 16px rgba(184, 106, 74, 0.30);
    }

    .plugin.magic-on .descriptor {
      color: #b26a4a;
    }

    .preset-buttons button {
      flex: 1;
      height: 44px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.16em;
    }
  </style>
</head>
<body>
  <div class="plugin">
    <div class="header">
      <div>
        <h1 class="title">NOVA <span class="heat-word">HEAT</span></h1>
        <div class="subtitle">HARMONIC SATURATION ENGINE</div>
      </div>
      <div class="descriptor">by International Nova</div>
    </div>

    <div class="inner-panel">
      <div class="sections">
        <section class="section">
          <div class="section-title">INPUT DRIVE</div>
          <div class="curve-buttons">
            <button data-mode="SOFT">SOFT</button>
            <button class="active" data-mode="MEDIUM">MEDIUM</button>
            <button data-mode="HARD">HARD</button>
          </div>
          <div class="dual-knobs">
            <div class="knob-wrap">
              <div class="knob-label">DRIVE</div>
              <div class="knob drive-focus" data-param="drive" data-min="0" data-max="10">
                <div class="arc"></div>
              </div>
              <div class="readout" data-readout="drive">+4.8 dB</div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-title">TONE SHAPING</div>
          <div class="dual-knobs">
            <div class="knob-wrap">
              <div class="knob-label">TONE</div>
              <div class="knob" data-param="tone" data-min="0" data-max="10">
                <div class="arc"></div>
              </div>
              <div class="readout" data-readout="tone">+0.0</div>
            </div>
            <div class="knob-wrap">
              <div class="knob-label">HEAT</div>
              <div class="knob hero" data-param="heat" data-min="0" data-max="10">
                <div class="arc"></div>
              </div>
              <div class="readout" data-readout="heat">2.5</div>
            </div>
          </div>
          <div class="mix-strip">
            <label><span>MIX</span><span id="mix-value">18%</span></label>
            <input id="mix-slider" data-param="mix" type="range" min="0" max="100" value="18" />
          </div>
        </section>

        <section class="section">
          <div class="section-title">OUTPUT</div>
          <div class="output-layout">
            <div class="knob-wrap">
              <div class="knob-label">MAKEUP GAIN</div>
              <div class="knob" data-param="output_gain" data-min="-12" data-max="12">
                <div class="arc"></div>
              </div>
              <div class="readout" data-readout="output_gain">+0.0 dB</div>
            </div>
            <div class="meter" id="output-meter" aria-hidden="true">
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
            </div>
          </div>
          <div class="output-magic">
            <button id="magic-toggle" class="magic-button" type="button" aria-pressed="false">MAGIC</button>
          </div>
        </section>
      </div>
    </div>

    <div class="footer">
      <div class="preset-buttons">
        <button data-preset="VOCAL">VOCAL</button>
        <button data-preset="DRUMS">DRUMS</button>
        <button data-preset="BASS">BASS</button>
        <button data-preset="MASTER">MASTER</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const modeNames = ["SOFT", "MEDIUM", "HARD"];
      const parameterStates = {};
      const currentValues = {
        drive: 2.0,
        tone: 5.0,
        heat: 2.5,
        mix: 18.0,
        output_gain: 0.0,
        character_mode: "MEDIUM",
        magic_mode: false
      };

      const presets = {
        VOCAL: { mode: "MEDIUM", drive: 4.2, heat: 5.0, tone: 5.6, mix: 28, output_gain: -0.8, magic: true },
        DRUMS: { mode: "HARD", drive: 5.8, heat: 6.5, tone: 4.8, mix: 35, output_gain: -1.5, magic: true },
        BASS: { mode: "MEDIUM", drive: 5.0, heat: 5.8, tone: 3.8, mix: 32, output_gain: -1.2, magic: false },
        MASTER: { mode: "SOFT", drive: 2.8, heat: 3.2, tone: 5.0, mix: 18, output_gain: 0.0, magic: false }
      };

      let juceAvailable = false;
      let activeDrag = null;
      let isApplyingPreset = false;

      function clamp(value, min, max) {
        const lo = typeof min === "number" ? min : 0;
        const hi = typeof max === "number" ? max : 1;
        return Math.min(hi, Math.max(lo, Number(value) || 0));
      }

      function createListenerList() {
        return {
          listeners: [],
          addListener(fn) {
            this.listeners.push(fn);
            return this.listeners.length - 1;
          },
          callListeners(payload) {
            this.listeners.forEach((listener) => listener(payload));
          }
        };
      }

      function createSliderState(name) {
        if (!juceAvailable || !window.__JUCE__ || !window.__JUCE__.backend) return null;

        const backend = window.__JUCE__.backend;
        const state = {
          name,
          identifier: "__juce__slider" + name,
          scaledValue: 0,
          properties: {
            start: 0,
            end: 1,
            skew: 1,
            interval: 0,
            numSteps: 100
          },
          valueChangedEvent: createListenerList(),
          getNormalisedValue() {
            const start = typeof this.properties.start === "number" ? this.properties.start : 0;
            const end = typeof this.properties.end === "number" ? this.properties.end : 1;
            const range = end - start;
            if (range === 0) return 0;
            return clamp((this.scaledValue - start) / range, 0, 1);
          },
          setNormalisedValue(newValue) {
            const normalised = clamp(newValue, 0, 1);
            const start = typeof this.properties.start === "number" ? this.properties.start : 0;
            const end = typeof this.properties.end === "number" ? this.properties.end : 1;
            const interval = typeof this.properties.interval === "number" ? this.properties.interval : 0;
            let scaled = start + (normalised * (end - start));

            if (interval > 0)
              scaled = Math.round(scaled / interval) * interval;

            this.scaledValue = scaled;
            backend.emitEvent(this.identifier, { eventType: "valueChanged", value: scaled });
          },
          sliderDragStarted() {
            backend.emitEvent(this.identifier, { eventType: "sliderDragStarted" });
          },
          sliderDragEnded() {
            backend.emitEvent(this.identifier, { eventType: "sliderDragEnded" });
          }
        };

        backend.addEventListener(state.identifier, function (event) {
          if (!event) return;

          if (event.eventType === "valueChanged") {
            if (typeof event.value === "number")
              state.scaledValue = event.value;

            state.valueChangedEvent.callListeners(event);
          }

          if (event.eventType === "propertiesChanged") {
            const nextProps = {};
            Object.keys(event).forEach((key) => {
              if (key !== "eventType") nextProps[key] = event[key];
            });
            state.properties = nextProps;
          }
        });

        backend.emitEvent(state.identifier, { eventType: "requestInitialUpdate" });
        return state;
      }

      function getNormalisedValue(paramId, value) {
        const numeric = Number(value) || 0;

        switch (paramId) {
          case "mix":
            return clamp(numeric / 100, 0, 1);
          case "output_gain":
            return clamp((numeric + 12) / 24, 0, 1);
          case "character_mode": {
            const index = Math.max(0, modeNames.indexOf(String(value)));
            return modeNames.length <= 1 ? 0 : index / (modeNames.length - 1);
          }
          case "magic_mode":
            return value ? 1 : 0;
          default:
            return clamp(numeric / 10, 0, 1);
        }
      }

      function getActualValue(paramId, normalised) {
        const value = clamp(normalised, 0, 1);

        switch (paramId) {
          case "mix": return value * 100;
          case "output_gain": return -12 + (value * 24);
          case "character_mode": return modeNames[Math.round(value * (modeNames.length - 1))] || "MEDIUM";
          case "magic_mode": return value >= 0.5;
          default: return value * 10;
        }
      }

      function formatValue(paramId, value) {
        const numeric = Number(value) || 0;

        if (paramId === "drive") {
          const driveDb = (numeric / 10) * 24;
          const sign = driveDb >= 0 ? "+" : "";
          return sign + driveDb.toFixed(1) + " dB";
        }

        if (paramId === "tone") {
          const tiltDb = -4 + ((numeric / 10) * 8);
          const sign = tiltDb >= 0 ? "+" : "";
          return sign + tiltDb.toFixed(1);
        }

        if (paramId === "output_gain") {
          const sign = numeric >= 0 ? "+" : "";
          return sign + numeric.toFixed(1) + " dB";
        }

        if (paramId === "mix")
          return Math.round(numeric) + "%";

        return numeric.toFixed(1);
      }

      function setPresetButtons(activePreset) {
        document.querySelectorAll(".preset-buttons button").forEach((button) => {
          button.classList.toggle("active", button.dataset.preset === activePreset);
        });
      }

      function setModeVisual(mode) {
        currentValues.character_mode = mode;
        document.querySelectorAll(".curve-buttons button").forEach((button) => {
          button.classList.toggle("active", button.dataset.mode === mode);
        });
      }

      function setMagicVisual(isOn) {
        currentValues.magic_mode = !!isOn;
        const button = document.getElementById("magic-toggle");
        const plugin = document.querySelector(".plugin");
        button.classList.toggle("active", !!isOn);
        button.setAttribute("aria-pressed", String(!!isOn));
        plugin.classList.toggle("magic-on", !!isOn);
      }

      function updateKnobVisual(paramId, value) {
        currentValues[paramId] = value;
        const knob = document.querySelector(`.knob[data-param="${paramId}"]`);
        if (!knob) return;

        const min = Number(knob.dataset.min);
        const max = Number(knob.dataset.max);
        const safeValue = clamp(value, min, max);
        const arc = knob.querySelector(".arc");
        const normal = (safeValue - min) / ((max - min) || 1);
        const rotation = -42 + (normal * 210);
        if (arc) arc.style.setProperty("--turn", rotation + "deg");

        const readout = document.querySelector(`[data-readout="${paramId}"]`);
        if (readout) readout.textContent = formatValue(paramId, safeValue);
      }

      function pushToBackend(paramId, value, useGesture) {
        const state = parameterStates[paramId];
        if (!state) return;

        try {
          if (useGesture) state.sliderDragStarted();
          state.setNormalisedValue(getNormalisedValue(paramId, value));
          if (useGesture) state.sliderDragEnded();
        } catch (error) {
          console.warn("Failed to update " + paramId + ":", error && error.message ? error.message : error);
        }
      }

      function setParamValue(paramId, value, options) {
        const settings = options || {};

        if (paramId === "magic_mode") {
          setMagicVisual(!!value);
        } else if (paramId === "character_mode") {
          setModeVisual(String(value));
        } else if (paramId === "mix") {
          currentValues.mix = clamp(value, 0, 100);
          const slider = document.getElementById("mix-slider");
          const mixValue = document.getElementById("mix-value");
          if (slider) slider.value = String(Math.round(currentValues.mix));
          if (mixValue) mixValue.textContent = formatValue("mix", currentValues.mix);
        } else {
          updateKnobVisual(paramId, value);
        }

        if (settings.pushToBackend)
          pushToBackend(paramId, value, !!settings.useGesture);
      }

      function applyPreset(name, pushValues) {
        const preset = presets[name];
        if (!preset || isApplyingPreset) return;

        isApplyingPreset = true;
        setPresetButtons(name);
        setParamValue("character_mode", preset.mode, { pushToBackend: pushValues });
        setParamValue("drive", preset.drive, { pushToBackend: pushValues });
        setParamValue("tone", preset.tone, { pushToBackend: pushValues });
        setParamValue("heat", preset.heat, { pushToBackend: pushValues });
        setParamValue("mix", preset.mix, { pushToBackend: pushValues });
        setParamValue("output_gain", preset.output_gain, { pushToBackend: pushValues });
        setParamValue("magic_mode", !!preset.magic, { pushToBackend: pushValues });
        isApplyingPreset = false;
      }

      function getClientY(event) {
        if (!event) return 0;
        if (event.touches && event.touches.length > 0) return event.touches[0].clientY;
        if (event.changedTouches && event.changedTouches.length > 0) return event.changedTouches[0].clientY;
        return typeof event.clientY === "number" ? event.clientY : 0;
      }

      function startKnobDrag(knob, event) {
        if (typeof event.button === "number" && event.button !== 0) return;
        if (event.preventDefault) event.preventDefault();
        if (event.stopPropagation) event.stopPropagation();

        const paramId = knob.dataset.param;
        const min = Number(knob.dataset.min);
        const max = Number(knob.dataset.max);

        knob.classList.add("dragging");
        activeDrag = {
          paramId,
          knob,
          min,
          max,
          startY: getClientY(event),
          startValue: Number(currentValues[paramId] || knob.dataset.min || 0),
          pointerId: typeof event.pointerId !== "undefined" ? event.pointerId : null
        };

        if (typeof knob.setPointerCapture === "function" && typeof event.pointerId !== "undefined") {
          try {
            knob.setPointerCapture(event.pointerId);
          } catch (error) {
            console.warn(error && error.message ? error.message : error);
          }
        }

        if (parameterStates[paramId]) {
          try { parameterStates[paramId].sliderDragStarted(); } catch (error) { console.warn(error); }
        }
      }

      function updateActiveDrag(event) {
        if (!activeDrag) return;
        if (activeDrag.pointerId !== null && typeof event.pointerId !== "undefined" && event.pointerId !== activeDrag.pointerId) return;
        if (event.preventDefault) event.preventDefault();

        const delta = activeDrag.startY - getClientY(event);
        const nextValue = activeDrag.startValue + delta * ((activeDrag.max - activeDrag.min) / 220);
        setParamValue(activeDrag.paramId, clamp(nextValue, activeDrag.min, activeDrag.max), { pushToBackend: true });
      }

      function finishActiveDrag(event) {
        if (!activeDrag) return;
        if (activeDrag.pointerId !== null && event && typeof event.pointerId !== "undefined" && event.pointerId !== activeDrag.pointerId) return;

        if (parameterStates[activeDrag.paramId]) {
          try { parameterStates[activeDrag.paramId].sliderDragEnded(); } catch (error) { console.warn(error); }
        }

        if (typeof activeDrag.knob.releasePointerCapture === "function" && activeDrag.pointerId !== null) {
          try { activeDrag.knob.releasePointerCapture(activeDrag.pointerId); } catch (error) { console.warn(error); }
        }

        activeDrag.knob.classList.remove("dragging");
        activeDrag = null;
      }

      function initKnobs() {
        document.querySelectorAll(".knob[data-param]").forEach((knob) => {
          const startHandler = (event) => startKnobDrag(knob, event);
          knob.addEventListener("pointerdown", startHandler);
          knob.addEventListener("mousedown", startHandler);
          knob.addEventListener("touchstart", startHandler, { passive: false });
        });

        document.addEventListener("pointermove", updateActiveDrag);
        document.addEventListener("mousemove", updateActiveDrag);
        document.addEventListener("touchmove", updateActiveDrag, { passive: false });
        document.addEventListener("pointerup", finishActiveDrag);
        document.addEventListener("mouseup", finishActiveDrag);
        document.addEventListener("touchend", finishActiveDrag);
        document.addEventListener("pointercancel", finishActiveDrag);
        document.addEventListener("touchcancel", finishActiveDrag);
      }

      function initButtons() {
        document.querySelectorAll(".curve-buttons button").forEach((button) => {
          const handler = (event) => {
            if (event.preventDefault) event.preventDefault();
            setPresetButtons(null);
            setParamValue("character_mode", button.dataset.mode, { pushToBackend: true, useGesture: true });
          };

          button.addEventListener("click", handler);
          button.addEventListener("touchend", handler);
        });

        document.querySelectorAll(".preset-buttons button").forEach((button) => {
          const handler = (event) => {
            if (event.preventDefault) event.preventDefault();
            applyPreset(button.dataset.preset, true);
          };

          button.addEventListener("click", handler);
          button.addEventListener("touchend", handler);
        });

        const magicButton = document.getElementById("magic-toggle");
        const toggleMagic = (event) => {
          if (event.preventDefault) event.preventDefault();
          setPresetButtons(null);
          setParamValue("magic_mode", !currentValues.magic_mode, { pushToBackend: true, useGesture: true });
        };

        magicButton.addEventListener("click", toggleMagic);
        magicButton.addEventListener("touchend", toggleMagic);
      }

      function initMixSlider() {
        const mixSlider = document.getElementById("mix-slider");
        mixSlider.addEventListener("input", () => {
          setPresetButtons(null);
          setParamValue("mix", Number(mixSlider.value), { pushToBackend: true });
        });
      }

      function initParameterStates() {
        ["drive", "tone", "heat", "mix", "output_gain", "character_mode", "magic_mode"].forEach((paramId) => {
          parameterStates[paramId] = createSliderState(paramId);
        });

        ["drive", "tone", "heat", "mix", "output_gain"].forEach((paramId) => {
          const state = parameterStates[paramId];
          if (!state || !state.valueChangedEvent) return;

          state.valueChangedEvent.addListener(() => {
            setParamValue(paramId, getActualValue(paramId, state.getNormalisedValue()), { pushToBackend: false });
          });
        });

        const modeState = parameterStates.character_mode;
        if (modeState && modeState.valueChangedEvent) {
          modeState.valueChangedEvent.addListener(() => {
            setParamValue("character_mode", getActualValue("character_mode", modeState.getNormalisedValue()), { pushToBackend: false });
          });
        }

        const magicState = parameterStates.magic_mode;
        if (magicState && magicState.valueChangedEvent) {
          magicState.valueChangedEvent.addListener(() => {
            setParamValue("magic_mode", getActualValue("magic_mode", magicState.getNormalisedValue()), { pushToBackend: false });
          });
        }

        window.setTimeout(() => {
          ["drive", "tone", "heat", "mix", "output_gain"].forEach((paramId) => {
            const state = parameterStates[paramId];
            if (state) {
              setParamValue(paramId, getActualValue(paramId, state.getNormalisedValue()), { pushToBackend: false });
            }
          });

          if (parameterStates.character_mode) {
            setParamValue("character_mode", getActualValue("character_mode", parameterStates.character_mode.getNormalisedValue()), { pushToBackend: false });
          }

          if (parameterStates.magic_mode) {
            setParamValue("magic_mode", getActualValue("magic_mode", parameterStates.magic_mode.getNormalisedValue()), { pushToBackend: false });
          }
        }, 60);
      }

      window.updateOutputMeter = function (level, isHot) {
        const safeLevel = clamp(Number(level) || 0, 0, 1);
        const bars = Array.from(document.querySelectorAll("#output-meter .meter-bar"));
        const activeCount = Math.round(safeLevel * bars.length);

        bars.forEach((bar, index) => {
          const shouldBeActive = index < activeCount;
          bar.classList.toggle("active", shouldBeActive);
          bar.classList.toggle("hot", shouldBeActive && !!isHot && index >= bars.length - 2);
        });
      };

      function bootUi() {
        juceAvailable = !!(window.__JUCE__ && window.__JUCE__.backend && typeof window.__JUCE__.backend.emitEvent === "function");

        initKnobs();
        initButtons();
        initMixSlider();

        setParamValue("drive", currentValues.drive, { pushToBackend: false });
        setParamValue("tone", currentValues.tone, { pushToBackend: false });
        setParamValue("heat", currentValues.heat, { pushToBackend: false });
        setParamValue("mix", currentValues.mix, { pushToBackend: false });
        setParamValue("output_gain", currentValues.output_gain, { pushToBackend: false });
        setParamValue("character_mode", currentValues.character_mode, { pushToBackend: false });
        setParamValue("magic_mode", currentValues.magic_mode, { pushToBackend: false });
        updateOutputMeter(0.0, false);

        if (juceAvailable) {
          try {
            initParameterStates();
          } catch (error) {
            juceAvailable = false;
            console.warn("Parameter sync unavailable, keeping local UI active:", error && error.message ? error.message : error);
          }
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", bootUi, { once: true });
      } else {
        bootUi();
      }
    }());
  </script>
</body>
</html>
