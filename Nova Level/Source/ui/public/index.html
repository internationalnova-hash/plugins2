<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Level</title>
  <style>
    :root {
      --bg-dark: #060b12;
      --bg-mid: #0f1a2a;
      --panel-top: #102238;
      --panel-bottom: #0a1220;
      --accent: #ff9836;
      --accent-bright: #ffb85a;
      --accent-mid: #ff9430;
      --accent-dark: #d96900;
      --accent-deep: #ff6a00;
      --accent-soft: #ffb766;
      --accent-glow: rgba(255,154,60,0.42);
      --accent-glow-strong: rgba(255,106,0,0.62);
      --text-main: #eaeaea;
      --text-soft: #8a8f98;
      --text-dim: #c4b9ab;
      --ease: 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%;
      overflow: hidden;
      background:
        radial-gradient(120% 80% at 50% -10%, #101f34 0%, #070c14 56%, #04070d 100%),
        linear-gradient(180deg, #070c13 0%, #03060a 100%);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
    }
    body { display: grid; place-items: center; }

    .nova-header {
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 0; position: relative; min-height: 52px; padding: 0; z-index: 10;
    }
    .nova-logo-container {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; margin-left: -6px; border-radius: 8px;
      background: rgba(255,154,60,0.10);
      box-shadow: 0 0 12px rgba(255,154,60,0.18);
    }
    .nova-logo {
      width: 28px; height: 28px; object-fit: contain;
      filter: brightness(1.1) saturate(1.1); opacity: 0.92;
    }
    .nova-title-nova {
      font-size: 20px;
      font-family: "Iowan Old Style","Palatino Linotype",Georgia,serif;
      font-weight: 700; letter-spacing: 0.13em;
      color: var(--text-soft); margin: 0 0 1px 0; padding: 0;
    }
    .nova-title-master {
      font-size: 26px;
      font-family: "Iowan Old Style","Palatino Linotype",Georgia,serif;
      font-weight: 950; letter-spacing: 0.04em;
      color: var(--text-main); margin: 0; padding: 0; line-height: 1.0;
    }

    .plugin {
      position: relative;
      width: min(980px, 100vw); height: min(620px, 100vh);
      border-radius: 30px; overflow: hidden;
      background:
        repeating-linear-gradient(90deg, rgba(22,43,68,0.02) 0px, rgba(22,43,68,0.02) 1px, transparent 1px, transparent 13px),
        linear-gradient(180deg, #0a1423 0%, #08111d 44%, #060d17 100%);
      border: 1px solid rgba(129, 160, 196, 0.24);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 28px 56px rgba(0,0,0,0.72),
        inset 0 1px 0 rgba(183, 212, 255, 0.14),
        inset 0 -1px 0 rgba(0,0,0,0.52);
    }
    .plugin::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit;
      background:
        radial-gradient(ellipse 90% 48% at 50% 2%, rgba(39, 93, 150, 0.22) 0%, transparent 64%),
        radial-gradient(ellipse 100% 66% at 50% 100%, rgba(0,0,0,0.36) 0%, transparent 70%);
      pointer-events: none;
    }
    .plugin::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 120px rgba(0,0,0,0.54);
      pointer-events: none;
    }

    .tagline {
      text-align: right; margin-top: 4px;
      font-family: "Snell Roundhand", "Apple Chancery", "URW Chancery L", "Brush Script MT", cursive;
      font-size: 22px; font-weight: 500; letter-spacing: 0.03em;
      color: var(--accent-soft);
      text-shadow: 0 0 14px rgba(255,154,60,0.20);
      opacity: 0.95;
    }

    .inner-panel {
      position: absolute; left: 18px; right: 18px; top: 104px; bottom: 82px;
      border-radius: 26px; padding: 18px 18px 14px;
      background:
        repeating-linear-gradient(90deg, rgba(25,58,92,0.02) 0px, rgba(25,58,92,0.02) 1px, transparent 1px, transparent 14px),
        linear-gradient(180deg, rgba(17,36,58,0.96) 0%, rgba(11,22,37,0.95) 58%, rgba(8,16,27,0.97) 100%);
      border: 1px solid rgba(148, 178, 210, 0.35);
      box-shadow:
        inset 0 1px 0 rgba(201,223,252,0.18),
        inset 0 -1px 0 rgba(0,0,0,0.44),
        inset 0 0 120px rgba(12, 26, 45, 0.46),
        0 8px 24px rgba(0,0,0,0.36);
      position: absolute;
      overflow: hidden;
    }
    .inner-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 43% 42%, rgba(255,154,60,0.09) 0%, rgba(255,154,60,0.03) 30%, transparent 62%);
    }

    .layout {
      display: grid;
      grid-template-columns: 0.84fr 1.16fr 1fr;
      grid-template-rows: 1fr;
      height: 100%; column-gap: 14px; align-items: center;
    }
    .tone-zone, .hero-zone, .output-zone {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .tone-zone   { grid-column: 1; padding-left: 6px; }
    .hero-zone   { grid-column: 2; padding-top: 0; }
    .output-zone { grid-column: 3; gap: 12px; padding-right: 4px; position: relative; }
    .output-top  { display: flex; align-items: flex-end; gap: 14px; }
    .meter-stack { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 2px; }
    .output-zone::before {
      content: "";
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 1px;
      background: linear-gradient(180deg, transparent 0%, rgba(124,152,184,0.52) 6%, rgba(70,95,126,0.38) 92%, transparent 100%);
      opacity: 0.7;
    }

    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
      color: #f0f2f5; text-align: center; margin-bottom: 8px;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0,0,0,0.38);
    }
    .section-sub {
      margin-top: -2px; margin-bottom: 10px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--accent); text-transform: uppercase; text-align: center;
    }

    .knob-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 120px;
    }
    .hero-zone .knob-wrap { min-width: 200px; gap: 6px; }

    .knob {
      position: relative; border-radius: 50%;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.03) 24%, transparent 56%),
        radial-gradient(circle at 70% 78%, rgba(0,0,0,0.48) 0%, transparent 45%),
        repeating-conic-gradient(from 0deg, rgba(190,214,238,0.012) 0deg 12deg, rgba(7,14,24,0.10) 12deg 24deg),
        radial-gradient(circle at 50% 50%, rgba(126,155,190,0.20) 0%, transparent 28%),
        linear-gradient(145deg, #2f425a 0%, #152438 42%, #08111e 100%);
      border: 1px solid rgba(170,199,232,0.42);
      box-shadow:
        inset 0 1px 2px rgba(224,239,255,0.42),
        inset 0 -16px 20px rgba(0,0,0,0.52),
        0 0 0 2px rgba(8,14,24,0.90),
        0 0 0 3px rgba(132,160,194,0.25),
        0 12px 24px rgba(0,0,0,0.56),
        8px 14px 20px -8px rgba(255,154,60,0.10);
      cursor: ns-resize; user-select: none; touch-action: none;
    }
    .knob.medium { width: 108px; height: 108px; }
    .knob.hero {
      width: 204px; height: 204px;
      box-shadow:
        inset 0 1px 2px rgba(230,242,255,0.48),
        inset 0 -20px 24px rgba(0,0,0,0.54),
        0 0 0 12px rgba(3,8,13,0.48),
        0 8px 18px -10px rgba(0,0,0,0.58),
        0 0 0 2px rgba(6,12,20,0.92),
        0 0 0 3px rgba(150,177,209,0.32),
        0 16px 34px rgba(0,0,0,0.64),
        10px 18px 24px -8px rgba(255,154,60,0.18);
    }
    .knob::after {
      content: ""; position: absolute;
      left: 50%; top: 10px; width: 6px; height: 30px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, #ffd1a0 0%, var(--accent) 45%, var(--accent-deep) 100%);
      box-shadow: 0 0 10px rgba(255,154,60,0.72), 0 0 2px rgba(255,255,255,0.72);
    }
    .knob::before {
      content: "";
      position: absolute; inset: -9px; border-radius: 50%;
      background: repeating-conic-gradient(
        from -120deg,
        rgba(255,154,60,0.36) 0deg 0.9deg,
        transparent 0.9deg 10deg
      );
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 2px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 2px));
      pointer-events: none;
      opacity: 0.48;
    }

    .ring {
      position: absolute; inset: 6px; border-radius: 50%;
      transform: rotate(var(--turn, -42deg));
    }
    .ring::before {
      content: ""; position: absolute; inset: 0; border-radius: 50%;
      background: conic-gradient(
        from 218deg,
        rgba(255,154,60,0.14) 0deg 16deg,
        var(--accent-dark) 16deg 70deg,
        var(--accent-mid) 70deg 96deg,
        var(--accent-bright) 96deg 118deg,
        transparent 120deg 360deg
      );
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 8px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 8px));
      filter: drop-shadow(0 0 6px rgba(255,154,60,0.74));
    }
    .knob.hero .ring::before {
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 14px), #000 calc(100% - 10px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 14px), #000 calc(100% - 10px));
      filter: drop-shadow(0 0 6px rgba(255,154,60,0.70));
    }

    .feedback-arc {
      position: absolute; inset: -8px; border-radius: 50%; pointer-events: none; opacity: 0.70;
    }
    .feedback-arc::before {
      content: ""; position: absolute; inset: 0; border-radius: 50%;
      background: conic-gradient(
        from 220deg,
        transparent 0deg 18deg,
        rgba(255,154,60,0.60) 18deg,
        var(--accent) var(--gr-end, 74deg),
        transparent calc(var(--gr-end, 74deg) + 2deg) 360deg
      );
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 4px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 4px));
      filter: drop-shadow(0 0 8px rgba(255,154,60,0.50));
    }

    .readout {
      min-width: 82px; padding: 5px 10px; margin-top: 2px;
      border-radius: 999px;
      border: 1px solid rgba(120,148,184,0.40);
      background: linear-gradient(180deg, rgba(11,18,29,0.98) 0%, rgba(6,10,17,0.98) 100%);
      box-shadow:
        inset 0 1px 0 rgba(200,220,246,0.16),
        inset 0 -1px 0 rgba(0,0,0,0.54),
        0 0 0 1px rgba(0,0,0,0.54),
        0 4px 10px rgba(0,0,0,0.40);
      font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
      text-align: center; color: var(--accent);
      text-shadow: 0 0 10px rgba(255,154,60,0.14);
    }

    .mode-buttons, .preset-buttons, .meter-toggle { display: flex; gap: 8px; }
    .mode-buttons { width: 280px; justify-content: center; margin-top: 8px; }
    button {
      border: 1px solid rgba(122,151,186,0.36);
      background: linear-gradient(180deg, rgba(17,27,42,0.98) 0%, rgba(8,14,24,0.98) 100%);
      color: var(--text-dim);
      cursor: pointer; border-radius: 999px;
      transition: all var(--ease);
      user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
      box-shadow: inset 0 1px 0 rgba(202,224,248,0.16), 0 3px 10px rgba(0,0,0,0.32);
    }
    button.active {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
      color: #fff;
      border-color: var(--accent-deep);
      box-shadow: 0 0 16px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,220,180,0.36);
    }
    .mode-buttons button, .meter-toggle button {
      flex: 1; padding: 9px 0; font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    }

    .meter-toggle {
      width: 110px;
      margin-bottom: 6px;
      gap: 0;
      border-radius: 14px;
      padding: 2px;
      border: 1px solid rgba(114,144,181,0.44);
      background: linear-gradient(180deg, rgba(13,21,33,0.98) 0%, rgba(7,12,20,0.98) 100%);
      box-shadow: inset 0 1px 0 rgba(197,219,245,0.16), 0 6px 14px rgba(0,0,0,0.40);
    }
    .meter-toggle button { padding: 7px 0; font-size: 10px; }
    .meter-toggle button:first-child { border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .meter-toggle button:last-child { border-top-left-radius: 0; border-bottom-left-radius: 0; }
    .meter-toggle button.active {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
      color: #fff; border-color: var(--accent-deep);
      box-shadow: 0 0 10px var(--accent-glow), inset 0 1px 0 rgba(255,220,184,0.36);
    }

    .meter {
      width: 42px; height: 174px; padding: 8px 8px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(8,14,23,0.98) 0%, rgba(3,8,15,0.98) 100%);
      border: 1px solid rgba(112,141,178,0.34);
      box-shadow: inset 0 2px 12px rgba(0,0,0,0.58), 0 8px 18px rgba(0,0,0,0.42);
      display: flex; flex-direction: column-reverse; gap: 3px;
      position: relative;
    }
    .meter::before {
      content: "0\A-4\A-8\A-12\A-16\A-20\A-24\A-30\A-36\A-42\A-48";
      position: absolute;
      left: -46px;
      top: 2px;
      bottom: 2px;
      width: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      white-space: pre;
      text-align: right;
      font-size: 12px;
      color: #d2d7df;
      line-height: 1.02;
    }
    .meter-bar {
      height: 10px; border-radius: 2px;
      background: linear-gradient(180deg, rgba(15,22,34,0.94) 0%, rgba(8,12,19,0.98) 100%);
      border: 1px solid rgba(51,71,93,0.65);
      transition: all 320ms cubic-bezier(0.18, 0.8, 0.2, 1);
    }
    .meter-bar.active {
      background: linear-gradient(180deg, #ffd79a 0%, #ffb14d 50%, #ff7f10 100%);
      border-color: rgba(255,179,92,0.88);
      box-shadow: 0 0 15px rgba(255,154,60,0.76);
    }
    .meter-bar.active:nth-child(1),
    .meter-bar.active:nth-child(2),
    .meter-bar.active:nth-child(3) {
      background: linear-gradient(180deg, #f2952d 0%, #cb6300 100%);
    }
    .meter-bar.active:nth-child(8),
    .meter-bar.active:nth-child(9),
    .meter-bar.active:nth-child(10) {
      background: linear-gradient(180deg, #ffe6bb 0%, #ffc46d 50%, #ff8b1f 100%);
      box-shadow: 0 0 18px rgba(255,176,84,0.84);
    }

    .magic-button {
      position: relative; overflow: hidden;
      min-width: 132px; height: 36px; padding: 0 18px;
      font-size: 12px; font-weight: 800; letter-spacing: 0.20em;
      border: 1px solid rgba(255,154,60,0.74);
      background: linear-gradient(180deg, rgba(31,18,10,0.98) 0%, rgba(13,10,10,0.98) 100%);
      color: var(--accent);
      box-shadow:
        0 0 16px rgba(255,154,60,0.22),
        0 0 0 1px rgba(255,154,60,0.20),
        0 5px 14px rgba(0,0,0,0.42),
        inset 0 1px 0 rgba(255,214,170,0.26),
        inset 0 0 8px rgba(255,165,82,0.12),
        inset 0 -8px 12px rgba(0,0,0,0.34);
    }
    .magic-button::after {
      content: ""; position: absolute;
      left: 10px; right: 10px; top: 2px; height: 40%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
    }
    .magic-button.active {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
      color: #fff; border-color: var(--accent-deep);
      box-shadow:
        0 0 0 1px rgba(255,154,60,0.50),
        0 0 18px rgba(255,106,0,0.50),
        0 8px 20px rgba(0,0,0,0.40),
        inset 0 1px 0 rgba(255,255,255,0.30),
        inset 0 -10px 14px rgba(155,78,12,0.28);
    }
    .magic-button.active::after { opacity: 0.60; }

    .preset-buttons {
      position: absolute; left: 20px; right: 20px; bottom: 14px;
      display: flex; gap: 10px;
      padding: 18px 14px;
      border-radius: 30px;
      border: 1px solid rgba(102,132,169,0.30);
      background: linear-gradient(180deg, rgba(8,17,29,0.84) 0%, rgba(5,11,19,0.84) 100%);
      box-shadow: inset 0 1px 0 rgba(184,208,238,0.12), 0 8px 20px rgba(0,0,0,0.34);
    }
    .preset-buttons button {
      flex: 1; height: 44px; font-size: 13px; font-weight: 700; letter-spacing: 0.16em;
      border: 1px solid rgba(112,141,176,0.44);
      background: linear-gradient(180deg, rgba(15,24,38,0.96) 0%, rgba(8,14,22,0.98) 100%);
      color: var(--text-dim);
    }
    .preset-buttons button.active {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
      color: #fff; border-color: var(--accent-deep);
      box-shadow: 0 0 16px var(--accent-glow), 0 4px 14px rgba(0,0,0,0.36);
    }
  </style>
</head>
<body>
  <div class="plugin">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:14px; padding:16px 22px 0 22px; margin-bottom:2px;">
      <div class="nova-header" style="margin-bottom:0; min-height:52px; padding:0;">
        <div class="nova-logo-container">
          <img src="n_logo.png" alt="N" class="nova-logo" />
        </div>
        <div class="nova-title-stack">
          <span class="nova-title-nova">NOVA</span>
          <br style="line-height:0; margin:0; padding:0;" />
          <span class="nova-title-master">LEVEL</span>
        </div>
      </div>
      <div class="tagline" style="text-align:right; margin-top:2px;">by International Nova</div>
    </div>

    <div class="inner-panel">
      <div class="layout">
        <div class="tone-zone">
          <div class="knob-wrap">
            <div class="section-label">TONE SHAPING</div>
            <div class="section-sub">COLOR / PRESENCE</div>
            <div class="knob medium" data-param="tone" data-min="0" data-max="10">
              <div class="ring"></div>
            </div>
            <div class="readout" data-readout="tone">+0.0</div>
          </div>
        </div>

        <div class="hero-zone">
          <div class="section-label">COMPRESSION</div>
          <div class="knob-wrap">
            <div class="knob hero" data-param="compression" data-min="0" data-max="10">
              <div class="feedback-arc"></div>
              <div class="ring"></div>
            </div>
            <div class="readout" data-readout="compression">4.0</div>
          </div>
          <div class="mode-buttons">
            <button class="active" data-mode="SMOOTH">SMOOTH</button>
            <button data-mode="PUNCH">PUNCH</button>
            <button data-mode="LIMIT">LIMIT</button>
          </div>
        </div>

        <div class="output-zone">
          <div class="output-top">
            <div class="knob-wrap">
              <div class="section-label">OUTPUT</div>
              <div class="knob medium" data-param="output" data-min="-12" data-max="12">
                <div class="ring"></div>
              </div>
              <div class="readout" data-readout="output">+0.0 dB</div>
            </div>

            <div class="meter-stack">
              <div style="display:flex; align-items:center; gap:10px;">
                <div>
                  <div class="meter-toggle">
                    <button class="active" data-meter="GR">GR</button>
                    <button data-meter="OUT">OUT</button>
                  </div>
                  <div class="meter" id="meter">
                    <span class="meter-bar"></span>
                    <span class="meter-bar"></span>
                    <span class="meter-bar"></span>
                    <span class="meter-bar"></span>
                    <span class="meter-bar"></span>
                    <span class="meter-bar"></span>
                    <span class="meter-bar"></span>
                    <span class="meter-bar"></span>
                    <span class="meter-bar"></span>
                    <span class="meter-bar"></span>
                  </div>
                </div>
                <div id="meter-readout" style="min-width:94px; font-size:1.08em; font-weight:900; color:#FF9A3C; background:linear-gradient(180deg, rgba(12,20,31,0.98) 0%, rgba(7,12,20,0.98) 100%); border-radius:16px; padding:11px 11px; box-shadow:inset 0 1px 0 rgba(180,207,240,0.18), 0 0 16px rgba(255,154,60,0.10); border:1px solid rgba(120,146,181,0.42); letter-spacing:0.03em; text-align:center;">-0.0 dB</div>
              </div>
            </div>
          </div>
          <button id="magic-toggle" class="magic-button" type="button">MAGIC</button>
        </div>
      </div>
    </div>

    <div class="preset-buttons">
      <button data-preset="VOCAL">VOCAL</button>
      <button data-preset="BASS">BASS</button>
      <button data-preset="DRUMS">DRUMS</button>
      <button data-preset="MASTER">MASTER</button>
    </div>
  </div>

<script>
(() => {
  const meterReadout = document.getElementById('meter-readout');
  const meterToggle = Array.from(document.querySelectorAll('.meter-toggle button'));
  const meterBars = Array.from(document.querySelectorAll('.meter .meter-bar'));
  const modeButtons = Array.from(document.querySelectorAll('.mode-buttons button'));
  const presetButtons = Array.from(document.querySelectorAll('.preset-buttons button'));
  const magicButton = document.getElementById('magic-toggle');
  const knobs = Array.from(document.querySelectorAll('.knob[data-param]'));

  const sliderStates = {};
  const currentValues = {};
  let activeDrag = null;
  let grActive = true;
  let grValue = 0.0;
  let outValueDb = -60.0;
  let hot = false;

  const presets = {
    VOCAL:  { mode: 'SMOOTH', compression: 4.5, tone: 5.5, output: 2.0 },
    BASS:   { mode: 'SMOOTH', compression: 5.5, tone: 4.0, output: 3.0 },
    DRUMS:  { mode: 'PUNCH',  compression: 6.0, tone: 5.0, output: 2.5 },
    MASTER: { mode: 'SMOOTH', compression: 3.0, tone: 5.0, output: 0.0 }
  };

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function juceAvailable() {
    return !!(window.__JUCE__ && window.__JUCE__.backend);
  }

  function createSliderState(name) {
    if (!juceAvailable()) return null;

    const backend = window.__JUCE__.backend;
    const state = {
      identifier: '__juce__slider' + name,
      scaledValue: 0,
      properties: { start: 0, end: 1, interval: 0 },
      listeners: [],
      addListener(fn) { this.listeners.push(fn); },
      notify() { this.listeners.forEach((fn) => fn()); },
      getNormalisedValue() {
        const range = this.properties.end - this.properties.start;
        if (range === 0) return 0;
        return clamp((this.scaledValue - this.properties.start) / range, 0, 1);
      },
      setNormalisedValue(normalised) {
        const n = clamp(normalised, 0, 1);
        const start = this.properties.start;
        const end = this.properties.end;
        let scaled = start + n * (end - start);
        if (this.properties.interval > 0)
          scaled = Math.round(scaled / this.properties.interval) * this.properties.interval;
        this.scaledValue = scaled;
        backend.emitEvent(this.identifier, { eventType: 'valueChanged', value: scaled });
      },
      gestureStart() {
        backend.emitEvent(this.identifier, { eventType: 'sliderDragStarted' });
      },
      gestureEnd() {
        backend.emitEvent(this.identifier, { eventType: 'sliderDragEnded' });
      }
    };

    backend.addEventListener(state.identifier, (event) => {
      if (!event) return;
      if (event.eventType === 'valueChanged' && typeof event.value === 'number') {
        state.scaledValue = event.value;
        state.notify();
      }
      if (event.eventType === 'propertiesChanged') {
        const props = { ...event };
        delete props.eventType;
        state.properties = { ...state.properties, ...props };
      }
    });

    backend.emitEvent(state.identifier, { eventType: 'requestInitialUpdate' });
    return state;
  }

  function setMeterFill(normalized) {
    const barsOn = Math.round(clamp(normalized, 0, 1) * meterBars.length);
    meterBars.forEach((bar, index) => {
      const active = index < barsOn;
      bar.classList.toggle('active', active);
      bar.style.opacity = active ? '1' : '0.45';
    });
  }

  function updateMeterReadout() {
    if (grActive) {
      meterReadout.textContent = '-' + grValue.toFixed(1) + ' dB';
      meterReadout.style.color = '#FF9A3C';
      setMeterFill(grValue / 18.0);
    } else {
      meterReadout.textContent = (outValueDb > 0 ? '+' : '') + outValueDb.toFixed(1) + ' dB';
      meterReadout.style.color = hot ? '#FF6A00' : '#FF9A3C';
      setMeterFill((outValueDb + 60.0) / 60.0);
    }
  }

  function setModeVisual(modeName) {
    modeButtons.forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.mode === modeName);
    });
  }

  function setPresetVisual(presetName) {
    presetButtons.forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.preset === presetName);
    });
  }

  function syncKnobVisual(param, value) {
    const knob = knobs.find((k) => k.dataset.param === param);
    const readout = document.querySelector('[data-readout="' + param + '"]');
    if (!knob || !readout) return;

    const min = parseFloat(knob.dataset.min || '0');
    const max = parseFloat(knob.dataset.max || '1');
    const clamped = clamp(value, min, max);
    currentValues[param] = clamped;

    const t = (clamped - min) / Math.max(1e-6, max - min);
    const turn = (-120 + t * 240).toFixed(1);
    const ring = knob.querySelector('.ring');
    if (ring) ring.style.setProperty('--turn', turn + 'deg');

    if (param === 'output')
      readout.textContent = (clamped >= 0 ? '+' : '') + clamped.toFixed(1) + ' dB';
    else
      readout.textContent = clamped.toFixed(1);
  }

  function setParam(param, value, withGesture) {
    const state = sliderStates[param];
    if (!state) {
      syncKnobVisual(param, value);
      return;
    }

    const min = parseFloat(knobs.find((k) => k.dataset.param === param)?.dataset.min || '0');
    const max = parseFloat(knobs.find((k) => k.dataset.param === param)?.dataset.max || '1');
    const clamped = clamp(value, min, max);
    const normalised = (clamped - min) / Math.max(1e-6, max - min);

    if (withGesture) state.gestureStart();
    state.setNormalisedValue(normalised);
    if (withGesture) state.gestureEnd();
    syncKnobVisual(param, clamped);
  }

  function initKnobInteraction() {
    knobs.forEach((knob) => {
      const param = knob.dataset.param;

      const start = (event) => {
        if (event.button !== undefined && event.button !== 0) return;
        event.preventDefault();
        activeDrag = {
          param,
          pointerId: event.pointerId ?? null,
          startY: event.clientY ?? 0,
          startValue: currentValues[param] ?? parseFloat(knob.dataset.min || '0')
        };
        if (sliderStates[param]) sliderStates[param].gestureStart();
      };

      knob.addEventListener('pointerdown', start);
      knob.addEventListener('dblclick', () => {
        const min = parseFloat(knob.dataset.min || '0');
        const max = parseFloat(knob.dataset.max || '1');
        setParam(param, (min + max) * 0.5, true);
      });
    });

    window.addEventListener('pointermove', (event) => {
      if (!activeDrag) return;
      if (activeDrag.pointerId !== null && event.pointerId !== activeDrag.pointerId) return;

      const knob = knobs.find((k) => k.dataset.param === activeDrag.param);
      if (!knob) return;

      const min = parseFloat(knob.dataset.min || '0');
      const max = parseFloat(knob.dataset.max || '1');
      const delta = (activeDrag.startY - event.clientY) * (max - min) / 180.0;
      setParam(activeDrag.param, activeDrag.startValue + delta, false);
    });

    window.addEventListener('pointerup', (event) => {
      if (!activeDrag) return;
      if (activeDrag.pointerId !== null && event.pointerId !== activeDrag.pointerId) return;
      if (sliderStates[activeDrag.param]) sliderStates[activeDrag.param].gestureEnd();
      activeDrag = null;
    });
  }

  modeButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.mode;
      setModeVisual(mode);
      const index = mode === 'PUNCH' ? 1 : mode === 'LIMIT' ? 2 : 0;
      sliderStates.mode?.setNormalisedValue(index / 2);
    });
  });

  meterToggle.forEach((btn) => {
    btn.addEventListener('click', () => {
      meterToggle.forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      grActive = btn.dataset.meter === 'GR';
      sliderStates.meter?.setNormalisedValue(grActive ? 0 : 1);
      updateMeterReadout();
    });
  });

  magicButton?.addEventListener('click', () => {
    const active = !magicButton.classList.contains('active');
    magicButton.classList.toggle('active', active);
    sliderStates.magic?.setNormalisedValue(active ? 1 : 0);
  });

  presetButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      const preset = presets[btn.dataset.preset];
      if (!preset) return;
      setPresetVisual(btn.dataset.preset);
      setParam('compression', preset.compression, true);
      setParam('tone', preset.tone, true);
      setParam('output', preset.output, true);
      setModeVisual(preset.mode);
      const idx = preset.mode === 'PUNCH' ? 1 : preset.mode === 'LIMIT' ? 2 : 0;
      sliderStates.mode?.setNormalisedValue(idx / 2);
    });
  });

  window.updateMeters = (gainReductionDb, outputLinear, isHot) => {
    grValue = Number.isFinite(gainReductionDb) ? Math.max(0, gainReductionDb) : 0;
    const safeOut = Number.isFinite(outputLinear) ? Math.max(1e-6, outputLinear) : 1e-6;
    outValueDb = 20 * Math.log10(safeOut);
    hot = !!isHot;
    updateMeterReadout();
  };

  sliderStates.compression = createSliderState('compression');
  sliderStates.tone = createSliderState('tone');
  sliderStates.output = createSliderState('output');
  sliderStates.mode = createSliderState('mode');
  sliderStates.magic = createSliderState('magic');
  sliderStates.meter = createSliderState('meter');

  ['compression', 'tone', 'output'].forEach((param) => {
    sliderStates[param]?.addListener(() => {
      const knob = knobs.find((k) => k.dataset.param === param);
      if (!knob) return;
      const min = parseFloat(knob.dataset.min || '0');
      const max = parseFloat(knob.dataset.max || '1');
      const value = min + sliderStates[param].getNormalisedValue() * (max - min);
      syncKnobVisual(param, value);
    });
  });

  sliderStates.mode?.addListener(() => {
    const idx = Math.round(sliderStates.mode.getNormalisedValue() * 2);
    setModeVisual(idx === 1 ? 'PUNCH' : idx === 2 ? 'LIMIT' : 'SMOOTH');
  });

  sliderStates.magic?.addListener(() => {
    magicButton?.classList.toggle('active', sliderStates.magic.getNormalisedValue() > 0.5);
  });

  sliderStates.meter?.addListener(() => {
    const out = sliderStates.meter.getNormalisedValue() > 0.5;
    grActive = !out;
    meterToggle.forEach((b) => b.classList.toggle('active', b.dataset.meter === (grActive ? 'GR' : 'OUT')));
    updateMeterReadout();
  });

  knobs.forEach((knob) => {
    const p = knob.dataset.param;
    const min = parseFloat(knob.dataset.min || '0');
    const max = parseFloat(knob.dataset.max || '1');
    syncKnobVisual(p, (min + max) * 0.5);
  });

  initKnobInteraction();
  setPresetVisual('VOCAL');
  updateMeterReadout();
})();
</script>
</body>
</html>
