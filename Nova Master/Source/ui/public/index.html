<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Master — v1 Preview</title>
  <style>
        .nova-header {
          display: flex;
          align-items: flex-start;
          gap: 18px;
          margin-bottom: 0;
          position: relative;
          min-height: 64px;
        }
        .nova-logo-container {
          display: flex;
          align-items: center;
          justify-content: center;
          width: 36px;
          height: 36px;
          margin-left: -10px;
          border-radius: 10px;
          background: linear-gradient(180deg, rgba(191,166,124,0.16) 0%, rgba(191,166,124,0.06) 100%);
          box-shadow: 0 2px 8px 0 rgba(0,0,0,0.28);
          backdrop-filter: blur(1.5px);
        }
        .nova-logo {
          width: 32px;
          height: 32px;
          object-fit: contain;
          filter: grayscale(0.24) brightness(0.82) contrast(1.04);
          opacity: 1;
        }
        .nova-title-nova {
          font-size: 24px;
          font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
          font-weight: 700;
          letter-spacing: 0.13em;
          color: #d2c4ac;
          margin: 0 0 2px 0;
          padding: 0;
          opacity: 0.97;
        }
        .nova-title-master {
          font-size: 30px;
          font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
          font-weight: 950;
          letter-spacing: 0.04em;
          color: #f1e7d6;
          margin: 0;
          padding: 0;
          line-height: 1.0;
          opacity: 0.98;
        }
    :root {
      --face: #0f1318;
      --face-shade: #090c11;
      --panel: #11161d;
      --panel-soft: #171d25;
      --panel-cool: #121821;
      --text-main: #d7ccb9;
      --text-soft: #a89b86;
      --silver: #bc9a62;
      --silver-deep: #6c5538;
      --silver-pale: #dfc79d;
      --silver-line: rgba(188, 154, 98, 0.28);
      --meter-blue: #c39a5b;
      --meter-ice: #e3c891;
      --finish-gold: #c7a267;
      --finish-gold-deep: #8b6d43;
      --finish-glow: #e5c892;
      --white: #fffdfa;
      --ease: 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% -16%, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 40%),
        linear-gradient(180deg, #10151b 0%, #0b0f14 56%, #070b10 100%);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
    }
    body {
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .plugin {
      position: relative;
      width: min(980px, 100vw);
      height: min(580px, 100vh);
      border-radius: 26px;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, #151b23 0%, var(--face) 24%, var(--face-shade) 100%);
      border: 1px solid rgba(192, 154, 95, 0.18);
      box-shadow:
        0 34px 68px rgba(0, 0, 0, 0.52),
        0 12px 22px rgba(0, 0, 0, 0.40),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -18px 28px rgba(0, 0, 0, 0.34),
        inset 10px 0 18px rgba(255,255,255,0.02),
        inset -10px 0 18px rgba(0,0,0,0.20);
    }

    .plugin::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 18%, transparent 82%, rgba(0,0,0,0.24));
      pointer-events: none;
    }

    .plugin::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 20px);
      opacity: 0.2;
      mix-blend-mode: soft-light;
      pointer-events: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 26px 8px;
      margin-bottom: 18px;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .title-meta {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .header-chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(191, 157, 103, 0.26);
      background: linear-gradient(180deg, rgba(36,42,51,0.92) 0%, rgba(27,32,40,0.9) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #b8a78a;
    }

    .header-chip.gold {
      border-color: rgba(150, 110, 40, 0.76);
      color: #76521b;
      background: linear-gradient(180deg, rgba(255,249,236,0.98) 0%, rgba(243,226,190,0.94) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.84),
        0 1px 0 rgba(255,255,255,0.32);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-size: 46px;
      line-height: 0.96;
      letter-spacing: 0.07em;
      color: #efe7d9;
      text-shadow: 0 1px 0 rgba(255,255,255,0.08), 0 2px 6px rgba(0,0,0,0.24);
    }

    .subtitle {
      margin-top: 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .tagline-wrap {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .tagline {
      margin-top: 0;
      font-family: "Snell Roundhand", "Apple Chancery", "URW Chancery L", "Brush Script MT", cursive;
      font-size: 24px;
      color: #c6ae86;
      text-shadow: 0 1px 0 rgba(255,255,255,0.08);
    }

    .tagline-sub {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #96876f;
    }

    .inner-panel {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 94px;
      bottom: 72px;
      border-radius: 20px;
      padding: 16px 16px 14px;
      background: linear-gradient(180deg, rgba(19,24,31,0.98) 0%, rgba(17,22,29,0.96) 52%, rgba(14,19,25,0.97) 100%);
      border: 1px solid rgba(182, 147, 89, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        inset 0 -18px 28px rgba(0,0,0,0.26),
        inset 12px 0 16px rgba(255,255,255,0.02),
        inset -12px 0 18px rgba(0,0,0,0.14),
        0 14px 24px rgba(0,0,0,0.32);
    }

    .inner-panel::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .inner-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.04),
        inset 0 -2px 0 rgba(0,0,0,0.20),
        inset 2px 0 0 rgba(255,255,255,0.02),
        inset -2px 0 0 rgba(0,0,0,0.10);
      pointer-events: none;
    }

    .layout {
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr)) 0.92fr;
      gap: 12px;
      height: 100%;
      align-items: stretch;
    }

    .knob-wrap,
    .precision-rail {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .knob-wrap {
      position: relative;
      overflow: hidden;
      justify-content: center;
      gap: 6px;
      padding: 12px 8px 10px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(27,33,42,0.72) 0%, rgba(18,23,30,0.74) 100%);
      border: 1px solid rgba(183, 148, 90, 0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        inset 0 -10px 16px rgba(0,0,0,0.26),
        inset 10px 0 14px rgba(255,255,255,0.01),
        inset -10px 0 14px rgba(0,0,0,0.10),
        0 12px 16px rgba(0,0,0,0.30);
    }

    .knob-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 22%, transparent 48%, rgba(0, 0, 0, 0.10) 100%);
      pointer-events: none;
    }

    .section-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.24em;
      color: #dfd0b6;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.45);
    }

    .section-sub {
      margin-top: -2px;
      margin-bottom: 10px;
      font-size: 9px;
      letter-spacing: 0.16em;
      font-weight: 800;
      text-transform: uppercase;
      color: #b4a186;
      text-align: center;
    }

    .knob {
      position: relative;
      width: 116px;
      height: 116px;
      border-radius: 50%;
      border: 1px solid rgba(196, 162, 103, 0.34);
      background:
        radial-gradient(circle at 32% 18%, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.04) 22%, transparent 42%),
        radial-gradient(circle at 68% 78%, rgba(0,0,0,0.38) 0%, transparent 34%),
        linear-gradient(145deg, #3e4652 0%, #272e38 40%, #161c24 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -14px 22px rgba(0, 0, 0, 0.42),
        0 14px 22px rgba(0,0,0,0.36);
      cursor: ns-resize;
      user-select: none;
      touch-action: none;
      transition: transform var(--ease), box-shadow var(--ease), filter var(--ease);
    }

    .knob.active {
      transform: translateY(-1px) scale(1.012);
      filter: saturate(1.01);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -12px 20px rgba(0,0,0,0.32),
        0 0 0 1px rgba(206, 179, 135, 0.28),
        0 0 6px rgba(206, 179, 135, 0.08),
        0 14px 22px rgba(0,0,0,0.32);
    }

    .knob::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -8px 12px rgba(0,0,0,0.22);
    }

    .knob::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 12px;
      width: 3px;
      height: 30px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, #e9d7b8 0%, #c8a06a 32%, var(--silver-deep) 100%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.10), 0 2px 5px rgba(0, 0, 0, 0.30);
    }

    .ring {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      transform: rotate(var(--turn, -42deg));
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 218deg, rgba(224,198,148,0.82) 0deg 12deg, rgba(186,151,95,0.86) 12deg 58deg, rgba(116,93,61,0.82) 58deg 108deg, transparent 108deg 360deg);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 8px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 8px));
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: repeating-conic-gradient(from 220deg, rgba(210,177,122,0.46) 0deg 1deg, transparent 1deg 8deg);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 13px), #000 calc(100% - 12px), #000 calc(100% - 11px), transparent calc(100% - 10px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 13px), #000 calc(100% - 12px), #000 calc(100% - 11px), transparent calc(100% - 10px));
      opacity: 0.48;
      pointer-events: none;
    }

    .readout {
      min-width: 86px;
      padding: 7px 12px;
      border-radius: 12px;
      border: 1px solid rgba(193, 156, 96, 0.24);
      background: linear-gradient(180deg, rgba(25,30,37,0.95) 0%, rgba(16,21,28,0.95) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 6px 12px rgba(0,0,0,0.24);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-align: center;
      color: #daccb4;
      transition: transform 140ms ease, box-shadow 140ms ease, color 140ms ease;
    }

    .readout.live {
      transform: translateY(-1px);
      color: #f0ddbc;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 0 1px rgba(198, 173, 132, 0.32),
        0 0 6px rgba(198, 173, 132, 0.08),
        0 8px 14px rgba(0,0,0,0.26);
    }

    .precision-rail {
      position: relative;
      overflow: visible;
      gap: 8px;
      padding: 14px 10px 12px;
      min-height: 100%;
      justify-content: flex-start;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(18,23,30,0.99) 0%, rgba(14,19,25,0.98) 40%, rgba(12,16,22,0.98) 100%);
      border: 1px solid rgba(182, 147, 89, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        inset 0 -16px 24px rgba(0,0,0,0.20),
        inset 0 0 12px rgba(255, 222, 169, 0.016),
        inset 12px 0 16px rgba(255,255,255,0.01),
        inset -12px 0 18px rgba(0,0,0,0.08),
        0 18px 28px rgba(0,0,0,0.26);
    }

    .precision-rail::before {
      content: "";
      position: absolute;
      top: 16px;
      bottom: 16px;
      left: 14px;
      width: 1px;
      background: linear-gradient(180deg, transparent 0%, rgba(196, 170, 126, 0.36) 20%, rgba(196, 170, 126, 0.14) 100%);
      opacity: 0.88;
    }

    .rail-badge {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(192, 154, 95, 0.26);
      background: linear-gradient(180deg, rgba(30,36,44,0.95) 0%, rgba(20,25,33,0.95) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #cdb690;
    }

    .mini-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.22em;
      color: #bfa98a;
      text-transform: uppercase;
    }

    .meter-toggle {
      display: flex;
      gap: 4px;
      width: 100px;
      padding: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(42,48,56,0.92) 0%, rgba(34,39,45,0.9) 100%);
      border: 1px solid rgba(192, 154, 95, 0.24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .meter-toggle button,
    .mode-buttons button,
    .finish-button {
      border: 1px solid rgba(193, 156, 96, 0.24);
      background: linear-gradient(180deg, rgba(38,44,53,0.96) 0%, rgba(27,32,40,0.94) 100%);
      color: #cdb999;
      border-radius: 999px;
      cursor: pointer;
      transition: all var(--ease);
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .meter-toggle button {
      flex: 1;
      padding: 7px 0;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .meter-toggle button.active,
    .mode-buttons button.active {
      background: linear-gradient(180deg, rgba(104,87,61,0.94) 0%, rgba(90,74,53,0.94) 40%, rgba(75,62,45,0.92) 100%);
      color: #f3e7d2;
      border-color: rgba(204, 177, 134, 0.36);
      text-shadow: 0 1px 0 rgba(0,0,0,0.30);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 0 0 1px rgba(235, 216, 184, 0.08),
        0 0 4px rgba(198, 173, 132, 0.06),
        0 6px 12px rgba(0,0,0,0.22);
    }

    .meter {
      width: 36px;
      height: clamp(132px, 23vh, 150px);
      padding: 7px 5px;
      border-radius: 16px;
      border: 1px solid rgba(188, 154, 95, 0.24);
      background: linear-gradient(180deg, rgba(12,16,22,0.95) 0%, rgba(10,14,19,0.95) 100%);
      display: flex;
      flex-direction: column-reverse;
      gap: 5px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 8px 14px rgba(0,0,0,0.24);
    }

    .meter-bar {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(88, 72, 46, 0.34) 0%, rgba(58, 47, 31, 0.16) 100%);
      transition: all 320ms cubic-bezier(0.18, 0.8, 0.2, 1);
    }

    .meter-bar.active {
      background: linear-gradient(180deg, #e7d2aa 0%, #d4b079 18%, var(--meter-ice) 38%, var(--meter-blue) 100%);
      box-shadow: 0 0 6px rgba(195, 169, 127, 0.20);
    }

    .rail-note {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #b7a17f;
    }

    .rail-core {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .trim-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: 68px;
      padding: 0;
      flex-shrink: 0;
    }

    .trim-knob {
      width: 64px;
      height: 64px;
    }

    .trim-knob::after {
      top: 8px;
      height: 18px;
      width: 3px;
    }

    .trim-knob .ring {
      inset: 5px;
    }

    .trim-readout {
      min-width: 68px;
      padding: 5px 6px;
      font-size: 10px;
      letter-spacing: 0.04em;
    }

    .mix-module {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 0;
      width: 112px;
      align-self: center;
      flex-shrink: 0;
      margin-top: auto;
      transform: translateY(16px);
      padding: 0 0 4px;
      min-height: 78px;
    }

    .mix-head {
      position: absolute;
      left: -14px;
      right: -14px;
      top: 50%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0;
      transform: translateY(-4px);
      pointer-events: none;
    }

    .mix-head .mini-label {
      font-size: 10px;
      letter-spacing: 0.18em;
    }

    .mix-knob {
      width: 58px;
      height: 58px;
      margin-top: 8px;
    }

    .mix-knob::after {
      top: 8px;
      height: 18px;
      width: 3px;
    }

    .mix-knob .ring {
      inset: 5px;
    }

    .mix-readout {
      min-width: 0;
      padding: 3px 7px;
      margin-left: 28px;
      font-size: 10px;
      letter-spacing: 0.05em;
    }

    .finish-button {
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      overflow: hidden;
      margin-top: 8px;
      width: 100%;
      min-width: 0;
      min-height: 44px;
      height: 44px;
      padding: 0 20px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.28em;
      color: #e0c9a2;
      border-color: rgba(193, 156, 96, 0.38);
      background: linear-gradient(180deg, rgba(31,36,44,0.98) 0%, rgba(19,24,31,0.96) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 0 0 1px rgba(245, 228, 188, 0.12),
        0 8px 14px rgba(0,0,0,0.24);
    }

    .finish-button::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      opacity: 0.55;
      pointer-events: none;
    }

    .finish-button::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 2px;
      height: 44%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 100%);
      opacity: 0.30;
      pointer-events: none;
    }

    .finish-button.active {
      background: linear-gradient(180deg, #ccb084 0%, #bb9b6a 34%, #a98557 66%, #7f6442 100%);
      color: #f7efe1;
      text-shadow: 0 1px 1px rgba(28, 22, 14, 0.32);
      border-color: rgba(214, 189, 149, 0.48);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.24),
        inset 0 -10px 14px rgba(63, 51, 34, 0.24),
        0 0 0 1px rgba(255, 246, 220, 0.20),
        0 0 6px rgba(222, 190, 141, 0.12),
        0 14px 22px rgba(0,0,0,0.30);
    }

    .microcopy {
      position: absolute;
      left: 56px;
      right: 190px;
      bottom: 54px;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #af9b7a;
      text-shadow: 0 1px 0 rgba(0,0,0,0.40);
    }

    .mode-buttons {
      position: absolute;
      left: 42px;
      right: 180px;
      bottom: 12px;
      display: flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(23,28,35,0.94) 0%, rgba(16,21,28,0.94) 100%);
      border: 1px solid rgba(188, 154, 95, 0.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 8px 14px rgba(0,0,0,0.22);
    }

    .mode-buttons button {
      flex: 1;
      height: 34px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div class="plugin">
    <div class="header">
      <div class="title-block">
        <div class="title-meta">
          <!-- <span class="header-chip">MASTER BUS FINISHER</span> -->
        </div>
        <div class="nova-header">
          <div class="nova-logo-container">
            <img src="n_logo.png" alt="N" class="nova-logo" />
          </div>
          <div class="nova-title-stack">
            <span class="nova-title-nova">NOVA</span>
            <br style="line-height:0; margin:0; padding:0;" />
            <span class="nova-title-master">MASTER</span>
          </div>
        </div>
        <div style="height: 6px;"></div>
        <div class="subtitle"></div>
      </div>
      <div class="tagline-wrap">
        <div class="tagline">by International Nova</div>
      </div>
    </div>

    <div class="inner-panel">
      <div class="layout">
        <div class="knob-wrap">
          <div class="section-label">TONE</div>
          <div class="section-sub">BALANCE</div>
          <div class="knob" data-param="tone" data-min="0" data-max="10"><div class="ring"></div></div>
          <div class="readout" data-readout="tone">5.0</div>
        </div>

        <div class="knob-wrap">
          <div class="section-label">GLUE</div>
          <div class="section-sub">CONTROL</div>
          <div class="knob" data-param="glue" data-min="0" data-max="10"><div class="ring"></div></div>
          <div class="readout" data-readout="glue">3.5</div>
        </div>

        <div class="knob-wrap">
          <div class="section-label">WEIGHT</div>
          <div class="section-sub">LOW END</div>
          <div class="knob" data-param="weight" data-min="0" data-max="10"><div class="ring"></div></div>
          <div class="readout" data-readout="weight">4.0</div>
        </div>

        <div class="knob-wrap">
          <div class="section-label">AIR</div>
          <div class="section-sub">TOP END</div>
          <div class="knob" data-param="air" data-min="0" data-max="10"><div class="ring"></div></div>
          <div class="readout" data-readout="air">5.0</div>
        </div>

        <div class="knob-wrap">
          <div class="section-label">WIDTH</div>
          <div class="section-sub">STEREO</div>
          <div class="knob" data-param="width" data-min="0" data-max="10"><div class="ring"></div></div>
          <div class="readout" data-readout="width">4.5</div>
        </div>

        <div class="precision-rail">
          <div class="rail-badge">OUTPUT STAGE</div>
          <div class="meter-toggle">
            <button data-meter="OUT" class="active">OUT</button>
            <button data-meter="LU">LU</button>
          </div>
          <div class="rail-core">
            <div class="meter" id="meter">
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
              <span class="meter-bar"></span>
            </div>
            <div class="trim-stack">
              <div class="mini-label">TRIM</div>
              <div class="knob trim-knob" data-param="output_gain" data-min="-12" data-max="12"><div class="ring"></div></div>
              <div class="readout trim-readout" data-readout="output_gain">+0.0 dB</div>
            </div>
          </div>
          <div class="readout" id="output-readout">+0.0 dB</div>
          <div class="rail-note">ceiling aware</div>
          <button id="finish-toggle" class="finish-button" type="button">FINISH</button>
          <div class="mix-module">
            <div class="mix-head">
              <div class="mini-label">MIX</div>
              <div class="readout mix-readout" data-readout="mix">100%</div>
            </div>
            <div class="knob mix-knob" data-param="mix" data-min="0" data-max="100"><div class="ring"></div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="microcopy"></div>

    <div class="mode-buttons">
      <button class="active" data-mode="CLEAN">CLEAN</button>
      <button data-mode="WARM">WARM</button>
      <button data-mode="WIDE">WIDE</button>
      <button data-mode="LOUD">LOUD</button>
    </div>
  </div>

  <script>
    (() => {
      const modeButtons = Array.from(document.querySelectorAll('[data-mode]'));
      const meterButtons = Array.from(document.querySelectorAll('[data-meter]'));
      const knobs = Array.from(document.querySelectorAll('.knob[data-param]'));
      const meterBars = Array.from(document.querySelectorAll('.meter-bar'));
      const finishButton = document.getElementById('finish-toggle');
      const meterReadout = document.getElementById('output-readout');

      const values = {
        tone: 5.0,
        glue: 3.5,
        weight: 4.0,
        air: 5.0,
        width: 4.5,
        mix: 100.0,
        output_gain: 0.0,
        finish_mode: 0.0,
        mode_preset: 0.0,
        meter_view: 0.0
      };

      const presets = {
        CLEAN: { tone: 5.0, glue: 3.5, weight: 4.0, air: 5.0, width: 4.5, mix: 100.0, finish_mode: 0.0 },
        WARM:  { tone: 4.2, glue: 4.8, weight: 6.0, air: 4.0, width: 4.5, mix: 82.0, finish_mode: 1.0 },
        WIDE:  { tone: 5.5, glue: 3.8, weight: 4.0, air: 6.2, width: 6.8, mix: 88.0, finish_mode: 1.0 },
        LOUD:  { tone: 5.2, glue: 5.5, weight: 5.2, air: 5.8, width: 5.0, mix: 94.0, finish_mode: 1.0 }
      };

      const modeOrder = ['CLEAN', 'WARM', 'WIDE', 'LOUD'];
      const meterOrder = ['OUT', 'LU'];
      const sliderStates = {};
      let activeDrag = null;
      let lastOutDb = -60.0;
      let lastLu = -18.0;
      let lastHot = false;
      let fallbackTick = 0;

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, Number(v) || 0));
      }

      function juceAvailable() {
        return !!(window.__JUCE__ && window.__JUCE__.backend);
      }

      function createSliderState(name) {
        if (!juceAvailable()) return null;

        const backend = window.__JUCE__.backend;
        const state = {
          identifier: `__juce__slider${name}`,
          scaledValue: 0,
          properties: { start: 0, end: 1, interval: 0 },
          listeners: [],
          addListener(fn) { this.listeners.push(fn); },
          notify() { this.listeners.forEach((fn) => fn()); },
          getNormalisedValue() {
            const range = this.properties.end - this.properties.start;
            if (range === 0) return 0;
            return clamp((this.scaledValue - this.properties.start) / range, 0, 1);
          },
          setNormalisedValue(normalised) {
            const n = clamp(normalised, 0, 1);
            const start = this.properties.start;
            const end = this.properties.end;
            let scaled = start + n * (end - start);

            if (this.properties.interval > 0)
              scaled = Math.round(scaled / this.properties.interval) * this.properties.interval;

            this.scaledValue = scaled;
            backend.emitEvent(this.identifier, { eventType: 'valueChanged', value: scaled });
          },
          gestureStart() { backend.emitEvent(this.identifier, { eventType: 'sliderDragStarted' }); },
          gestureEnd() { backend.emitEvent(this.identifier, { eventType: 'sliderDragEnded' }); }
        };

        backend.addEventListener(state.identifier, (event) => {
          if (!event) return;
          if (event.eventType === 'valueChanged' && typeof event.value === 'number') {
            state.scaledValue = event.value;
            state.notify();
          }
          if (event.eventType === 'propertiesChanged') {
            const props = { ...event };
            delete props.eventType;
            state.properties = { ...state.properties, ...props };
          }
        });

        backend.emitEvent(state.identifier, { eventType: 'requestInitialUpdate' });
        return state;
      }

      function setModeVisual(mode) {
        modeButtons.forEach((button) => {
          button.classList.toggle('active', button.dataset.mode === mode);
        });
      }

      function setMeterVisual(mode) {
        meterButtons.forEach((button) => {
          button.classList.toggle('active', button.dataset.meter === mode);
        });
      }

      function setFinishVisual(on) {
        finishButton.classList.toggle('active', !!on);
      }

      function setMeterFill(normalized) {
        const barsOn = Math.round(clamp(normalized, 0, 1) * meterBars.length);
        meterBars.forEach((bar, index) => {
          const active = index < barsOn;
          bar.classList.toggle('active', active);
          bar.style.opacity = active ? '1' : '0.45';
        });
      }

      function setOutputReadout(outDb, lu, isHot) {
        if ((values.meter_view || 0) > 0.5) {
          meterReadout.textContent = `${lu >= 0 ? '+' : ''}${lu.toFixed(1)} LU`;
          meterReadout.style.color = '#4e6174';
          setMeterFill((lu + 18.0) / 24.0);
        } else {
          meterReadout.textContent = `${outDb >= 0 ? '+' : ''}${outDb.toFixed(1)} dB`;
          meterReadout.style.color = isHot ? '#a45f2f' : '#37414c';
          setMeterFill((outDb + 60.0) / 66.0);
        }
      }

      function updateKnobVisual(param, value) {
        const knob = document.querySelector(`.knob[data-param="${param}"]`);
        if (!knob) return;

        const min = Number(knob.dataset.min);
        const max = Number(knob.dataset.max);
        const safe = clamp(value, min, max);
        values[param] = safe;

        const normal = (safe - min) / Math.max(1e-6, (max - min));
        const rotation = -42 + normal * 210;
        knob.querySelector('.ring').style.setProperty('--turn', `${rotation}deg`);

        const readout = document.querySelector(`[data-readout="${param}"]`);
        if (!readout) return;

        readout.textContent = param === 'output_gain'
          ? `${safe >= 0 ? '+' : ''}${safe.toFixed(1)} dB`
          : param === 'mix'
            ? `${safe.toFixed(0)}%`
            : safe.toFixed(1);

        readout.classList.add('live');
        clearTimeout(readout._liveTimer);
        readout._liveTimer = setTimeout(() => readout.classList.remove('live'), 160);
      }

      function setParam(param, value, withGesture = false) {
        updateKnobVisual(param, value);
        const state = sliderStates[param];
        if (!state) return;

        const knob = document.querySelector(`.knob[data-param="${param}"]`);
        if (!knob) return;
        const min = Number(knob.dataset.min);
        const max = Number(knob.dataset.max);
        const safe = clamp(value, min, max);
        const normalized = (safe - min) / Math.max(1e-6, (max - min));

        if (withGesture) state.gestureStart();
        state.setNormalisedValue(normalized);
        if (withGesture) state.gestureEnd();
      }

      function setMode(modeName, emit = true) {
        const index = Math.max(0, modeOrder.indexOf(modeName));
        values.mode_preset = index;
        setModeVisual(modeName);
        if (emit && sliderStates.mode_preset)
          sliderStates.mode_preset.setNormalisedValue(index / 3.0);
      }

      function setMeterView(modeName, emit = true) {
        const index = Math.max(0, meterOrder.indexOf(modeName));
        values.meter_view = index;
        setMeterVisual(modeName);
        if (emit && sliderStates.meter_view)
          sliderStates.meter_view.setNormalisedValue(index);
        setOutputReadout(lastOutDb, lastLu, lastHot);
      }

      function setFinish(on, emit = true) {
        values.finish_mode = on ? 1.0 : 0.0;
        setFinishVisual(on);
        if (emit && sliderStates.finish_mode)
          sliderStates.finish_mode.setNormalisedValue(on ? 1 : 0);
      }

      function applyPreset(name) {
        const preset = presets[name];
        if (!preset) return;
        setMode(name, true);
        setParam('tone', preset.tone, true);
        setParam('glue', preset.glue, true);
        setParam('weight', preset.weight, true);
        setParam('air', preset.air, true);
        setParam('width', preset.width, true);
        setParam('mix', preset.mix, true);
        setFinish(preset.finish_mode > 0.5, true);
      }

      function initKnobInteraction() {
        knobs.forEach((knob) => {
          const param = knob.dataset.param;

          knob.addEventListener('pointerdown', (event) => {
            if (event.button !== undefined && event.button !== 0) return;
            event.preventDefault();

            activeDrag = {
              param,
              pointerId: event.pointerId ?? null,
              startY: event.clientY,
              startValue: values[param] ?? Number(knob.dataset.min)
            };

            knob.classList.add('active');
            if (event.pointerId !== undefined)
              knob.setPointerCapture(event.pointerId);

            sliderStates[param]?.gestureStart();
          });

          knob.addEventListener('dblclick', () => {
            const min = Number(knob.dataset.min);
            const max = Number(knob.dataset.max);
            setParam(param, (min + max) * 0.5, true);
          });
        });

        window.addEventListener('pointermove', (event) => {
          if (!activeDrag) return;
          if (activeDrag.pointerId !== null && event.pointerId !== activeDrag.pointerId) return;

          const knob = document.querySelector(`.knob[data-param="${activeDrag.param}"]`);
          if (!knob) return;
          const min = Number(knob.dataset.min);
          const max = Number(knob.dataset.max);
          const delta = (activeDrag.startY - event.clientY) * ((max - min) / 180.0);
          setParam(activeDrag.param, activeDrag.startValue + delta, false);
        });

        function endDrag(event) {
          if (!activeDrag) return;
          if (activeDrag.pointerId !== null && event.pointerId !== activeDrag.pointerId) return;
          document.querySelector(`.knob[data-param="${activeDrag.param}"]`)?.classList.remove('active');
          sliderStates[activeDrag.param]?.gestureEnd();
          activeDrag = null;
        }

        window.addEventListener('pointerup', endDrag);
        window.addEventListener('pointercancel', endDrag);
      }

      function startFallbackMeter() {
        function tick() {
          if (juceAvailable()) return;
          fallbackTick += 0.018;
          const wobble = 0.5 + (0.5 * Math.sin(fallbackTick * 4.0));
          const density = clamp((values.glue + values.weight) / 20.0, 0, 1);
          const spread = clamp((values.air + values.width) / 20.0, 0, 1);
          const mixLift = clamp(values.mix / 100.0, 0, 1) * 0.22;
          const finishLift = values.finish_mode > 0.5 ? 0.18 : 0.0;
          const outDb = clamp(-18 + ((density + spread + mixLift + finishLift + (wobble * 0.12)) * 18.0) + values.output_gain, -60, 6);
          const lu = clamp(-14 + ((density + finishLift + (wobble * 0.2)) * 12.0), -18, 6);
          setOutputReadout(outDb, lu, outDb > -0.4);
          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      }

      modeButtons.forEach((button) => {
        button.addEventListener('click', () => applyPreset(button.dataset.mode));
      });

      meterButtons.forEach((button) => {
        button.addEventListener('click', () => setMeterView(button.dataset.meter, true));
      });

      finishButton.addEventListener('click', () => setFinish(values.finish_mode <= 0.5, true));

      sliderStates.tone = createSliderState('tone');
      sliderStates.glue = createSliderState('glue');
      sliderStates.weight = createSliderState('weight');
      sliderStates.air = createSliderState('air');
      sliderStates.width = createSliderState('width');
      sliderStates.mix = createSliderState('mix');
      sliderStates.output_gain = createSliderState('output_gain');
      sliderStates.finish_mode = createSliderState('finish_mode');
      sliderStates.mode_preset = createSliderState('mode_preset');
      sliderStates.meter_view = createSliderState('meter_view');

      ['tone', 'glue', 'weight', 'air', 'width', 'mix', 'output_gain'].forEach((param) => {
        sliderStates[param]?.addListener(() => {
          const knob = document.querySelector(`.knob[data-param="${param}"]`);
          if (!knob) return;
          const min = Number(knob.dataset.min);
          const max = Number(knob.dataset.max);
          const value = min + sliderStates[param].getNormalisedValue() * (max - min);
          updateKnobVisual(param, value);
        });
      });

      sliderStates.finish_mode?.addListener(() => {
        setFinish(sliderStates.finish_mode.getNormalisedValue() > 0.5, false);
      });

      sliderStates.mode_preset?.addListener(() => {
        const idx = Math.round(sliderStates.mode_preset.getNormalisedValue() * 3.0);
        setMode(modeOrder[idx] || 'CLEAN', false);
      });

      sliderStates.meter_view?.addListener(() => {
        const idx = sliderStates.meter_view.getNormalisedValue() > 0.5 ? 1 : 0;
        setMeterView(meterOrder[idx], false);
      });

      window.updateOutputMeter = (outputLinear, loudnessLike, isHot) => {
        const safeOut = Number.isFinite(outputLinear) ? Math.max(1.0e-6, outputLinear) : 1.0e-6;
        const safeLu = Number.isFinite(loudnessLike) ? clamp(loudnessLike, 0, 1) : 0;
        lastOutDb = 20.0 * Math.log10(safeOut);
        lastLu = -18.0 + (safeLu * 24.0);
        lastHot = !!isHot;
        setOutputReadout(lastOutDb, lastLu, lastHot);
      };

      ['tone', 'glue', 'weight', 'air', 'width', 'mix', 'output_gain'].forEach((param) => {
        const knob = document.querySelector(`.knob[data-param="${param}"]`);
        if (!knob) return;
        const min = Number(knob.dataset.min);
        const max = Number(knob.dataset.max);
        updateKnobVisual(param, (min + max) * 0.5);
      });

      setMode('CLEAN', false);
      setMeterView('OUT', false);
      setFinish(false, false);
      setOutputReadout(-60.0, -18.0, false);
      initKnobInteraction();
      startFallbackMeter();
    })();
  </script>
</body>
</html>
