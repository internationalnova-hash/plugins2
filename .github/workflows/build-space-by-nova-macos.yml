name: Build Space By Nova macOS

on:
  workflow_dispatch:
  push:
    paths:
      - 'Space By Nova/**'
      - '.github/workflows/build-space-by-nova-macos.yml'
  pull_request:
    paths:
      - 'Space By Nova/**'
      - '.github/workflows/build-space-by-nova-macos.yml'

jobs:
  build:
    runs-on: macos-14
    env:
      PLUGIN_BUNDLE: Space By Nova/build/SpaceByNova_artefacts/VST3/Space By Nova.vst3
      ZIP_PATH: Space By Nova/build/SpaceByNova_artefacts/VST3/Space By Nova.vst3.zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Validate signing secrets
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_DEV_ID_APPLICATION: ${{ secrets.APPLE_DEV_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          test -n "$MACOS_CERTIFICATE_P12" || (echo "Missing secret: MACOS_CERTIFICATE_P12" && exit 1)
          test -n "$MACOS_CERTIFICATE_PASSWORD" || (echo "Missing secret: MACOS_CERTIFICATE_PASSWORD" && exit 1)
          test -n "$APPLE_DEV_ID_APPLICATION" || (echo "Missing secret: APPLE_DEV_ID_APPLICATION" && exit 1)
          test -n "$APPLE_ID" || (echo "Missing secret: APPLE_ID" && exit 1)
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || (echo "Missing secret: APPLE_APP_SPECIFIC_PASSWORD" && exit 1)
          test -n "$APPLE_TEAM_ID" || (echo "Missing secret: APPLE_TEAM_ID" && exit 1)

      - name: Clean build directory
        run: rm -rf "Space By Nova/build"

      - name: Configure CMake
        run: cmake -S "Space By Nova" -B "Space By Nova/build" -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build "Space By Nova/build" --config Release

      - name: Verify plugin architectures
        run: lipo -archs "$PLUGIN_BUNDLE/Contents/MacOS/Space By Nova"

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > cert.p12
          security create-keychain -p "build" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "build" build.keychain

      - name: Code sign plugin bundle
        env:
          APPLE_DEV_ID_APPLICATION: ${{ secrets.APPLE_DEV_ID_APPLICATION }}
        run: |
          codesign --force --deep --options runtime --timestamp --sign "$APPLE_DEV_ID_APPLICATION" "$PLUGIN_BUNDLE"
          codesign --verify --deep --strict --verbose=2 "$PLUGIN_BUNDLE"

      - name: Prepare zip for notarization
        run: |
          rm -f "$ZIP_PATH"
          ditto -c -k --keepParent "$PLUGIN_BUNDLE" "$ZIP_PATH"

      - name: Notarize plugin zip
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "$PLUGIN_BUNDLE"
          xcrun stapler validate "$PLUGIN_BUNDLE"

      - name: Upload notarized artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceByNova-macOS-notarized
          path: Space By Nova/build/SpaceByNova_artefacts/VST3/Space By Nova.vst3
