name: Build Space By Nova macOS

on:
  push:
    paths:
      - 'Space By Nova/**'
      - '.github/workflows/build-space-by-nova-macos.yml'
  pull_request:
    paths:
      - 'Space By Nova/**'
      - '.github/workflows/build-space-by-nova-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Space By Nova/build"

      - name: Configure CMake
        run: cmake -S "Space By Nova" -B "Space By Nova/build"

      - name: Build
        run: cmake --build "Space By Nova/build" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpaceByNova-macOS-build
          path: Space By Nova/build
