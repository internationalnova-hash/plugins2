name: Build Nova Clip macOS

on:
  push:
    paths:
      - 'Nova Clip/**'
      - '.github/workflows/build-nova-clip-macos.yml'
  pull_request:
    paths:
      - 'Nova Clip/**'
      - '.github/workflows/build-nova-clip-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Nova Clip/build"

      - name: Configure CMake
        run: cmake -S "Nova Clip" -B "Nova Clip/build"

      - name: Build
        run: cmake --build "Nova Clip/build" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaClip-macOS-build
          path: Nova Clip/build
