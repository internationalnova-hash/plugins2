name: Build Nova Aura macOS

on:
  push:
    paths:
      - 'Nova Aura/**'
      - '.github/workflows/build-nova-aura-macos.yml'
  pull_request:
    paths:
      - 'Nova Aura/**'
      - '.github/workflows/build-nova-aura-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Nova Aura/build"

      - name: Configure CMake
        run: cmake -S "Nova Aura" -B "Nova Aura/build"

      - name: Build
        run: cmake --build "Nova Aura/build" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaAura-macOS-build
          path: Nova Aura/build
