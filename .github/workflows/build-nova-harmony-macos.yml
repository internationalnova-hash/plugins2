name: Build Nova Harmony macOS

on:
  push:
    paths:
      - 'Nova Harmony/**'
      - '.github/workflows/build-nova-harmony-macos.yml'
  pull_request:
    paths:
      - 'Nova Harmony/**'
      - '.github/workflows/build-nova-harmony-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Nova Harmony/build"

      - name: Configure CMake
        run: cmake -S "Nova Harmony" -B "Nova Harmony/build"

      - name: Build
        run: cmake --build "Nova Harmony/build" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaHarmony-macOS-build
          path: Nova Harmony/build