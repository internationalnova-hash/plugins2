name: Build Nova Silk macOS

on:
  push:
    paths:
      - 'Nova Silk/**'
      - '.github/workflows/build-nova-silk-macos.yml'
  pull_request:
    paths:
      - 'Nova Silk/**'
      - '.github/workflows/build-nova-silk-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Nova Silk/build"

      - name: Configure CMake
        run: cmake -S "Nova Silk" -B "Nova Silk/build"

      - name: Build
        run: cmake --build "Nova Silk/build" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaSilk-macOS-build
          path: Nova Silk/build