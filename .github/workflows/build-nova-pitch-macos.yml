name: Build Nova Pitch macOS

on:
  workflow_dispatch:
  push:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'
  pull_request:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve project paths
        run: |
          set -e
          SRC_DIR="Nova Pitch"

          if [ ! -f "$SRC_DIR/CMakeLists.txt" ]; then
            echo "Nova Pitch workflow expected CMakeLists at '$SRC_DIR/CMakeLists.txt' but it was not found."
            exit 1
          fi

          BUILD_DIR="$SRC_DIR/build"

          echo "SRC_DIR=$SRC_DIR" >> "$GITHUB_ENV"
          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
          echo "Resolved SRC_DIR=$SRC_DIR"
          echo "Resolved BUILD_DIR=$BUILD_DIR"

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "$BUILD_DIR"

      - name: Configure CMake
        run: cmake -S "$SRC_DIR" -B "$BUILD_DIR"

      - name: Build
        run: cmake --build "$BUILD_DIR" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaPitch-macOS-build
          path: ${{ env.BUILD_DIR }}
