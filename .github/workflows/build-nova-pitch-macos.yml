name: Build Nova Pitch macOS

on:
  workflow_dispatch:
  push:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'
  pull_request:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve project paths
        run: |
          set -e
          if [ -f "Nova Pitch/CMakeLists.txt" ]; then
            SRC_DIR="Nova Pitch"
          elif [ -f "./CMakeLists.txt" ]; then
            SRC_DIR="."
          elif [ -f "Source/CMakeLists.txt" ]; then
            SRC_DIR="Source"
          else
            SRC_DIR="$(dirname "$(find . -maxdepth 4 -name CMakeLists.txt | head -n 1)")"
          fi

          if [ -z "$SRC_DIR" ] || [ ! -f "$SRC_DIR/CMakeLists.txt" ]; then
            echo "Could not locate CMakeLists.txt for Nova Pitch workflow."
            exit 1
          fi

          if [ "$SRC_DIR" = "." ]; then
            BUILD_DIR="build"
          else
            BUILD_DIR="$SRC_DIR/build"
          fi

          echo "SRC_DIR=$SRC_DIR" >> "$GITHUB_ENV"
          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
          echo "Resolved SRC_DIR=$SRC_DIR"
          echo "Resolved BUILD_DIR=$BUILD_DIR"

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "$BUILD_DIR"

      - name: Configure CMake
        run: cmake -S "$SRC_DIR" -B "$BUILD_DIR"

      - name: Build
        run: cmake --build "$BUILD_DIR" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaPitch-macOS-build
          path: ${{ env.BUILD_DIR }}
