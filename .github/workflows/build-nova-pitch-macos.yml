name: Build Nova Pitch macOS
# CI retrigger note: harmless metadata touch to force a fresh path-filtered run.
# CI retrigger note 2: no functional changes. [retrigger 2026-04-27d]
run-name: Nova Pitch macOS | ${{ github.event_name }} | ${{ github.sha }}

on:
  push:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'
  pull_request:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          brew install cmake

      - name: Build Rubber Band as universal static lib
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v4.0.0 https://github.com/breakfastquay/rubberband.git /tmp/rubberband-src

          # Compile the single-file build with both architectures in one clang pass.
          # Avoids meson cross-compilation issues entirely.
          clang++ -arch arm64 -arch x86_64 \
            -std=c++17 -O2 \
            -mmacosx-version-min=11.0 \
            -DHAVE_VDSP=1 \
            -DUSE_BQRESAMPLER=1 \
            -DNDEBUG \
            -I/tmp/rubberband-src \
            -c /tmp/rubberband-src/single/RubberBandSingle.cpp \
            -o /tmp/rubberband.o

          ar rcs /tmp/librubberband.a /tmp/rubberband.o

          mkdir -p /tmp/rubberband-universal/lib
          cp /tmp/librubberband.a /tmp/rubberband-universal/lib/librubberband.a
          mkdir -p /tmp/rubberband-universal/include
          cp -r /tmp/rubberband-src/rubberband /tmp/rubberband-universal/include/rubberband

          echo "Universal Rubber Band built:"
          lipo -info /tmp/rubberband-universal/lib/librubberband.a

      - name: Clean build directory
        run: rm -rf "Nova Pitch/build"

      - name: Configure CMake
        run: |
          cmake -S "Nova Pitch" -B "Nova Pitch/build" \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DRUBBERBAND_STATIC_LIB=/tmp/rubberband-universal/lib/librubberband.a \
            -DRUBBERBAND_INCLUDE_DIR=/tmp/rubberband-universal/include

      - name: Build
        run: cmake --build "Nova Pitch/build" --config Release

      - name: Package VST3 Bundle
        run: |
          cd "Nova Pitch/build/NovaPitch_artefacts/VST3"
          ditto -c -k --sequesterRsrc --keepParent "Nova Pitch.vst3" "NovaPitch-macOS-vst3.zip"

      - name: Package AU Bundle
        run: |
          cd "Nova Pitch/build/NovaPitch_artefacts/AU"
          ditto -c -k --sequesterRsrc --keepParent "Nova Pitch.component" "NovaPitch-macOS-au.zip"

      - name: Upload Deliverables Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaPitch-macOS-deliverables
          path: |
            Nova Pitch/build/NovaPitch_artefacts/VST3/NovaPitch-macOS-vst3.zip
            Nova Pitch/build/NovaPitch_artefacts/AU/NovaPitch-macOS-au.zip

      - name: Upload Full Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaPitch-macOS-build
          path: Nova Pitch/build
