name: Build Nova Pitch macOS

on:
  workflow_dispatch:
  push:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'
  pull_request:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: |
          if [ -f "Nova Pitch/CMakeLists.txt" ]; then
            rm -rf "Nova Pitch/build"
          else
            rm -rf "build"
          fi

      - name: Configure CMake
        run: |
          if [ -f "Nova Pitch/CMakeLists.txt" ]; then
            cmake -S "Nova Pitch" -B "Nova Pitch/build"
          else
            cmake -S . -B build
          fi

      - name: Build
        run: |
          if [ -f "Nova Pitch/CMakeLists.txt" ]; then
            cmake --build "Nova Pitch/build" --config Release
          else
            cmake --build build --config Release
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaPitch-macOS-build
          path: |
            Nova Pitch/build
            build
