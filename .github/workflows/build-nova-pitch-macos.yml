name: Build Nova Pitch macOS
# CI retrigger note: harmless metadata touch to force a fresh path-filtered run.
# CI retrigger note 2: no functional changes. [retrigger 2026-04-27d]
run-name: Nova Pitch macOS | ${{ github.event_name }} | ${{ github.sha }}

on:
  push:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'
  pull_request:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          brew install cmake pkg-config rubberband

      - name: Clean build directory
        run: rm -rf "Nova Pitch/build"

      - name: Configure CMake
        run: cmake -S "Nova Pitch" -B "Nova Pitch/build" -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build "Nova Pitch/build" --config Release

      - name: Bundle Runtime dylibs (macOS)
        run: |
          set -euo pipefail

          collect_deps() {
            local target="$1"
            otool -L "$target" | tail -n +2 | awk '{print $1}' | grep -E '^(/opt/homebrew|/usr/local)/' || true
          }

          copy_dep() {
            local dep="$1"
            local frameworks="$2"
            local base
            base="$(basename "$dep")"
            if [[ ! -f "$frameworks/$base" ]]; then
              cp -f "$dep" "$frameworks/$base"
              chmod +w "$frameworks/$base" || true
            fi
          }

          bundle_target() {
            local binary="$1"
            local contents_dir="$2"
            local frameworks
            frameworks="$contents_dir/Frameworks"

            if [[ ! -f "$binary" ]]; then
              return 0
            fi

            mkdir -p "$frameworks"

            # Copy direct deps first.
            while IFS= read -r dep; do
              [[ -z "$dep" ]] && continue
              copy_dep "$dep" "$frameworks"
            done < <(collect_deps "$binary")

            # Copy transitive deps from copied dylibs.
            for _ in 1 2 3 4; do
              for dylib in "$frameworks"/*.dylib; do
                [[ -f "$dylib" ]] || continue
                while IFS= read -r dep; do
                  [[ -z "$dep" ]] && continue
                  copy_dep "$dep" "$frameworks"
                done < <(collect_deps "$dylib")
              done
            done

            # Rewrite main binary refs to local Frameworks.
            while IFS= read -r dep; do
              [[ -z "$dep" ]] && continue
              local base
              base="$(basename "$dep")"
              install_name_tool -change "$dep" "@loader_path/../Frameworks/$base" "$binary" || true
            done < <(collect_deps "$binary")

            # Rewrite dylib install IDs and internal deps.
            for dylib in "$frameworks"/*.dylib; do
              [[ -f "$dylib" ]] || continue
              local base
              base="$(basename "$dylib")"
              install_name_tool -id "@loader_path/$base" "$dylib" || true
              while IFS= read -r dep; do
                [[ -z "$dep" ]] && continue
                local dep_base
                dep_base="$(basename "$dep")"
                install_name_tool -change "$dep" "@loader_path/$dep_base" "$dylib" || true
              done < <(collect_deps "$dylib")
            done

            # Re-sign bundle after install_name edits.
            codesign --force --deep --sign - "$contents_dir" || true
          }

          BROOT="Nova Pitch/build/NovaPitch_artefacts"

          bundle_target "$BROOT/VST3/Nova Pitch.vst3/Contents/MacOS/Nova Pitch" "$BROOT/VST3/Nova Pitch.vst3/Contents"
          bundle_target "$BROOT/AU/Nova Pitch.component/Contents/MacOS/Nova Pitch" "$BROOT/AU/Nova Pitch.component/Contents"
          bundle_target "$BROOT/Standalone/Nova Pitch.app/Contents/MacOS/Nova Pitch" "$BROOT/Standalone/Nova Pitch.app/Contents"

      - name: Package VST3 Bundle
        run: |
          cd "Nova Pitch/build/NovaPitch_artefacts/VST3"
          ditto -c -k --sequesterRsrc --keepParent "Nova Pitch.vst3" "NovaPitch-macOS-vst3.zip"

      - name: Package AU Bundle
        run: |
          cd "Nova Pitch/build/NovaPitch_artefacts/AU"
          ditto -c -k --sequesterRsrc --keepParent "Nova Pitch.component" "NovaPitch-macOS-au.zip"

      - name: Upload Deliverables Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaPitch-macOS-deliverables
          path: |
            Nova Pitch/build/NovaPitch_artefacts/VST3/NovaPitch-macOS-vst3.zip
            Nova Pitch/build/NovaPitch_artefacts/AU/NovaPitch-macOS-au.zip

      - name: Upload Full Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaPitch-macOS-build
          path: Nova Pitch/build
