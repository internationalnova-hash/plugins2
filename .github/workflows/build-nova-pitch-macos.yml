name: Build Nova Pitch macOS

on:
  push:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'
  pull_request:
    paths:
      - 'Nova Pitch/**'
      - '.github/workflows/build-nova-pitch-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Nova Pitch/build"

      - name: Configure CMake
        run: cmake -S "Nova Pitch" -B "Nova Pitch/build"

      - name: Build
        run: cmake --build "Nova Pitch/build" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaPitch-macOS-build
          path: Nova Pitch/build
