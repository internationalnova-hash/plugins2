name: Build Nova Silk Windows

on:
  push:
    paths:
      - 'Nova Silk/**'
      - '.github/workflows/build-nova-silk-windows.yml'
  pull_request:
    paths:
      - 'Nova Silk/**'
      - '.github/workflows/build-nova-silk-windows.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Clean build directory
        shell: pwsh
        run: if (Test-Path "Nova Silk/build") { Remove-Item -Recurse -Force "Nova Silk/build" }

      - name: Install WebView2 SDK package
        shell: pwsh
        run: |
          $version = "1.0.1901.177"
          $pkgRoot = Join-Path $env:RUNNER_TEMP "webview2"
          New-Item -ItemType Directory -Path $pkgRoot -Force | Out-Null
          $nupkg = Join-Path $pkgRoot "Microsoft.Web.WebView2.$version.nupkg"
          $extractDir = Join-Path $pkgRoot "Microsoft.Web.WebView2.$version"
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/$version" -OutFile $nupkg
          Expand-Archive -Path $nupkg -DestinationPath $extractDir -Force

          # NuGet archives can unpack either directly into $extractDir or into a nested package folder.
          $candidatePackageRoot = Get-ChildItem -Path $extractDir -Directory |
            Where-Object { $_.Name -like "*Microsoft.Web.WebView2*" } |
            Select-Object -First 1
          if ($null -eq $candidatePackageRoot) {
            $candidatePackageRoot = Get-Item $extractDir
          }

          $webview2Include = Join-Path $candidatePackageRoot.FullName "build/native/include"
          $webview2Library = Join-Path $candidatePackageRoot.FullName "build/native/x64/WebView2LoaderStatic.lib"

          if (-not (Test-Path $webview2Include)) { throw "WebView2 include directory missing: $webview2Include" }
          if (-not (Test-Path $webview2Library)) { throw "WebView2 static library missing: $webview2Library" }

          # Point JUCE at the parent directory where package folders are discovered.
          "JUCE_WEBVIEW2_PACKAGE_LOCATION=$pkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WEBVIEW2_INCLUDE_DIR=$webview2Include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WEBVIEW2_LIBRARY=$webview2Library" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake
        shell: pwsh
        run: >
          cmake -S "Nova Silk" -B "Nova Silk/build"
          -DJUCE_WEBVIEW2_PACKAGE_LOCATION="$env:JUCE_WEBVIEW2_PACKAGE_LOCATION"
          -DWebView2_include_dir="$env:WEBVIEW2_INCLUDE_DIR"
          -DWebView2_library="$env:WEBVIEW2_LIBRARY"

      - name: Build
        shell: pwsh
        run: cmake --build "Nova Silk/build" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaSilk-Windows-build
          path: Nova Silk/build