name: Build Nova Tune macOS

on:
  push:
    paths:
      - 'Nova Tune/**'
      - '.github/workflows/build-nova-tune-macos.yml'
  pull_request:
    paths:
      - 'Nova Tune/**'
      - '.github/workflows/build-nova-tune-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Nova Tune/build"

      - name: Configure CMake
        run: cmake -S "Nova Tune" -B "Nova Tune/build"

      - name: Build
        run: cmake --build "Nova Tune/build" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaTune-macOS-build
          path: Nova Tune/build