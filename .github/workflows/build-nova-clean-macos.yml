name: Build Nova Clean macOS
run-name: Nova Clean macOS | ${{ github.event_name }} | ${{ github.sha }}

on:
  push:
    paths:
      - 'Nova Clean/**'
      - '.github/workflows/build-nova-clean-macos.yml'
  pull_request:
    paths:
      - 'Nova Clean/**'
      - '.github/workflows/build-nova-clean-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Nova Clean/build"

      - name: Configure CMake
        run: cmake -S "Nova Clean" -B "Nova Clean/build"

      - name: Build
        run: cmake --build "Nova Clean/build" --config Release

      - name: Package VST3 Bundle
        run: |
          cd "Nova Clean/build/NovaCleanV2_artefacts/VST3"
          ditto -c -k --sequesterRsrc --keepParent "Nova Clean.vst3" "NovaClean-macOS-vst3.zip"

      - name: Package AU Bundle
        run: |
          cd "Nova Clean/build/NovaCleanV2_artefacts/AU"
          ditto -c -k --sequesterRsrc --keepParent "Nova Clean.component" "NovaClean-macOS-au.zip"

      - name: Upload Deliverables Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaClean-macOS-deliverables
          path: |
            Nova Clean/build/NovaCleanV2_artefacts/VST3/NovaClean-macOS-vst3.zip
            Nova Clean/build/NovaCleanV2_artefacts/AU/NovaClean-macOS-au.zip

      - name: Upload Full Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaClean-macOS-build
          path: Nova Clean/build
