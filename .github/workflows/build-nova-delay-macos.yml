name: Build Nova Delay macOS

on:
  push:
    paths:
      - 'Nova Delay/**'
      - '.github/workflows/build-nova-delay-macos.yml'
  pull_request:
    paths:
      - 'Nova Delay/**'
      - '.github/workflows/build-nova-delay-macos.yml'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Nova Delay/build"

      - name: Configure CMake
        run: cmake -S "Nova Delay" -B "Nova Delay/build"

      - name: Build
        run: cmake --build "Nova Delay/build" --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovaDelay-macOS-build
          path: Nova Delay/build
