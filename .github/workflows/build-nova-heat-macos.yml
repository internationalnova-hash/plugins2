name: Build Nova Heat macOS

on:
  workflow_dispatch:
  push:
    paths:
      - 'Nova Heat/**'
      - '.github/workflows/build-nova-heat-macos.yml'
  pull_request:
    paths:
      - 'Nova Heat/**'
      - '.github/workflows/build-nova-heat-macos.yml'

jobs:
  build:
    runs-on: macos-14
    env:
      PLUGIN_BUNDLE: Nova Heat/build/NovaHeat_artefacts/VST3/Nova Heat.vst3
      ZIP_PATH: Nova Heat/build/NovaHeat_artefacts/VST3/Nova Heat.vst3.zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Clean build directory
        run: rm -rf "Nova Heat/build"

      - name: Configure CMake
        run: cmake -S "Nova Heat" -B "Nova Heat/build" -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build "Nova Heat/build" --config Release

      - name: Verify plugin architectures
        run: lipo -archs "$PLUGIN_BUNDLE/Contents/MacOS/Nova Heat"

      - name: Import Developer ID certificate
        if: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEV_ID_APPLICATION != '' }}
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > cert.p12
          security create-keychain -p "build" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "build" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "build" build.keychain

      - name: Code sign plugin bundle
        if: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEV_ID_APPLICATION != '' }}
        env:
          APPLE_DEV_ID_APPLICATION: ${{ secrets.APPLE_DEV_ID_APPLICATION }}
        run: |
          codesign --force --deep --options runtime --timestamp --sign "$APPLE_DEV_ID_APPLICATION" "$PLUGIN_BUNDLE"
          codesign --verify --deep --strict --verbose=2 "$PLUGIN_BUNDLE"

      - name: Ad-hoc sign plugin bundle (fallback)
        if: ${{ !(secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEV_ID_APPLICATION != '') }}
        run: |
          codesign --force --deep --sign - "$PLUGIN_BUNDLE"
          codesign --verify --deep --strict --verbose=2 "$PLUGIN_BUNDLE"

      - name: Prepare zip for notarization
        if: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEV_ID_APPLICATION != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        run: |
          rm -f "$ZIP_PATH"
          ditto -c -k --keepParent "$PLUGIN_BUNDLE" "$ZIP_PATH"

      - name: Notarize plugin zip
        if: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEV_ID_APPLICATION != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        if: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEV_ID_APPLICATION != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        run: |
          xcrun stapler staple "$PLUGIN_BUNDLE"
          xcrun stapler validate "$PLUGIN_BUNDLE"

      - name: Upload notarized artifact
        if: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEV_ID_APPLICATION != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: NovaHeat-macOS-notarized
          path: Nova Heat/build/NovaHeat_artefacts/VST3/Nova Heat.vst3

      - name: Upload Artifacts
        if: ${{ !(secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_DEV_ID_APPLICATION != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '') }}
        uses: actions/upload-artifact@v4
        with:
          name: NovaHeat-macOS-build
          path: Nova Heat/build/NovaHeat_artefacts/VST3/Nova Heat.vst3
