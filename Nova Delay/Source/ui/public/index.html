<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Delay</title>
  <style>
    :root {
      --bg0: #040201;
      --bg1: #0b0704;
      --bg2: #130d08;
      --line: rgba(255, 165, 70, 0.36);
      --line-soft: rgba(189, 116, 39, 0.22);
      --text: #f5ead9;
      --text-soft: #cab08f;
      --amber: #f2a33d;
      --amber-hot: #ffd07a;
      --gold: #ce8b35;
      --ease: 220ms cubic-bezier(0.22, 1, 0.36, 1);
      --shell-pad: 9px;
      --row-gap: 9px;
      --top-row: 76px;
      --visual-row: 156px;
      --bottom-row: 106px;
      --panel-radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(120% 110% at 50% 45%, rgba(126, 73, 23, 0.25) 0%, rgba(12, 8, 5, 0.42) 46%, transparent 72%),
        radial-gradient(90% 80% at 50% 60%, rgba(255, 160, 66, 0.07) 0%, transparent 60%),
        linear-gradient(180deg, #040201 0%, #050302 100%);
      font-family: "Arial Narrow", "Avenir Next Condensed", "Helvetica Neue", sans-serif;
      color: var(--text);
      letter-spacing: 0.04em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plugin {
      position: relative;
      width: 980px;
      height: 640px;
      border-radius: 26px;
      border: 1px solid rgba(230, 153, 62, 0.30);
      overflow: hidden;
      background: #070403;
    }

    .fit-frame {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .ui-scale-root {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: var(--top-row) var(--visual-row) minmax(0, 1fr) var(--bottom-row);
      gap: var(--row-gap);
      padding: var(--shell-pad);
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 171, 71, 0.15), rgba(64, 37, 17, 0.12) 34%, transparent 62%),
        radial-gradient(95% 60% at 50% 46%, rgba(255, 146, 50, 0.07), transparent 65%),
        linear-gradient(180deg, #140d08 0%, #090604 55%, #040201 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -30px 54px rgba(0,0,0,0.58),
        inset 0 0 120px rgba(255, 172, 74, 0.04),
        0 36px 72px rgba(0,0,0,0.74);
      align-content: stretch;
    }

    .ui-scale-root::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: 26px;
      pointer-events: none;
      background:
        radial-gradient(86% 56% at 50% 39%, rgba(255, 182, 88, 0.14), transparent 68%),
        linear-gradient(180deg, rgba(255,255,255,0.045), transparent 26%),
        radial-gradient(122% 122% at 50% 50%, transparent 52%, rgba(0,0,0,0.50) 100%);
    }

    .ui-scale-root::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(255, 211, 145, 0.030) 0.55px, transparent 0.85px),
        radial-gradient(rgba(255, 197, 118, 0.02) 0.55px, transparent 0.85px),
        linear-gradient(115deg, rgba(255,255,255,0.015), rgba(255,255,255,0));
      background-size: 2px 2px, 3px 3px, 100% 100%;
      opacity: 0.38;
      mix-blend-mode: soft-light;
    }

    .ui-scale-root > * {
      min-height: 0;
      position: relative;
      z-index: 2;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr) minmax(220px, 1fr);
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--line-soft);
      background:
        linear-gradient(180deg, rgba(255, 182, 95, 0.08), rgba(0,0,0,0.08)),
        linear-gradient(180deg, rgba(0,0,0,0.42), rgba(0,0,0,0.16));
      box-shadow: inset 0 -10px 18px rgba(0,0,0,0.26);
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 27px;
      letter-spacing: 0.24em;
      color: #e8dccb;
      text-transform: uppercase;
      min-width: 0;
    }

    .logo-box {
      width: 54px;
      height: 54px;
      flex: 0 0 54px;
      border-radius: 12px;
      border: 1px solid rgba(197, 122, 33, 0.62);
      background: linear-gradient(150deg, rgba(27, 18, 10, 0.95), rgba(10, 7, 4, 0.96));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 0 24px rgba(255, 168, 68, 0.20);
      display: grid;
      place-items: center;
    }

    .logo-box img {
      width: 36px;
      height: 36px;
      filter: drop-shadow(0 0 8px rgba(255, 175, 74, 0.45));
    }

    .brand-center {
      text-align: center;
      text-transform: uppercase;
      min-width: 0;
    }

    .brand-title {
      font-size: 37px;
      letter-spacing: 0.16em;
      font-weight: 800;
      line-height: 0.95;
      white-space: nowrap;
    }

    .brand-title .nova {
      color: #f0e9dc;
    }

    .brand-title .delay {
      color: var(--amber);
      text-shadow: 0 0 20px rgba(255, 170, 68, 0.35), 0 0 44px rgba(255, 153, 51, 0.16);
    }

    .brand-sub {
      margin-top: 3px;
      font-size: 18px;
      letter-spacing: 0.22em;
      color: #c9b196;
      white-space: nowrap;
    }

    .preset-box {
      justify-self: end;
      width: 100%;
      max-width: 290px;
      display: grid;
      gap: 6px;
    }

    .preset-box label {
      font-size: 18px;
      letter-spacing: 0.20em;
      color: #decbb3;
    }

    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      height: 28px;
      border-radius: 7px;
      border: 1px solid rgba(235, 152, 54, 0.44);
      background: linear-gradient(180deg, rgba(33, 22, 14, 0.96), rgba(10, 6, 4, 0.96));
      color: #f2dec0;
      font-size: 13px;
      padding: 0 8px;
      font-family: inherit;
      letter-spacing: 0.06em;
      outline: none;
      transition: border-color var(--ease), box-shadow var(--ease);
    }

    select:focus {
      border-color: rgba(255, 179, 82, 0.9);
      box-shadow: 0 0 0 1px rgba(255, 179, 82, 0.35), 0 0 18px rgba(255, 166, 65, 0.2);
    }

    .visual-panel {
      border: 1px solid rgba(233, 150, 55, 0.36);
      border-radius: var(--panel-radius);
      padding: 8px;
      background:
        radial-gradient(64% 96% at 50% 50%, rgba(255, 156, 52, 0.24), rgba(78, 45, 18, 0.10) 34%, rgba(10, 7, 5, 0.86) 76%),
        linear-gradient(180deg, rgba(20, 12, 8, 0.94), rgba(7, 4, 3, 0.95));
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr) 82px;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 8px 8px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.42),
        inset 0 -26px 36px rgba(0,0,0,0.40),
        0 1px 0 rgba(255, 188, 104, 0.16),
        0 16px 26px rgba(0,0,0,0.36);
      align-items: stretch;
    }

    .meter-wrap {
      display: grid;
      grid-template-rows: auto 1fr;
      justify-items: center;
      align-items: start;
      gap: 6px;
      min-width: 0;
    }

    .stereo-meter-group {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 7px;
      align-items: end;
    }

    .meter-column {
      display: grid;
      justify-items: center;
      gap: 3px;
    }

    .meter-ch {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #d9bf9e;
      text-transform: uppercase;
      opacity: 0.92;
    }

    .meter-label {
      font-size: 18px;
      letter-spacing: 0.08em;
      white-space: nowrap;
      color: #ddc9af;
      text-transform: uppercase;
      line-height: 1;
    }

    .meter {
      width: 13px;
      height: 118px;
      border: 1px solid rgba(171, 108, 38, 0.44);
      border-radius: 10px;
      padding: 3px 2px;
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
      background: rgba(8, 6, 4, 0.9);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .meter .bar {
      height: 5px;
      border-radius: 2px;
      background: linear-gradient(180deg, rgba(129, 91, 38, 0.7), rgba(82, 56, 23, 0.7));
      transition: background 90ms linear, box-shadow 90ms linear;
    }

    .meter .bar.on {
      background: linear-gradient(180deg, #ffd07e 0%, #dd912f 100%);
      box-shadow: 0 0 8px rgba(255, 173, 68, 0.25);
    }

    .meter .bar.hot {
      background: linear-gradient(180deg, #ffbea0 0%, #ff5d2f 100%);
      box-shadow: 0 0 9px rgba(255, 88, 42, 0.38);
    }

    #echoViz {
      display: block;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 80px;
      border-radius: 12px;
      background:
        radial-gradient(70% 90% at 50% 48%, rgba(255, 167, 58, 0.15), rgba(145, 78, 28, 0.10) 34%, transparent 64%),
        linear-gradient(180deg, rgba(16,10,7,0.96), rgba(6,4,3,0.97));
      border: 1px solid rgba(201, 125, 46, 0.30);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -14px 22px rgba(0,0,0,0.42),
        0 0 36px rgba(255, 163, 58, 0.12);
    }

    .sync-readout {
      position: absolute;
      top: 9px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 30px;
      color: #ffd38f;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(255, 174, 73, 0.44), 0 0 28px rgba(255, 145, 47, 0.26);
      pointer-events: none;
      background:
        radial-gradient(90% 120% at 50% 0%, rgba(255, 186, 100, 0.16), transparent 65%),
        repeating-linear-gradient(115deg, rgba(255,255,255,0.02) 0 2px, rgba(255,255,255,0) 2px 6px),
        linear-gradient(180deg, rgba(22, 14, 9, 0.82), rgba(8, 5, 3, 0.46));
      padding: 4px 10px 5px;
      border-radius: 10px;
      border: 1px solid rgba(255, 168, 61, 0.34);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), inset 0 -10px 13px rgba(0,0,0,0.26), 0 10px 16px rgba(0,0,0,0.36), 0 0 24px rgba(255, 168, 61, 0.20);
      white-space: nowrap;
    }

    .controls-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 188px;
      gap: 8px;
      overflow: hidden;
      align-items: stretch;
    }

    .knob-bank {
      border: 1px solid rgba(228, 147, 55, 0.28);
      border-radius: var(--panel-radius);
      background: linear-gradient(180deg, rgba(26, 17, 11, 0.90), rgba(11, 7, 5, 0.92));
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.42), inset 0 -20px 28px rgba(0,0,0,0.37), 0 14px 22px rgba(0,0,0,0.30);
      min-width: 0;
    }

    .knob-wrap {
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 4px;
      min-width: 0;
    }

    .knob-title {
      font-size: 14px;
      letter-spacing: 0.10em;
      color: #e8d7c0;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.05;
      min-height: 28px;
      display: grid;
      align-items: end;
    }

    .knob {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(232, 151, 58, 0.48);
      background:
        radial-gradient(circle at 34% 22%, rgba(255,255,255,0.22), transparent 38%),
        repeating-conic-gradient(from 0deg, rgba(255,255,255,0.05) 0deg 8deg, rgba(0,0,0,0.08) 8deg 16deg),
        radial-gradient(circle at 48% 60%, #2f261d 0%, #1a130e 52%, #0d0906 100%);
      box-shadow:
        inset 0 2px 1px rgba(255,255,255,0.14),
        inset 0 -18px 22px rgba(0,0,0,0.54),
        inset 0 0 30px rgba(255, 178, 81, 0.07),
        0 12px 18px rgba(0,0,0,0.56),
        0 0 24px rgba(255, 161, 53, 0.16);
      cursor: ns-resize;
      user-select: none;
      touch-action: none;
      flex-shrink: 0;
    }

    .knob::before {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      background: repeating-conic-gradient(from -140deg, rgba(255, 191, 113, 0.36) 0deg 1.8deg, transparent 1.8deg 8deg);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 5px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 5px));
      opacity: 0.55;
      pointer-events: none;
    }

    .knob-wrap:nth-child(odd) .knob {
      background:
        radial-gradient(circle at 31% 20%, rgba(255,255,255,0.24), transparent 37%),
        repeating-conic-gradient(from 4deg, rgba(255,255,255,0.045) 0deg 7deg, rgba(0,0,0,0.08) 7deg 15deg),
        radial-gradient(circle at 47% 59%, #31271e 0%, #1b140f 52%, #0c0805 100%);
    }

    .knob-wrap:nth-child(even) .knob {
      background:
        radial-gradient(circle at 37% 24%, rgba(255,255,255,0.19), transparent 39%),
        repeating-conic-gradient(from -3deg, rgba(255,255,255,0.055) 0deg 8deg, rgba(0,0,0,0.09) 8deg 16deg),
        radial-gradient(circle at 50% 61%, #2d241b 0%, #19120d 53%, #0b0704 100%);
    }

    .knob::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 8px;
      width: 4px;
      height: 18px;
      transform: translateX(-50%);
      border-radius: 99px;
      background: linear-gradient(180deg, #fff0cd 0%, #efab44 100%);
      box-shadow: 0 0 8px rgba(255, 172, 65, 0.52), 0 0 20px rgba(255, 153, 44, 0.30), 0 -2px 5px rgba(255, 233, 183, 0.30);
      transform-origin: 50% 33px;
      rotate: var(--turn, -140deg);
    }

    .ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from -140deg, rgba(255, 214, 152, 0.99) var(--fill, 0%), rgba(255, 160, 50, 0.74) calc(var(--fill, 0%) + 6%), rgba(74, 44, 18, 0.11) calc(var(--fill, 0%) + 7%), rgba(38, 24, 10, 0.28) 100%);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 7px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 7px));
      filter: drop-shadow(0 0 10px rgba(255, 186, 92, 0.75)) drop-shadow(0 0 24px rgba(255, 152, 48, 0.38));
      pointer-events: none;
    }

    .knob-value {
      font-size: 18px;
      color: var(--amber-hot);
      letter-spacing: 0.04em;
      text-shadow: 0 0 12px rgba(255, 170, 66, 0.2);
      min-height: 18px;
      line-height: 1;
    }

    .knob-note {
      font-size: 9px;
      letter-spacing: 0.08em;
      color: #d4b896;
      text-transform: uppercase;
      text-align: center;
      min-height: 10px;
      line-height: 1.1;
    }

    .small-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      width: 100%;
      align-items: center;
    }

    .small-buttons .toggle {
      width: 100%;
      min-width: 0;
      padding: 0 4px;
      font-size: 10px;
    }

    .sync-note-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 3px;
      width: 100%;
      transition: opacity var(--ease), filter var(--ease);
    }

    .sync-note-row.disabled {
      opacity: 0.32;
      filter: saturate(0.55);
      pointer-events: none;
    }

    .sync-note-btn {
      min-width: 0;
      height: 18px;
      border-radius: 7px;
      border: 1px solid rgba(214, 137, 52, 0.42);
      background: linear-gradient(180deg, rgba(28, 18, 11, 0.95), rgba(10, 7, 4, 0.96));
      color: #dcbf9c;
      font-size: 9px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--ease);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.09), 0 5px 8px rgba(0,0,0,0.25);
      padding: 0;
    }

    .sync-note-btn.active {
      color: #ffe7c2;
      border-color: rgba(255, 173, 69, 0.95);
      background: linear-gradient(180deg, rgba(101, 58, 22, 0.96), rgba(43, 25, 10, 0.98));
      box-shadow: 0 0 12px rgba(255, 169, 60, 0.34), inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .toggle,
    .mode-btn {
      height: 26px;
      border-radius: 8px;
      border: 1px solid rgba(219, 143, 54, 0.52);
      background: linear-gradient(180deg, rgba(33, 21, 13, 0.98), rgba(12, 8, 5, 0.98));
      color: #e6cfb1;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 8px;
      transition: all var(--ease);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 6px 10px rgba(0,0,0,0.28);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      line-height: 1;
      min-width: 0;
    }

    .toggle svg {
      width: 11px;
      height: 11px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      opacity: 0.95;
      filter: drop-shadow(0 0 5px rgba(255, 170, 62, 0.22));
    }

    .toggle.active,
    .mode-btn.active {
      color: #ffe8c5;
      border-color: rgba(255, 170, 62, 0.95);
      background: linear-gradient(180deg, rgba(86, 49, 17, 0.95), rgba(36, 21, 9, 0.98));
      box-shadow: 0 0 16px rgba(255, 162, 58, 0.38), 0 0 28px rgba(255, 129, 38, 0.22), inset 0 1px 0 rgba(255,255,255,0.20), inset 0 -4px 10px rgba(0,0,0,0.28);
    }

    .right-panel {
      border: 1px solid rgba(228, 147, 55, 0.30);
      border-radius: var(--panel-radius);
      background: linear-gradient(180deg, rgba(28, 17, 11, 0.90), rgba(10, 7, 5, 0.92));
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      align-content: stretch;
      min-width: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.44), inset 0 -18px 26px rgba(0,0,0,0.38), 0 14px 22px rgba(0,0,0,0.32);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .fx-btn {
      border-radius: 10px;
      border: 1px solid rgba(202, 128, 44, 0.56);
      background: linear-gradient(180deg, rgba(38, 24, 15, 0.98), rgba(11, 7, 4, 0.98));
      color: #e8d2b3;
      font-size: 12px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      min-height: 50px;
      padding: 0 6px;
      cursor: pointer;
      transition: all var(--ease);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 8px 14px rgba(0,0,0,0.34);
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 3px;
      line-height: 1;
    }

    .fx-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      opacity: 0.92;
      filter: drop-shadow(0 0 6px rgba(255, 166, 60, 0.18));
    }

    .fx-btn .fx-text {
      font-size: 12px;
      letter-spacing: 0.07em;
    }

    .fx-btn.active {
      background: linear-gradient(180deg, rgba(103, 57, 19, 0.98), rgba(49, 29, 11, 0.98));
      border-color: rgba(255, 169, 60, 0.9);
      box-shadow: 0 0 16px rgba(255, 164, 57, 0.42), 0 0 28px rgba(255, 132, 42, 0.24), inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -6px 12px rgba(0,0,0,0.30);
      color: #ffe9c7;
    }

    .fx-btn:active,
    .toggle:active,
    .mode-btn:active {
      transform: translateY(1px);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.42);
    }

    .sat-wrap {
      border: 1px solid rgba(205, 132, 48, 0.48);
      border-radius: 11px;
      padding: 6px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 4px;
      background: linear-gradient(180deg, rgba(20, 12, 8, 0.96), rgba(9, 6, 4, 0.96));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.40), inset 0 -14px 18px rgba(0,0,0,0.34);
    }

    .sat-wrap .knob {
      width: 66px;
      height: 66px;
    }

    .sat-wrap .knob-value {
      font-size: 15px;

  <script>
const choices = {
  preset: ["Vintage Echo", "Modern Tape", "BBD Lo-Fi", "Dub Space"],
  delay_time_sync: ["1/32", "1/16", "1/8", "1/8D", "1/8T", "1/4", "1/4D", "1/4T", "1/2", "1/1"],
  mode: ["Analog", "Tape", "BBD"],
  delay_model: ["Vintage Tape", "Warm Bucket", "Modern Analog", "Echo Chamber"]
};

const presetSnapshots = {
  "Vintage Echo": {
    delay_time_sync: "1/4",
    delay_time_free_ms: 500,
    sync_enabled: 1,
    feedback: 35,
    mix: 40,
    tone: 55,
    wow_flutter: 25,
    saturation: 30,
    mode: "Tape",
    ping_pong: 0,
    stereo: 1,
    lofi: 0,
    freeze: 0,
    hp_filter_hz: 120,
    lp_filter_hz: 6000,
    ducking: 20,
    delay_model: "Vintage Tape"
  },
  "Modern Tape": {
    delay_time_sync: "1/8",
    delay_time_free_ms: 340,
    sync_enabled: 1,
    feedback: 42,
    mix: 34,
    tone: 62,
    wow_flutter: 18,
    saturation: 36,
    mode: "Tape",
    ping_pong: 0,
    stereo: 1,
    lofi: 0,
    freeze: 0,
    hp_filter_hz: 140,
    lp_filter_hz: 7200,
    ducking: 18,
    delay_model: "Modern Analog"
  },
  "BBD Lo-Fi": {
    delay_time_sync: "1/8",
    delay_time_free_ms: 280,
    sync_enabled: 1,
    feedback: 48,
    mix: 38,
    tone: 40,
    wow_flutter: 52,
    saturation: 44,
    mode: "BBD",
    ping_pong: 0,
    stereo: 1,
    lofi: 1,
    freeze: 0,
    hp_filter_hz: 220,
    lp_filter_hz: 4200,
    ducking: 24,
    delay_model: "Warm Bucket"
  },
  "Dub Space": {
    delay_time_sync: "1/2",
    delay_time_free_ms: 760,
    sync_enabled: 1,
    feedback: 62,
    mix: 46,
    tone: 48,
    wow_flutter: 30,
    saturation: 34,
    mode: "Analog",
    ping_pong: 1,
    stereo: 1,
    lofi: 0,
    freeze: 0,
    hp_filter_hz: 180,
    lp_filter_hz: 5600,
    ducking: 28,
    delay_model: "Echo Chamber"
  }
};

const paramStates = {};
const values = {
  preset: "Vintage Echo",
  delay_time_sync: "1/4",
  delay_time_free_ms: 500,
  sync_enabled: 1,
  feedback: 35,
  mix: 40,
  tone: 55,
  wow_flutter: 25,
  saturation: 30,
  mode: "Tape",
  ping_pong: 0,
  stereo: 1,
  lofi: 0,
  freeze: 0,
  hp_filter_hz: 120,
  lp_filter_hz: 6000,
  ducking: 20,
  delay_model: "Vintage Tape"
};

let isUpdating = false;

function ensureJuceInterop() {
  if (window.__JUCE__ && window.__JUCE__.backend) return;

  const noop = () => {};
  window.__JUCE__ = {
    backend: {
      addEventListener: noop,
      removeEventListener: noop,
      emitEvent: noop,
    },
    initialisationData: {
      __juce__functions: [],
      __juce__sliders: [],
      __juce__toggles: [],
      __juce__comboBoxes: [],
    },
  };
}

function createListenerList() {
  return {
    listeners: [],
    addListener(fn) {
      this.listeners.push(fn);
      return this.listeners.length - 1;
    },
    callListeners(payload) {
      this.listeners.forEach((listener) => listener(payload));
    },
  };
}

function createSliderState(name) {
  ensureJuceInterop();
  const backend = window.__JUCE__.backend;

  const state = {
    name,
    identifier: `__juce__slider${name}`,
    scaledValue: 0,
    properties: {
      start: 0,
      end: 1,
      skew: 1,
      interval: 0,
      numSteps: 100,
    },
    valueChangedEvent: createListenerList(),
    addValueChangedListener(fn) {
      return this.valueChangedEvent.addListener(fn);
    },
    getNormalisedValue() {
      const start = typeof this.properties.start === "number" ? this.properties.start : 0;
      const end = typeof this.properties.end === "number" ? this.properties.end : 1;
      const range = end - start;
      if (range === 0) return 0;
      return Math.max(0, Math.min(1, (this.scaledValue - start) / range));
    },
    setNormalisedValue(newValue) {
      const normalised = Math.max(0, Math.min(1, Number(newValue) || 0));
      const start = typeof this.properties.start === "number" ? this.properties.start : 0;
      const end = typeof this.properties.end === "number" ? this.properties.end : 1;
      const interval = typeof this.properties.interval === "number" ? this.properties.interval : 0;

      let scaled = start + normalised * (end - start);
      if (interval > 0) scaled = Math.round(scaled / interval) * interval;

      this.scaledValue = scaled;
      backend.emitEvent(this.identifier, { eventType: "valueChanged", value: scaled });
    },
    sliderDragStarted() {
      backend.emitEvent(this.identifier, { eventType: "sliderDragStarted" });
    },
    sliderDragEnded() {
      backend.emitEvent(this.identifier, { eventType: "sliderDragEnded" });
    },
  };

  backend.addEventListener(state.identifier, (event) => {
    if (!event) return;

    if (event.eventType === "valueChanged") {
      if (typeof event.value === "number") state.scaledValue = event.value;
      state.valueChangedEvent.callListeners(event);
    }

    if (event.eventType === "propertiesChanged") {
      const nextProps = {};
      Object.keys(event).forEach((key) => {
        if (key !== "eventType") nextProps[key] = event[key];
      });
      state.properties = nextProps;
    }
  });

  backend.emitEvent(state.identifier, { eventType: "requestInitialUpdate" });
  return state;
}

function populateSelect(id, options) {
  const select = document.getElementById(id);
  if (!select) return;
  select.innerHTML = options.map((o) => `<option value="${o}">${o}</option>`).join("");
}

function asNorm(param, value) {
  if (choices[param]) {
    const arr = choices[param];
    const idx = Math.max(0, arr.indexOf(String(value)));
    return arr.length <= 1 ? 0 : idx / (arr.length - 1);
  }

  if (["sync_enabled", "ping_pong", "stereo", "lofi", "freeze"].includes(param)) {
    return Number(value) > 0 ? 1 : 0;
  }

  if (param === "delay_time_free_ms") return (value - 20) / 1980;
  if (param === "hp_filter_hz") return (value - 20) / 780;
  if (param === "lp_filter_hz") return (value - 1000) / 17000;

  return Number(value) / 100;
}

function fromNorm(param, norm) {
  const n = Math.max(0, Math.min(1, norm));

  if (choices[param]) {
    const arr = choices[param];
    return arr[Math.round(n * (arr.length - 1))];
  }

  if (["sync_enabled", "ping_pong", "stereo", "lofi", "freeze"].includes(param)) {
    return n >= 0.5 ? 1 : 0;
  }

  if (param === "delay_time_free_ms") return 20 + n * 1980;
  if (param === "hp_filter_hz") return 20 + n * 780;
  if (param === "lp_filter_hz") return 1000 + n * 17000;

  return n * 100;
}

function setParam(param, value) {
  values[param] = value;
  const st = paramStates[param];
  if (st) st.setNormalisedValue(asNorm(param, value));
}

function formatValue(param, value) {
  if (param === "delay_time_free_ms") return `${Math.round(value)} ms`;
  if (param === "feedback" || param === "mix" || param === "tone" || param === "wow_flutter" || param === "saturation" || param === "ducking") return `${Math.round(value)}%`;
  if (param === "hp_filter_hz") return `${Math.round(value)} Hz`;
  if (param === "lp_filter_hz") return `${(value / 1000).toFixed(1)} kHz`;
  return `${value}`;
}

function updateKnobVisual(knob, norm) {
  const n = Math.max(0, Math.min(1, norm));
  const deg = -140 + n * 280;
  knob.style.setProperty("--turn", `${deg}deg`);
  const ring = knob.querySelector(".ring");
  if (ring) ring.style.setProperty("--fill", `${n * 100}%`);
}

function refreshUi() {
  const knobParams = ["feedback", "mix", "tone", "wow_flutter", "saturation", "hp_filter_hz", "lp_filter_hz", "ducking"];
  knobParams.forEach((param) => {
    const knob = document.querySelector(`.knob[data-param="${param}"]`);
    if (knob) updateKnobVisual(knob, asNorm(param, values[param]));
    const readout = document.getElementById(`${param}Value`);
    if (readout) readout.textContent = formatValue(param, values[param]);
  });

  const delayLabel = values.sync_enabled ? values.delay_time_sync : `${Math.round(values.delay_time_free_ms)} ms`;
  const delayReadout = document.getElementById("delayTimeValue");
  const syncDisplay = document.getElementById("syncDisplay");
  if (delayReadout) delayReadout.textContent = delayLabel;
  if (syncDisplay) syncDisplay.textContent = values.sync_enabled ? values.delay_time_sync : "FREE";

  document.querySelectorAll(".toggle[data-param='sync_enabled']").forEach((btn) => {
    const isSync = values.sync_enabled === 1;
    const wanted = Number(btn.dataset.value) === 1;
    btn.classList.toggle("active", wanted === isSync);
  });

  const syncNoteRow = document.getElementById("syncNoteRow");
  if (syncNoteRow) syncNoteRow.classList.toggle("disabled", values.sync_enabled !== 1);

  document.querySelectorAll(".sync-note-btn").forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.syncValue === values.delay_time_sync);
  });

  ["ping_pong", "stereo", "lofi", "freeze"].forEach((param) => {
    const btn = document.querySelector(`.fx-btn[data-param='${param}']`);
    if (btn) btn.classList.toggle("active", values[param] > 0);
  });

  document.querySelectorAll(".mode-btn[data-param='mode']").forEach((btn) => {
    btn.classList.toggle("active", Number(btn.dataset.index) === choices.mode.indexOf(values.mode));
  });

  const presetSelect = document.getElementById("presetSelect");
  if (presetSelect && presetSelect.value !== values.preset) presetSelect.value = values.preset;

  const modelSelect = document.getElementById("delayModelSelect");
  if (modelSelect && modelSelect.value !== values.delay_model) modelSelect.value = values.delay_model;

  const delayKnob = document.getElementById("delayTimeKnob");
  if (delayKnob) {
    const norm = values.sync_enabled ? asNorm("delay_time_sync", values.delay_time_sync) : asNorm("delay_time_free_ms", values.delay_time_free_ms);
    updateKnobVisual(delayKnob, norm);
  }
}

function applyPresetSelection(presetName, pushToBackend) {
  const snapshot = presetSnapshots[presetName];
  values.preset = presetName;

  if (!snapshot) {
    refreshUi();
    return;
  }

  if (pushToBackend) {
    setParam("preset", presetName);
  }

  Object.keys(snapshot).forEach((param) => {
    const next = snapshot[param];
    values[param] = next;
    if (pushToBackend) {
      setParam(param, next);
    }
  });

  refreshUi();
}

function setupKnobDragging() {
  let active = null;

  const getClientY = (event) => {
    if (!event) return 0;
    if (event.touches && event.touches.length) return event.touches[0].clientY;
    if (event.changedTouches && event.changedTouches.length) return event.changedTouches[0].clientY;
    return typeof event.clientY === "number" ? event.clientY : 0;
  };

  const start = (event, knob, param, min, max) => {
    if (event.button !== undefined && event.button !== 0) return;
    event.preventDefault();
    if (event.stopPropagation) event.stopPropagation();
    knob.classList.add("active");
    active = {
      knob,
      param,
      min,
      max,
      pointerId: event.pointerId,
      startY: getClientY(event),
      startValue: Number(values[param])
    };

    if (typeof knob.setPointerCapture === "function" && typeof event.pointerId !== "undefined") {
      try { knob.setPointerCapture(event.pointerId); } catch (e) {}
    }

    if (paramStates[param] && typeof paramStates[param].sliderDragStarted === "function") {
      paramStates[param].sliderDragStarted();
    }
  };

  const move = (event) => {
    if (!active) return;
    event.preventDefault();
    const y = getClientY(event);
    const delta = active.startY - y;
    const next = Math.max(active.min, Math.min(active.max, active.startValue + delta * (active.max - active.min) * 0.005));
    values[active.param] = next;
    setParam(active.param, next);
    refreshUi();
  };

  const end = () => {
    if (!active) return;
    if (paramStates[active.param] && typeof paramStates[active.param].sliderDragEnded === "function") {
      paramStates[active.param].sliderDragEnded();
    }

    if (typeof active.knob.releasePointerCapture === "function" && typeof active.pointerId !== "undefined") {
      try { active.knob.releasePointerCapture(active.pointerId); } catch (e) {}
    }

    active.knob.classList.remove("active");
    active = null;
  };

  const bindDragStart = (element, handler) => {
    if (!element) return;

    if (typeof window.PointerEvent !== "undefined") {
      element.addEventListener("pointerdown", handler);
    }

    element.addEventListener("mousedown", handler);
    element.addEventListener("touchstart", handler, { passive: false });
  };

  document.querySelectorAll(".knob[data-param]").forEach((knob) => {
    const param = knob.dataset.param;
    const min = Number(knob.dataset.min || 0);
    const max = Number(knob.dataset.max || 100);

    bindDragStart(knob, (e) => start(e, knob, param, min, max));
  });

  const delayKnob = document.getElementById("delayTimeKnob");
  const delayStart = (event) => {
    if (event.button !== undefined && event.button !== 0) return;
    event.preventDefault();
    delayKnob.classList.add("active");
    const param = values.sync_enabled ? "delay_time_sync" : "delay_time_free_ms";
    const min = values.sync_enabled ? 0 : 20;
    const max = values.sync_enabled ? 9 : 2000;
    const startValue = values.sync_enabled ? choices.delay_time_sync.indexOf(values.delay_time_sync) : values.delay_time_free_ms;
    active = {
      knob: delayKnob,
      param,
      min,
      max,
      pointerId: event.pointerId,
      startY: getClientY(event),
      startValue
    };

    if (typeof delayKnob.setPointerCapture === "function" && typeof event.pointerId !== "undefined") {
      try { delayKnob.setPointerCapture(event.pointerId); } catch (e) {}
    }

    if (paramStates[param] && typeof paramStates[param].sliderDragStarted === "function") {
      paramStates[param].sliderDragStarted();
    }
  };
  if (delayKnob) {
    bindDragStart(delayKnob, delayStart);
  }

  window.addEventListener("pointermove", move, { passive: false });
  window.addEventListener("mousemove", move, { passive: false });
  window.addEventListener("touchmove", move, { passive: false });
  window.addEventListener("pointerup", end);
  window.addEventListener("mouseup", end);
  window.addEventListener("touchend", end);
  window.addEventListener("touchcancel", end);
}

function setupButtons() {
  document.querySelectorAll(".toggle[data-param='sync_enabled']").forEach((btn) => {
    btn.addEventListener("click", () => {
      const v = Number(btn.dataset.value);
      values.sync_enabled = v;
      setParam("sync_enabled", v);
      refreshUi();
    });
  });

  document.querySelectorAll(".sync-note-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const value = btn.dataset.syncValue;
      if (!value) return;
      values.sync_enabled = 1;
      setParam("sync_enabled", 1);
      values.delay_time_sync = value;
      setParam("delay_time_sync", value);
      refreshUi();
    });
  });

  document.querySelectorAll(".fx-btn[data-param]").forEach((btn) => {
    const param = btn.dataset.param;
    btn.addEventListener("click", () => {
      const v = values[param] > 0 ? 0 : 1;
      values[param] = v;
      setParam(param, v);
      refreshUi();
    });
  });

  document.querySelectorAll(".mode-btn[data-param='mode']").forEach((btn) => {
    btn.addEventListener("click", () => {
      const index = Number(btn.dataset.index);
      const mode = choices.mode[index] || "TAPE";
      values.mode = mode;
      setParam("mode", mode);
      refreshUi();
    });
  });

  const presetSelect = document.getElementById("presetSelect");
  if (presetSelect) {
    presetSelect.addEventListener("change", () => {
      applyPresetSelection(presetSelect.value, true);
    });
  }

  const delayModelSelect = document.getElementById("delayModelSelect");
  if (delayModelSelect) {
    delayModelSelect.addEventListener("change", () => {
      values.delay_model = delayModelSelect.value;
      setParam("delay_model", values.delay_model);
      refreshUi();
    });
  }
}

function connectParameters() {
  const ids = [
    "preset", "delay_time_sync", "delay_time_free_ms", "sync_enabled",
    "feedback", "mix", "tone", "wow_flutter", "saturation", "mode",
    "ping_pong", "stereo", "lofi", "freeze", "hp_filter_hz", "lp_filter_hz", "ducking", "delay_model"
  ];

  ids.forEach((id) => {
    try {
      paramStates[id] = createSliderState(id);
      paramStates[id].addValueChangedListener(() => {
        if (isUpdating) return;
        isUpdating = true;
        const nextValue = fromNorm(id, paramStates[id].getNormalisedValue());
        if (id === "preset") {
          applyPresetSelection(String(nextValue), false);
        } else {
          values[id] = nextValue;
          refreshUi();
        }
        isUpdating = false;
      });
      values[id] = fromNorm(id, paramStates[id].getNormalisedValue());
    } catch (error) {
      console.warn("Parameter unavailable", id, error);
    }
  });

  refreshUi();
}

function createMeterBars(id, count = 20) {
  const meter = document.getElementById(id);
  if (!meter) return;
  meter.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const bar = document.createElement("div");
    bar.className = "bar";
    meter.appendChild(bar);
  }
}

function setMeterLevel(id, level, hot = false) {
  const meter = document.getElementById(id);
  if (!meter) return;
  const bars = Array.from(meter.children);
  const active = Math.round(Math.max(0, Math.min(1, level)) * bars.length);
  bars.forEach((bar, i) => {
    bar.classList.toggle("on", i < active);
    bar.classList.toggle("hot", hot && i >= bars.length - 4 && i < active);
  });
}

window.updateMeters = (inL, inR, outL, outR, hot) => {
  // Backward compatibility for old mono signature: (inputLevel, outputLevel, hot)
  if (typeof outL !== "number" || typeof outR !== "number") {
    const monoIn = Number(inL) || 0;
    const monoOut = Number(inR) || 0;
    const monoHot = Boolean(outL);
    setMeterLevel("inputMeterL", monoIn, false);
    setMeterLevel("inputMeterR", monoIn, false);
    setMeterLevel("outputMeterL", monoOut, monoHot);
    setMeterLevel("outputMeterR", monoOut, monoHot);
    return;
  }

  setMeterLevel("inputMeterL", Number(inL) || 0, false);
  setMeterLevel("inputMeterR", Number(inR) || 0, false);
  setMeterLevel("outputMeterL", Number(outL) || 0, !!hot);
  setMeterLevel("outputMeterR", Number(outR) || 0, !!hot);
};

function setupVisualizer() {
  const canvas = document.getElementById("echoViz");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  if (!ctx) {
    canvas.style.background = "linear-gradient(180deg, rgba(35, 20, 10, 0.96), rgba(10, 6, 3, 0.98))";
    canvas.style.border = "1px solid rgba(255, 170, 68, 0.45)";
    return;
  }

  const ensureCanvasSize = () => {
    const w = Math.floor(canvas.clientWidth || 0);
    const h = Math.floor(canvas.clientHeight || 0);
    if (w < 8 || h < 8) return false;

    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
    }
    return true;
  };

  const resize = () => {
    ensureCanvasSize();
  };

  resize();
  window.addEventListener("resize", resize);

  if (typeof ResizeObserver !== "undefined") {
    const ro = new ResizeObserver(() => {
      resize();
    });
    ro.observe(canvas);
    if (canvas.parentElement) ro.observe(canvas.parentElement);
  }

  let t = 0;

  const draw = () => {
    t += 0.014;

    // Some hosts report zero canvas size on first paint; keep retrying until valid.
    if (!ensureCanvasSize()) {
      requestAnimationFrame(draw);
      return;
    }

    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    const horizonY = h * 0.63;

    const bg = ctx.createRadialGradient(w * 0.52, h * 0.52, 12, w * 0.52, h * 0.52, w * 0.72);
    bg.addColorStop(0, "rgba(255, 175, 72, 0.22)");
    bg.addColorStop(0.45, "rgba(149, 83, 28, 0.12)");
    bg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    const haze = ctx.createLinearGradient(0, 0, 0, h);
    haze.addColorStop(0, "rgba(0,0,0,0.10)");
    haze.addColorStop(0.55, "rgba(0,0,0,0.0)");
    haze.addColorStop(1, "rgba(0,0,0,0.36)");
    ctx.fillStyle = haze;
    ctx.fillRect(0, 0, w, h);

    const fbNorm = Math.max(0, Math.min(1, Number(values.feedback) / 100));
    const mixNorm = Math.max(0, Math.min(1, Number(values.mix) / 100));
    const wowNorm = Math.max(0, Math.min(1, Number(values.wow_flutter) / 100));
    const toneNorm = Math.max(0, Math.min(1, Number(values.tone) / 100));

    const repeats = Math.round(9 + fbNorm * 10);
    const startX = w * 0.13;
    let x = startX;
    let spacing = w * 0.13;
    const tilt = (Math.sin(t * 0.5) * 0.5 + 0.5) * 2 - 1;
    const shimmer = 0.92 + 0.08 * Math.sin(t * 1.7);

    ctx.globalCompositeOperation = "screen";

    for (let i = 0; i < repeats; i++) {
      const perspective = Math.pow(0.84, i);
      const decay = Math.pow(0.70, i) * (0.88 + mixNorm * 0.34);
      const wobble = Math.sin(t * (2.0 + wowNorm * 3.2) + i * 0.75) * (1.5 + wowNorm * 8.0);
      const driftY = (i * (1.35 + toneNorm * 0.8)) * tilt;
      const farDrift = i > 4 ? Math.sin(t * 1.2 + i) * (0.8 + i * 0.14) : 0;
      const pulseX = x + wobble;
      const pulseY = horizonY - driftY + farDrift;
      const pulseHeight = h * (0.78 * decay + 0.08);
      const coreWidth = i < 2 ? (7.5 - i * 0.8) : 6 + i * 0.55;
      const blurWidth = coreWidth * (2.8 + i * 0.14);

      const glowTier = i < 2 ? 1.35 : i < 5 ? 0.72 : 0.22;
      const flicker = 0.88 + 0.12 * Math.sin(t * (5.4 + i * 0.45) + i * 0.7);
      const alphaCore = Math.max(0.02, 1.15 * decay * glowTier * shimmer * flicker);
      const alphaBloom = Math.max(0.01, 0.78 * decay * glowTier * shimmer);
      const warmShift = Math.min(1, i / 12);
      const red = 255;
      const green = Math.round(194 - warmShift * 68 - (1 - toneNorm) * 8);
      const blue = Math.round(112 - warmShift * 60);

      ctx.shadowColor = `rgba(${red}, ${Math.max(86, green)}, ${Math.max(28, blue)}, ${0.7 * decay * glowTier})`;
      ctx.shadowBlur = 30 + i * 5.2;
      const pulseGrad = ctx.createLinearGradient(pulseX, pulseY - pulseHeight, pulseX, pulseY + pulseHeight * 0.45);
      pulseGrad.addColorStop(0, `rgba(${red}, ${Math.max(94, green)}, ${Math.max(26, blue)}, 0)`);
      pulseGrad.addColorStop(0.14, `rgba(${red}, ${Math.max(120, green + 24)}, ${Math.max(68, blue + 32)}, ${alphaCore * (i < 1 ? 1.1 : 1)})`);
      pulseGrad.addColorStop(0.18, `rgba(255, 246, 232, ${i < 2 ? alphaCore * 0.60 : alphaCore * 0.12})`);
      pulseGrad.addColorStop(0.52, `rgba(${red}, ${Math.max(88, green - 6)}, ${Math.max(24, blue - 4)}, ${alphaCore * 0.8})`);
      pulseGrad.addColorStop(1, `rgba(${red}, ${Math.max(74, green - 18)}, ${Math.max(20, blue - 8)}, 0)`);
      ctx.fillStyle = pulseGrad;
      ctx.fillRect(pulseX - coreWidth * 0.5, pulseY - pulseHeight, coreWidth, pulseHeight * 1.45);

      const aura = ctx.createRadialGradient(pulseX, pulseY - pulseHeight * 0.42, 2, pulseX, pulseY - pulseHeight * 0.35, pulseHeight * 0.9);
      aura.addColorStop(0, `rgba(255, ${Math.max(100, green + 8)}, ${Math.max(34, blue + 8)}, ${alphaBloom})`);
      aura.addColorStop(0.7, `rgba(255, ${Math.max(88, green - 4)}, ${Math.max(24, blue - 6)}, ${alphaBloom * 0.25})`);
      aura.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = aura;
      ctx.fillRect(pulseX - blurWidth, pulseY - pulseHeight * 1.22, blurWidth * 2, pulseHeight * 1.8);

      if (i >= 4) {
        const fog = ctx.createRadialGradient(pulseX, pulseY - pulseHeight * 0.18, 0, pulseX, pulseY - pulseHeight * 0.2, pulseHeight * 1.2);
        fog.addColorStop(0, `rgba(255, ${Math.max(92, green - 8)}, ${Math.max(22, blue - 8)}, ${0.10 * decay})`);
        fog.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = fog;
        ctx.fillRect(pulseX - blurWidth * 1.3, pulseY - pulseHeight * 1.5, blurWidth * 2.6, pulseHeight * 2.3);
      }

      ctx.shadowBlur = 0;

      const reflectionBoost = i < 3 ? 1.35 : 0.92;
      const reflectionHeight = pulseHeight * (0.21 + perspective * 0.11) * reflectionBoost;
      const reflection = ctx.createLinearGradient(pulseX, pulseY + 2, pulseX, pulseY + reflectionHeight + 24);
      reflection.addColorStop(0, `rgba(${red}, ${Math.max(98, green + 8)}, ${Math.max(34, blue + 10)}, ${alphaCore * (i < 3 ? 0.48 : 0.28)})`);
      reflection.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = reflection;
      ctx.beginPath();
      ctx.ellipse(pulseX, pulseY + reflectionHeight * 0.5, blurWidth * 0.95, reflectionHeight, 0, 0, Math.PI * 2);
      ctx.fill();

      x += spacing;
      spacing *= 0.80;
      if (x > w * 0.95) break;
    }

    ctx.globalCompositeOperation = "source-over";

    const floorGlow = ctx.createLinearGradient(0, horizonY - 4, 0, h);
    floorGlow.addColorStop(0, "rgba(255, 170, 72, 0.14)");
    floorGlow.addColorStop(0.35, "rgba(130, 75, 26, 0.12)");
    floorGlow.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = floorGlow;
    ctx.fillRect(0, horizonY - 2, w, h - horizonY + 2);

    ctx.strokeStyle = "rgba(255, 190, 98, 0.34)";
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(w * 0.08, horizonY + 0.5);
    ctx.lineTo(w * 0.92, horizonY + 0.5);
    ctx.stroke();

    const vignette = ctx.createRadialGradient(w * 0.5, h * 0.5, h * 0.24, w * 0.5, h * 0.5, h * 0.82);
    vignette.addColorStop(0, "rgba(0,0,0,0)");
    vignette.addColorStop(1, "rgba(0,0,0,0.38)");
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, w, h);

    requestAnimationFrame(draw);
  };

  draw();
}

function initUi() {
  populateSelect("presetSelect", choices.preset);
  populateSelect("delayModelSelect", choices.delay_model);

  createMeterBars("inputMeterL");
  createMeterBars("inputMeterR");
  createMeterBars("outputMeterL");
  createMeterBars("outputMeterR");

  // Keep the visualizer alive even if any parameter bridge step fails.
  setupVisualizer();

  const safeRun = (fn, label) => {
    try {
      fn();
    } catch (error) {
      console.warn(`UI init step failed: ${label}`, error);
    }
  };

  safeRun(setupKnobDragging, "setupKnobDragging");
  safeRun(setupButtons, "setupButtons");
  safeRun(connectParameters, "connectParameters");

  setMeterLevel("inputMeterL", 0.22);
  setMeterLevel("inputMeterR", 0.18);
  setMeterLevel("outputMeterL", 0.31);
  setMeterLevel("outputMeterR", 0.27);
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initUi);
} else {
  initUi();
}
  </script>
  
</body>
