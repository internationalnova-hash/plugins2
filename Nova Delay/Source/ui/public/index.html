<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Delay</title>
  <style>
    :root {
      --bg0: #040201;
      --bg1: #0b0704;
      --bg2: #130d08;
      --line: rgba(255, 165, 70, 0.36);
      --line-soft: rgba(189, 116, 39, 0.22);
      --text: #f5ead9;
      --text-soft: #cab08f;
      --amber: #f2a33d;
      --amber-hot: #ffd07a;
      --gold: #ce8b35;
      --panel: rgba(12, 8, 5, 0.82);
      --ease: 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(120% 110% at 50% 45%, rgba(126, 73, 23, 0.25) 0%, rgba(12, 8, 5, 0.42) 46%, transparent 72%),
        radial-gradient(90% 80% at 50% 60%, rgba(255, 160, 66, 0.07) 0%, transparent 60%),
        linear-gradient(180deg, #040201 0%, #050302 100%);
      font-family: "Arial Narrow", "Avenir Next Condensed", "Helvetica Neue", sans-serif;
      color: var(--text);
      letter-spacing: 0.04em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: block;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 10px 0;
      overflow: hidden;
    }

    .plugin {
      position: relative;
      width: 1280px;
      min-height: 840px;
      border-radius: 26px;
      border: 1px solid rgba(230, 153, 62, 0.30);
      overflow: visible;
      transform: scale(var(--ui-scale, 1));
      transform-origin: top center;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 171, 71, 0.15), rgba(64, 37, 17, 0.12) 34%, transparent 62%),
        radial-gradient(95% 60% at 50% 46%, rgba(255, 146, 50, 0.07), transparent 65%),
        linear-gradient(180deg, #140d08 0%, #090604 55%, #040201 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -30px 54px rgba(0,0,0,0.58),
        inset 0 0 120px rgba(255, 172, 74, 0.04),
        0 36px 72px rgba(0,0,0,0.74);
    }

    .plugin::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 26px;
      pointer-events: none;
      background:
        radial-gradient(86% 56% at 50% 39%, rgba(255, 182, 88, 0.14), transparent 68%),
        linear-gradient(180deg, rgba(255,255,255,0.045), transparent 26%),
        radial-gradient(122% 122% at 50% 50%, transparent 52%, rgba(0,0,0,0.50) 100%);
    }

    .plugin::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(255, 211, 145, 0.030) 0.55px, transparent 0.85px),
        radial-gradient(rgba(255, 197, 118, 0.02) 0.55px, transparent 0.85px),
        linear-gradient(115deg, rgba(255,255,255,0.015), rgba(255,255,255,0));
      background-size: 2px 2px, 3px 3px, 100% 100%;
      opacity: 0.38;
      mix-blend-mode: soft-light;
    }

    .top {
      height: 108px;
      border-bottom: 1px solid var(--line-soft);
      display: grid;
      grid-template-columns: 1fr 1.3fr 1fr;
      align-items: center;
      padding: 14px 24px;
      background:
        linear-gradient(180deg, rgba(255, 182, 95, 0.08), rgba(0,0,0,0.08)),
        linear-gradient(180deg, rgba(0,0,0,0.42), rgba(0,0,0,0.16));
      position: relative;
      z-index: 2;
      box-shadow: inset 0 -10px 18px rgba(0,0,0,0.26);
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 35px;
      letter-spacing: 0.32em;
      color: #e8dccb;
      text-transform: uppercase;
    }

    .logo-box {
      width: 74px;
      height: 74px;
      border-radius: 16px;
      border: 1px solid rgba(197, 122, 33, 0.62);
      background: linear-gradient(150deg, rgba(27, 18, 10, 0.95), rgba(10, 7, 4, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 0 24px rgba(255, 168, 68, 0.20);
      display: grid;
      place-items: center;
    }

    .logo-box img {
      width: 50px;
      height: 50px;
      filter: drop-shadow(0 0 8px rgba(255, 175, 74, 0.45));
    }

    .brand-center {
      text-align: center;
      text-transform: uppercase;
    }

    .brand-title {
      font-size: 50px;
      letter-spacing: 0.2em;
      font-weight: 800;
      line-height: 1;
    }

    .brand-title .nova {
      color: #f0e9dc;
    }

    .brand-title .delay {
      color: var(--amber);
      text-shadow: 0 0 20px rgba(255, 170, 68, 0.35), 0 0 44px rgba(255, 153, 51, 0.16);
    }

    .brand-sub {
      margin-top: 8px;
      font-size: 28px;
      letter-spacing: 0.32em;
      color: #c9b196;
    }

    .preset-box {
      justify-self: end;
      width: 360px;
      display: grid;
      gap: 10px;
    }

    .preset-box label {
      font-size: 26px;
      letter-spacing: 0.24em;
      color: #decbb3;
    }

    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(235, 152, 54, 0.44);
      background:
        linear-gradient(180deg, rgba(33, 22, 14, 0.96), rgba(10, 6, 4, 0.96));
      color: #f2dec0;
      font-size: 16px;
      padding: 0 10px;
      font-family: inherit;
      letter-spacing: 0.06em;
      outline: none;
      transition: border-color var(--ease), box-shadow var(--ease);
    }

    select:focus {
      border-color: rgba(255, 179, 82, 0.9);
      box-shadow: 0 0 0 1px rgba(255, 179, 82, 0.35), 0 0 18px rgba(255, 166, 65, 0.2);
    }

    .visual-panel {
      margin: 14px 20px 0;
      border: 1px solid rgba(233, 150, 55, 0.36);
      border-radius: 18px;
      padding: 14px;
      background:
        radial-gradient(64% 96% at 50% 50%, rgba(255, 156, 52, 0.24), rgba(78, 45, 18, 0.10) 34%, rgba(10, 7, 5, 0.86) 76%),
        linear-gradient(180deg, rgba(20, 12, 8, 0.94), rgba(7, 4, 3, 0.95));
      position: relative;
      z-index: 2;
      height: 252px;
      display: grid;
      grid-template-columns: 86px 1fr 86px;
      gap: 14px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.42),
        inset 0 -26px 36px rgba(0,0,0,0.40),
        0 1px 0 rgba(255, 188, 104, 0.16),
        0 16px 26px rgba(0,0,0,0.36);
    }

    .meter-wrap {
      display: grid;
      grid-template-rows: auto 1fr;
      justify-items: center;
      align-items: center;
      gap: 8px;
    }

    .stereo-meter-group {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 8px;
      align-items: end;
    }

    .meter-column {
      display: grid;
      justify-items: center;
      gap: 4px;
    }

    .meter-ch {
      font-size: 14px;
      letter-spacing: 0.18em;
      color: #d9bf9e;
      text-transform: uppercase;
      opacity: 0.92;
    }

    .meter-label {
      font-size: 30px;
      letter-spacing: 0.14em;
      color: #ddc9af;
      text-transform: uppercase;
    }

    .meter {
      width: 18px;
      height: 200px;
      border: 1px solid rgba(171, 108, 38, 0.44);
      border-radius: 10px;
      padding: 4px 3px;
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
      background: rgba(8, 6, 4, 0.9);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .meter .bar {
      height: 7px;
      border-radius: 2px;
      background: linear-gradient(180deg, rgba(129, 91, 38, 0.7), rgba(82, 56, 23, 0.7));
      transition: background 90ms linear, box-shadow 90ms linear;
    }

    .meter .bar.on {
      background: linear-gradient(180deg, #ffd07e 0%, #dd912f 100%);
      box-shadow: 0 0 8px rgba(255, 173, 68, 0.25);
    }

    .meter .bar.hot {
      background: linear-gradient(180deg, #ffbea0 0%, #ff5d2f 100%);
      box-shadow: 0 0 9px rgba(255, 88, 42, 0.38);
    }

    #echoViz {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      background:
        radial-gradient(70% 90% at 50% 48%, rgba(255, 167, 58, 0.15), rgba(145, 78, 28, 0.10) 34%, transparent 64%),
        linear-gradient(180deg, rgba(16,10,7,0.96), rgba(6,4,3,0.97));
      border: 1px solid rgba(201, 125, 46, 0.30);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -14px 22px rgba(0,0,0,0.42),
        0 0 36px rgba(255, 163, 58, 0.12);
    }

    .sync-readout {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: baseline;
      gap: 16px;
      font-size: 46px;
      color: #ffd38f;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(255, 174, 73, 0.44), 0 0 28px rgba(255, 145, 47, 0.26);
      pointer-events: none;
      background:
        radial-gradient(90% 120% at 50% 0%, rgba(255, 186, 100, 0.16), transparent 65%),
        repeating-linear-gradient(115deg, rgba(255,255,255,0.02) 0 2px, rgba(255,255,255,0) 2px 6px),
        linear-gradient(180deg, rgba(22, 14, 9, 0.82), rgba(8, 5, 3, 0.46));
      padding: 5px 18px 8px;
      border-radius: 12px;
      border: 1px solid rgba(255, 168, 61, 0.34);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), inset 0 -10px 13px rgba(0,0,0,0.26), 0 10px 16px rgba(0,0,0,0.36), 0 0 24px rgba(255, 168, 61, 0.20);
    }

    .controls-main {
      margin: 14px 20px 0;
      min-height: 346px;
      display: grid;
      grid-template-columns: 1fr 270px;
      gap: 16px;
      z-index: 2;
      position: relative;
      align-items: stretch;
    }

    .knob-bank {
      border: 1px solid rgba(228, 147, 55, 0.28);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(26, 17, 11, 0.90), rgba(11, 7, 5, 0.92));
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.42), inset 0 -20px 28px rgba(0,0,0,0.37), 0 14px 22px rgba(0,0,0,0.30);
    }

    .knob-wrap {
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 10px;
    }

    .knob-title {
      font-size: 22px;
      letter-spacing: 0.11em;
      color: #e8d7c0;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.05;
      min-height: 44px;
    }

    .knob {
      position: relative;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      border: 1px solid rgba(232, 151, 58, 0.48);
      background:
        radial-gradient(circle at 34% 22%, rgba(255,255,255,0.22), transparent 38%),
        repeating-conic-gradient(from 0deg, rgba(255,255,255,0.05) 0deg 8deg, rgba(0,0,0,0.08) 8deg 16deg),
        radial-gradient(circle at 48% 60%, #2f261d 0%, #1a130e 52%, #0d0906 100%);
      box-shadow:
        inset 0 2px 1px rgba(255,255,255,0.14),
        inset 0 -22px 26px rgba(0,0,0,0.54),
        inset 0 0 30px rgba(255, 178, 81, 0.07),
        0 16px 24px rgba(0,0,0,0.56),
        0 0 24px rgba(255, 161, 53, 0.16);
      cursor: ns-resize;
      user-select: none;
      touch-action: none;
    }

    .knob::before {
      content: "";
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: repeating-conic-gradient(from -140deg, rgba(255, 191, 113, 0.36) 0deg 1.8deg, transparent 1.8deg 8deg);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 7px), #000 calc(100% - 6px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 7px), #000 calc(100% - 6px));
      opacity: 0.55;
      pointer-events: none;
    }

    .knob-wrap:nth-child(odd) .knob {
      background:
        radial-gradient(circle at 31% 20%, rgba(255,255,255,0.24), transparent 37%),
        repeating-conic-gradient(from 4deg, rgba(255,255,255,0.045) 0deg 7deg, rgba(0,0,0,0.08) 7deg 15deg),
        radial-gradient(circle at 47% 59%, #31271e 0%, #1b140f 52%, #0c0805 100%);
    }

    .knob-wrap:nth-child(even) .knob {
      background:
        radial-gradient(circle at 37% 24%, rgba(255,255,255,0.19), transparent 39%),
        repeating-conic-gradient(from -3deg, rgba(255,255,255,0.055) 0deg 8deg, rgba(0,0,0,0.09) 8deg 16deg),
        radial-gradient(circle at 50% 61%, #2d241b 0%, #19120d 53%, #0b0704 100%);
    }

    .knob-wrap:nth-child(3n) .knob {
      box-shadow:
        inset 0 2px 1px rgba(255,255,255,0.15),
        inset 0 -20px 26px rgba(0,0,0,0.56),
        inset 0 0 28px rgba(255, 178, 81, 0.08),
        0 12px 20px rgba(0,0,0,0.52),
        0 0 24px rgba(255, 161, 53, 0.14);
    }

    .knob::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 13px;
      width: 5px;
      height: 27px;
      transform: translateX(-50%);
      border-radius: 99px;
      background: linear-gradient(180deg, #fff0cd 0%, #efab44 100%);
      box-shadow: 0 0 8px rgba(255, 172, 65, 0.52), 0 0 20px rgba(255, 153, 44, 0.30), 0 -2px 5px rgba(255, 233, 183, 0.30);
      transform-origin: 50% 51px;
      rotate: var(--turn, -140deg);
    }

    .ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(from -140deg, rgba(255, 214, 152, 0.99) var(--fill, 0%), rgba(255, 160, 50, 0.74) calc(var(--fill, 0%) + 6%), rgba(74, 44, 18, 0.11) calc(var(--fill, 0%) + 7%), rgba(38, 24, 10, 0.28) 100%);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
      filter: drop-shadow(0 0 10px rgba(255, 186, 92, 0.75)) drop-shadow(0 0 24px rgba(255, 152, 48, 0.38));
      pointer-events: none;
    }

    .knob-value {
      font-size: 30px;
      color: var(--amber-hot);
      letter-spacing: 0.04em;
      text-shadow: 0 0 12px rgba(255, 170, 66, 0.2);
      min-height: 36px;
      line-height: 1;
    }

    .knob-note {
      font-size: 14px;
      letter-spacing: 0.08em;
      color: #d4b896;
      text-transform: uppercase;
      text-align: center;
      min-height: 18px;
      line-height: 1.15;
    }

    .small-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      width: 100%;
      margin-top: 2px;
      align-items: center;
    }

    .small-buttons .toggle {
      width: 100%;
      min-width: 0;
      padding: 0 8px;
      font-size: 14px;
    }

    .sync-note-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-top: 8px;
      transition: opacity var(--ease), filter var(--ease);
    }

    .sync-note-row.disabled {
      opacity: 0.32;
      filter: saturate(0.55);
      pointer-events: none;
    }

    .sync-note-btn {
      min-width: 0;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(214, 137, 52, 0.42);
      background: linear-gradient(180deg, rgba(28, 18, 11, 0.95), rgba(10, 7, 4, 0.96));
      color: #dcbf9c;
      font-size: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--ease);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.09), 0 5px 8px rgba(0,0,0,0.25);
    }

    .sync-note-btn.active {
      color: #ffe7c2;
      border-color: rgba(255, 173, 69, 0.95);
      background: linear-gradient(180deg, rgba(101, 58, 22, 0.96), rgba(43, 25, 10, 0.98));
      box-shadow: 0 0 12px rgba(255, 169, 60, 0.34), inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .toggle, .mode-btn {
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(219, 143, 54, 0.52);
      background:
        linear-gradient(180deg, rgba(33, 21, 13, 0.98), rgba(12, 8, 5, 0.98));
      color: #e6cfb1;
      font-size: 29px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 14px;
      transition: all var(--ease);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 6px 10px rgba(0,0,0,0.28);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      line-height: 1;
    }

    .toggle {
      height: 42px;
      font-size: 16px;
      letter-spacing: 0.08em;
      padding: 0 12px;
    }

    .mode-btn {
      height: 44px;
      font-size: 20px;
      letter-spacing: 0.09em;
      padding: 0 12px;
    }

    .toggle svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      opacity: 0.95;
      filter: drop-shadow(0 0 5px rgba(255, 170, 62, 0.22));
    }

    .toggle.active, .mode-btn.active {
      color: #ffe8c5;
      border-color: rgba(255, 170, 62, 0.95);
      background: linear-gradient(180deg, rgba(86, 49, 17, 0.95), rgba(36, 21, 9, 0.98));
      box-shadow: 0 0 16px rgba(255, 162, 58, 0.38), 0 0 28px rgba(255, 129, 38, 0.22), inset 0 1px 0 rgba(255,255,255,0.20), inset 0 -4px 10px rgba(0,0,0,0.28);
    }

    .right-panel {
      border: 1px solid rgba(228, 147, 55, 0.30);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(28, 17, 11, 0.90), rgba(10, 7, 5, 0.92));
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto;
      gap: 14px;
      align-content: start;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.44), inset 0 -18px 26px rgba(0,0,0,0.38), 0 14px 22px rgba(0,0,0,0.32);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .fx-btn {
      border-radius: 12px;
      border: 1px solid rgba(202, 128, 44, 0.56);
      background:
        linear-gradient(180deg, rgba(38, 24, 15, 0.98), rgba(11, 7, 4, 0.98));
      color: #e8d2b3;
      font-size: 19px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      min-height: 82px;
      padding: 0 14px;
      cursor: pointer;
      transition: all var(--ease);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 8px 14px rgba(0,0,0,0.34);
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 6px;
      line-height: 1;
    }

    .fx-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      opacity: 0.92;
      filter: drop-shadow(0 0 6px rgba(255, 166, 60, 0.18));
    }

    .fx-btn .fx-text {
      font-size: 18px;
      letter-spacing: 0.09em;
    }

    .fx-btn.active {
      background: linear-gradient(180deg, rgba(103, 57, 19, 0.98), rgba(49, 29, 11, 0.98));
      border-color: rgba(255, 169, 60, 0.9);
      box-shadow: 0 0 16px rgba(255, 164, 57, 0.42), 0 0 28px rgba(255, 132, 42, 0.24), inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -6px 12px rgba(0,0,0,0.30);
      color: #ffe9c7;
    }

    .fx-btn:active, .toggle:active, .mode-btn:active {
      transform: translateY(1px);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.42);
    }

    .sat-wrap {
      border: 1px solid rgba(205, 132, 48, 0.48);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      justify-items: center;
      gap: 6px;
      background: linear-gradient(180deg, rgba(20, 12, 8, 0.96), rgba(9, 6, 4, 0.96));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.40), inset 0 -14px 18px rgba(0,0,0,0.34);
    }

    .sat-wrap .knob {
      width: 108px;
      height: 108px;
    }

    .sat-wrap .knob-value {
      font-size: 24px;
      min-height: 34px;
    }

    .sat-wrap .knob-title {
      font-size: 22px;
      min-height: auto;
      letter-spacing: 0.10em;
    }

    .lower {
      margin: 12px 20px 14px;
      border: 1px solid rgba(228, 147, 55, 0.30);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(24, 15, 10, 0.90), rgba(10, 7, 5, 0.92));
      padding: 12px;
      display: grid;
      grid-template-columns: 1.05fr 1.4fr 0.7fr 0.7fr 0.7fr;
      gap: 14px;
      align-items: center;
      z-index: 2;
      position: relative;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.42), inset 0 -20px 27px rgba(0,0,0,0.36), 0 14px 22px rgba(0,0,0,0.32);
    }

    .block-title {
      font-size: 18px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #dcc7aa;
      margin-bottom: 8px;
      line-height: 1.05;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .block-title svg {
      width: 16px;
      height: 16px;
      stroke: #d99552;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .mode-sync-marker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 4px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 168, 61, 0.36);
      background:
        radial-gradient(120% 140% at 50% 0%, rgba(255, 186, 100, 0.16), transparent 65%),
        linear-gradient(180deg, rgba(22, 14, 9, 0.82), rgba(8, 5, 3, 0.46));
      color: #ffd8a2;
      text-shadow: 0 0 8px rgba(255, 166, 60, 0.34);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 8px 14px rgba(0,0,0,0.30);
    }

    .mode-sync-marker svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      opacity: 0.95;
    }

    .mode-sync-marker span {
      font-size: 18px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      line-height: 1;
    }

    .mode-row {
      display: flex;
      gap: 8px;
    }

    .mini-knob {
      width: 90px;
      height: 90px;
    }

    .mini-knob .knob-value {
      font-size: 21px;
      min-height: 32px;
    }

    .mini-knob-block {
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    @media (max-width: 1200px) {
      .plugin { transform-origin: center; }
    }
  </style>
</head>
<body>
  <div class="stage">
  <div class="plugin">
    <div class="top">
      <div class="brand-left">
        <div class="logo-box"><img src="n_logo.png" alt="Nova" /></div>
        <div>NOVA</div>
      </div>
      <div class="brand-center">
        <div class="brand-title"><span class="nova">NOVA</span> <span class="delay">DELAY</span></div>
        <div class="brand-sub">ANALOG DELAY ENGINE</div>
      </div>
      <div class="preset-box">
        <label>PRESETS</label>
        <div class="select-wrap"><select id="presetSelect"></select></div>
      </div>
    </div>

    <div class="visual-panel">
      <div class="meter-wrap">
        <div class="meter-label">INPUT</div>
        <div class="stereo-meter-group">
          <div class="meter-column">
            <div class="meter-ch">L</div>
            <div class="meter" id="inputMeterL"></div>
          </div>
          <div class="meter-column">
            <div class="meter-ch">R</div>
            <div class="meter" id="inputMeterR"></div>
          </div>
        </div>
      </div>

      <canvas id="echoViz"></canvas>

      <div class="meter-wrap">
        <div class="meter-label">OUTPUT</div>
        <div class="stereo-meter-group">
          <div class="meter-column">
            <div class="meter-ch">L</div>
            <div class="meter" id="outputMeterL"></div>
          </div>
          <div class="meter-column">
            <div class="meter-ch">R</div>
            <div class="meter" id="outputMeterR"></div>
          </div>
        </div>
      </div>

      <div class="sync-readout">
        <span id="syncDisplay">1/4</span>
        <span id="bpmDisplay">120 BPM</span>
      </div>
    </div>

    <div class="controls-main">
      <div class="knob-bank">
        <div class="knob-wrap" id="delayTimeWrap">
          <div class="knob-title">DELAY TIME</div>
          <div class="knob" data-kind="time" id="delayTimeKnob">
            <div class="ring"></div>
          </div>
          <div class="knob-value" id="delayTimeValue">1/4</div>
          <div class="small-buttons">
            <button class="toggle active" data-param="sync_enabled" data-value="1">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.6v4.9l3.3 2.1"/></svg>
              <span>SYNC</span>
            </button>
            <button class="toggle" data-param="sync_enabled" data-value="0">FREE</button>
          </div>
          <div class="sync-note-row" id="syncNoteRow">
            <button class="sync-note-btn" data-sync-value="1/16">1/16</button>
            <button class="sync-note-btn" data-sync-value="1/8">1/8</button>
            <button class="sync-note-btn" data-sync-value="1/4">1/4</button>
            <button class="sync-note-btn" data-sync-value="1/4D">1/4D</button>
            <button class="sync-note-btn" data-sync-value="1/4T">1/4T</button>
          </div>
        </div>

        <div class="knob-wrap">
          <div class="knob-title">FEEDBACK</div>
          <div class="knob" data-param="feedback" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="feedbackValue">35%</div>
          <div class="knob-note">0% - 100%</div>
        </div>

        <div class="knob-wrap">
          <div class="knob-title">MIX</div>
          <div class="knob" data-param="mix" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="mixValue">40%</div>
          <div class="knob-note">0% - 100%</div>
        </div>

        <div class="knob-wrap">
          <div class="knob-title">TONE</div>
          <div class="knob" data-param="tone" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="toneValue">55%</div>
          <div class="knob-note">DARK - BRIGHT</div>
        </div>

        <div class="knob-wrap">
          <div class="knob-title">WOW / FLUTTER</div>
          <div class="knob" data-param="wow_flutter" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="wow_flutterValue">25%</div>
          <div class="knob-note">OFF - MAX</div>
        </div>
      </div>

      <div class="right-panel">
        <div class="button-grid">
          <button class="fx-btn" data-param="ping_pong">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 8h6c2.2 0 4 1.8 4 4v6"/><path d="M9 4l-4 4 4 4"/><path d="M19 16h-6c-2.2 0-4-1.8-4-4V6"/><path d="M15 20l4-4-4-4"/></svg>
            <span class="fx-text">PING PONG</span>
          </button>
          <button class="fx-btn active" data-param="stereo">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7v10"/><path d="M10 5v14"/><path d="M14 5v14"/><path d="M18 7v10"/></svg>
            <span class="fx-text">STEREO</span>
          </button>
          <button class="fx-btn" data-param="lofi">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 16l4-4 3 3 4-4 5 5"/><path d="M4 8h2"/><path d="M9 8h2"/><path d="M14 8h2"/><path d="M19 8h1"/></svg>
            <span class="fx-text">LO-FI</span>
          </button>
          <button class="fx-btn" data-param="freeze">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18"/><path d="M7.5 6l9 12"/><path d="M16.5 6l-9 12"/></svg>
            <span class="fx-text">FREEZE</span>
          </button>
        </div>
        <div class="sat-wrap">
          <div class="knob-title">SATURATION</div>
          <div class="knob" data-param="saturation" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="saturationValue">30%</div>
          <div class="knob-note">CLEAN - DIRTY</div>
        </div>
      </div>
    </div>

    <div class="lower">
      <div>
        <div class="mode-sync-marker">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.3-5.7"/><path d="M20 4v5h-5"/><path d="M12 8v4l3 2"/></svg>
          <span>SYNC</span>
        </div>
        <div class="block-title">MODE</div>
        <div class="mode-row">
          <button class="mode-btn" data-param="mode" data-index="0">ANALOG</button>
          <button class="mode-btn active" data-param="mode" data-index="1">TAPE</button>
          <button class="mode-btn" data-param="mode" data-index="2">BBD</button>
        </div>
      </div>

      <div class="model-wrap">
        <div class="block-title"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="8" cy="12" r="4"/><circle cx="16" cy="12" r="4"/><path d="M8 8v8"/><path d="M16 8v8"/><path d="M8 12h8"/></svg>DELAY MODEL</div>
        <select id="delayModelSelect"></select>
      </div>

      <div class="mini-knob-block">
        <div class="block-title">HP FILTER</div>
        <div class="knob mini-knob" data-param="hp_filter_hz" data-min="20" data-max="800"><div class="ring"></div></div>
        <div class="knob-value" id="hp_filter_hzValue">120 Hz</div>
      </div>

      <div class="mini-knob-block">
        <div class="block-title">LP FILTER</div>
        <div class="knob mini-knob" data-param="lp_filter_hz" data-min="1000" data-max="18000"><div class="ring"></div></div>
        <div class="knob-value" id="lp_filter_hzValue">6.0 kHz</div>
      </div>

      <div class="mini-knob-block">
        <div class="block-title">DUCKING</div>
        <div class="knob mini-knob" data-param="ducking" data-min="0" data-max="100"><div class="ring"></div></div>
        <div class="knob-value" id="duckingValue">20%</div>
      </div>
    </div>
  </div>
  </div>

  <script type="module" src="js/index.js?v=10"></script>
  
</body>
</html>
