<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Delay</title>
  <style>
    :root {
      --bg0: #090603;
      --bg1: #110b06;
      --bg2: #1a120c;
      --line: rgba(191, 123, 39, 0.42);
      --line-soft: rgba(171, 108, 38, 0.28);
      --text: #f0e6d7;
      --text-soft: #c3ad90;
      --amber: #f0a739;
      --amber-hot: #ffbf53;
      --gold: #c78a33;
      --panel: rgba(15, 11, 7, 0.86);
      --ease: 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(120% 100% at 50% 50%, rgba(83, 49, 18, 0.2) 0%, transparent 64%),
        linear-gradient(180deg, #090603 0%, #060402 100%);
      font-family: "Arial Narrow", "Avenir Next Condensed", "Helvetica Neue", sans-serif;
      color: var(--text);
      letter-spacing: 0.04em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: block;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 10px 0;
      overflow: hidden;
    }

    .plugin {
      position: relative;
      width: 1280px;
      min-height: 840px;
      border-radius: 26px;
      border: 1px solid rgba(207, 143, 60, 0.34);
      overflow: visible;
      transform: scale(var(--ui-scale, 1));
      transform-origin: top center;
      background:
        radial-gradient(circle at 50% 38%, rgba(101, 62, 24, 0.20), transparent 60%),
        linear-gradient(180deg, var(--bg2) 0%, #090603 55%, #080502 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -20px 40px rgba(0,0,0,0.5),
        0 26px 52px rgba(0,0,0,0.68);
    }

    .plugin::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(255, 200, 120, 0.045) 0.5px, transparent 0.8px),
        radial-gradient(rgba(255, 190, 110, 0.025) 0.5px, transparent 0.8px);
      background-size: 3px 3px, 2px 2px;
      opacity: 0.28;
      mix-blend-mode: screen;
    }

    .top {
      height: 108px;
      border-bottom: 1px solid var(--line-soft);
      display: grid;
      grid-template-columns: 1fr 1.3fr 1fr;
      align-items: center;
      padding: 14px 24px;
      background: linear-gradient(180deg, rgba(0,0,0,0.24), rgba(0,0,0,0.06));
      position: relative;
      z-index: 2;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 35px;
      letter-spacing: 0.32em;
      color: #e8dccb;
      text-transform: uppercase;
    }

    .logo-box {
      width: 74px;
      height: 74px;
      border-radius: 16px;
      border: 1px solid rgba(197, 122, 33, 0.62);
      background: linear-gradient(150deg, rgba(27, 18, 10, 0.95), rgba(10, 7, 4, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 0 24px rgba(255, 168, 68, 0.20);
      display: grid;
      place-items: center;
    }

    .logo-box img {
      width: 50px;
      height: 50px;
      filter: drop-shadow(0 0 8px rgba(255, 175, 74, 0.45));
    }

    .brand-center {
      text-align: center;
      text-transform: uppercase;
    }

    .brand-title {
      font-size: 50px;
      letter-spacing: 0.2em;
      font-weight: 800;
      line-height: 1;
    }

    .brand-title .nova {
      color: #f0e9dc;
    }

    .brand-title .delay {
      color: var(--amber);
      text-shadow: 0 0 20px rgba(255, 170, 68, 0.26);
    }

    .brand-sub {
      margin-top: 8px;
      font-size: 28px;
      letter-spacing: 0.32em;
      color: #c9b196;
    }

    .preset-box {
      justify-self: end;
      width: 360px;
      display: grid;
      gap: 10px;
    }

    .preset-box label {
      font-size: 26px;
      letter-spacing: 0.24em;
      color: #decbb3;
    }

    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      height: 54px;
      border-radius: 14px;
      border: 1px solid rgba(219, 142, 49, 0.54);
      background: linear-gradient(180deg, rgba(18, 12, 8, 0.98), rgba(8, 5, 3, 0.98));
      color: #f2dec0;
      font-size: 34px;
      padding: 0 16px;
      font-family: inherit;
      letter-spacing: 0.06em;
      outline: none;
      transition: border-color var(--ease), box-shadow var(--ease);
    }

    select:focus {
      border-color: rgba(255, 179, 82, 0.9);
      box-shadow: 0 0 0 1px rgba(255, 179, 82, 0.35), 0 0 18px rgba(255, 166, 65, 0.2);
    }

    .visual-panel {
      margin: 14px 20px 0;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(6,4,3,0.95), rgba(7,5,3,0.95));
      position: relative;
      z-index: 2;
      height: 252px;
      display: grid;
      grid-template-columns: 86px 1fr 86px;
      gap: 12px;
    }

    .meter-wrap {
      display: grid;
      grid-template-rows: auto 1fr;
      justify-items: center;
      align-items: center;
      gap: 8px;
    }

    .meter-label {
      font-size: 30px;
      letter-spacing: 0.14em;
      color: #ddc9af;
      text-transform: uppercase;
    }

    .meter {
      width: 40px;
      height: 200px;
      border: 1px solid rgba(171, 108, 38, 0.44);
      border-radius: 10px;
      padding: 5px;
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
      background: rgba(8, 6, 4, 0.9);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .meter .bar {
      height: 8px;
      border-radius: 2px;
      background: linear-gradient(180deg, rgba(129, 91, 38, 0.7), rgba(82, 56, 23, 0.7));
      transition: background 90ms linear, box-shadow 90ms linear;
    }

    .meter .bar.on {
      background: linear-gradient(180deg, #ffd07e 0%, #dd912f 100%);
      box-shadow: 0 0 8px rgba(255, 173, 68, 0.25);
    }

    .meter .bar.hot {
      background: linear-gradient(180deg, #ffbea0 0%, #ff5d2f 100%);
      box-shadow: 0 0 9px rgba(255, 88, 42, 0.38);
    }

    #echoViz {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      background:
        radial-gradient(60% 70% at 42% 48%, rgba(140, 78, 24, 0.18), transparent 70%),
        linear-gradient(180deg, rgba(6,4,3,0.96), rgba(5,3,2,0.96));
      border: 1px solid rgba(169, 107, 36, 0.22);
    }

    .sync-readout {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: baseline;
      gap: 16px;
      font-size: 46px;
      color: var(--amber-hot);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(255, 174, 73, 0.20);
      pointer-events: none;
    }

    .controls-main {
      margin: 14px 20px 0;
      height: 218px;
      display: grid;
      grid-template-columns: 1fr 270px;
      gap: 14px;
      z-index: 2;
      position: relative;
    }

    .knob-bank {
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: var(--panel);
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .knob-wrap {
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 8px;
    }

    .knob-title {
      font-size: 34px;
      letter-spacing: 0.12em;
      color: #e8d7c0;
      text-transform: uppercase;
      text-align: center;
    }

    .knob {
      position: relative;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      border: 1px solid rgba(216, 140, 46, 0.52);
      background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,0.12), transparent 35%),
        repeating-conic-gradient(from 0deg, rgba(255,255,255,0.03) 0deg 12deg, rgba(0,0,0,0.03) 12deg 24deg),
        linear-gradient(155deg, #2b2219 0%, #17110c 48%, #0c0805 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -14px 20px rgba(0,0,0,0.42),
        0 10px 20px rgba(0,0,0,0.44),
        0 0 18px rgba(255, 161, 53, 0.1);
      cursor: ns-resize;
      user-select: none;
      touch-action: none;
    }

    .knob::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 13px;
      width: 5px;
      height: 27px;
      transform: translateX(-50%);
      border-radius: 99px;
      background: linear-gradient(180deg, #fff0cd 0%, #efab44 100%);
      box-shadow: 0 0 8px rgba(255, 172, 65, 0.3);
      transform-origin: 50% 51px;
      rotate: var(--turn, -140deg);
    }

    .ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(from -140deg, rgba(239, 160, 49, 0.96) var(--fill, 0%), rgba(60, 38, 18, 0.2) var(--fill, 0%));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
      filter: drop-shadow(0 0 10px rgba(255, 167, 53, 0.32));
      pointer-events: none;
    }

    .knob-value {
      font-size: 42px;
      color: var(--amber-hot);
      letter-spacing: 0.04em;
      text-shadow: 0 0 12px rgba(255, 170, 66, 0.2);
      min-height: 48px;
    }

    .knob-note {
      font-size: 28px;
      letter-spacing: 0.08em;
      color: #d4b896;
      text-transform: uppercase;
      text-align: center;
      min-height: 34px;
    }

    .small-buttons {
      display: flex;
      gap: 8px;
    }

    .toggle, .mode-btn {
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(204, 135, 52, 0.56);
      background: linear-gradient(180deg, rgba(20, 13, 8, 0.98), rgba(9, 6, 4, 0.98));
      color: #e6cfb1;
      font-size: 29px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 14px;
      transition: all var(--ease);
      cursor: pointer;
    }

    .toggle.active, .mode-btn.active {
      color: #ffe8c5;
      border-color: rgba(255, 170, 62, 0.95);
      background: linear-gradient(180deg, rgba(86, 49, 17, 0.95), rgba(36, 21, 9, 0.98));
      box-shadow: 0 0 16px rgba(255, 162, 58, 0.28), inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .right-panel {
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: var(--panel);
      padding: 12px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .fx-btn {
      border-radius: 12px;
      border: 1px solid rgba(186, 119, 41, 0.58);
      background: linear-gradient(180deg, rgba(16, 10, 6, 0.96), rgba(8, 5, 3, 0.96));
      color: #e8d2b3;
      font-size: 31px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      min-height: 68px;
      cursor: pointer;
      transition: all var(--ease);
    }

    .fx-btn.active {
      background: linear-gradient(180deg, rgba(103, 57, 19, 0.98), rgba(49, 29, 11, 0.98));
      border-color: rgba(255, 169, 60, 0.9);
      box-shadow: 0 0 14px rgba(255, 164, 57, 0.30), inset 0 1px 0 rgba(255,255,255,0.14);
      color: #ffe9c7;
    }

    .sat-wrap {
      border: 1px solid rgba(181, 114, 39, 0.48);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      justify-items: center;
      gap: 6px;
      background: linear-gradient(180deg, rgba(15, 9, 6, 0.96), rgba(8, 5, 3, 0.96));
    }

    .sat-wrap .knob-title { font-size: 34px; }

    .lower {
      margin: 12px 20px 14px;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: var(--panel);
      padding: 12px;
      display: grid;
      grid-template-columns: 1.05fr 1.4fr 0.7fr 0.7fr 0.7fr;
      gap: 12px;
      align-items: center;
      z-index: 2;
      position: relative;
    }

    .block-title {
      font-size: 28px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #dcc7aa;
      margin-bottom: 8px;
    }

    .mode-row {
      display: flex;
      gap: 8px;
    }

    .model-wrap select {
      height: 58px;
      font-size: 32px;
    }

    .mini-knob {
      width: 90px;
      height: 90px;
    }

    .mini-knob .knob-value {
      font-size: 30px;
      min-height: 32px;
    }

    .mini-knob-block {
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    @media (max-width: 1200px) {
      .plugin { transform-origin: center; }
    }
  </style>
</head>
<body>
  <div class="stage">
  <div class="plugin">
    <div class="top">
      <div class="brand-left">
        <div class="logo-box"><img src="n_logo.png" alt="Nova" /></div>
        <div>NOVA</div>
      </div>
      <div class="brand-center">
        <div class="brand-title"><span class="nova">NOVA</span> <span class="delay">DELAY</span></div>
        <div class="brand-sub">ANALOG DELAY ENGINE</div>
      </div>
      <div class="preset-box">
        <label>PRESETS</label>
        <div class="select-wrap"><select id="presetSelect"></select></div>
      </div>
    </div>

    <div class="visual-panel">
      <div class="meter-wrap">
        <div class="meter-label">INPUT</div>
        <div class="meter" id="inputMeter"></div>
      </div>

      <canvas id="echoViz"></canvas>

      <div class="meter-wrap">
        <div class="meter-label">OUTPUT</div>
        <div class="meter" id="outputMeter"></div>
      </div>

      <div class="sync-readout">
        <span id="syncDisplay">1/4</span>
        <span id="bpmDisplay">120 BPM</span>
      </div>
    </div>

    <div class="controls-main">
      <div class="knob-bank">
        <div class="knob-wrap" id="delayTimeWrap">
          <div class="knob-title">DELAY TIME</div>
          <div class="knob" data-kind="time" id="delayTimeKnob">
            <div class="ring"></div>
          </div>
          <div class="knob-value" id="delayTimeValue">1/4</div>
          <div class="small-buttons">
            <button class="toggle active" data-param="sync_enabled" data-value="1">SYNC</button>
            <button class="toggle" data-param="sync_enabled" data-value="0">FREE</button>
          </div>
        </div>

        <div class="knob-wrap">
          <div class="knob-title">FEEDBACK</div>
          <div class="knob" data-param="feedback" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="feedbackValue">35%</div>
          <div class="knob-note">0% - 100%</div>
        </div>

        <div class="knob-wrap">
          <div class="knob-title">MIX</div>
          <div class="knob" data-param="mix" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="mixValue">40%</div>
          <div class="knob-note">0% - 100%</div>
        </div>

        <div class="knob-wrap">
          <div class="knob-title">TONE</div>
          <div class="knob" data-param="tone" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="toneValue">55%</div>
          <div class="knob-note">DARK - BRIGHT</div>
        </div>

        <div class="knob-wrap">
          <div class="knob-title">WOW / FLUTTER</div>
          <div class="knob" data-param="wow_flutter" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="wow_flutterValue">25%</div>
          <div class="knob-note">OFF - MAX</div>
        </div>
      </div>

      <div class="right-panel">
        <div class="button-grid">
          <button class="fx-btn" data-param="ping_pong">PING PONG</button>
          <button class="fx-btn active" data-param="stereo">STEREO</button>
          <button class="fx-btn" data-param="lofi">LO-FI</button>
          <button class="fx-btn" data-param="freeze">FREEZE</button>
        </div>
        <div class="sat-wrap">
          <div class="knob-title">SATURATION</div>
          <div class="knob" data-param="saturation" data-min="0" data-max="100"><div class="ring"></div></div>
          <div class="knob-value" id="saturationValue">30%</div>
          <div class="knob-note">CLEAN - DIRTY</div>
        </div>
      </div>
    </div>

    <div class="lower">
      <div>
        <div class="block-title">MODE</div>
        <div class="mode-row">
          <button class="mode-btn" data-param="mode" data-index="0">ANALOG</button>
          <button class="mode-btn active" data-param="mode" data-index="1">TAPE</button>
          <button class="mode-btn" data-param="mode" data-index="2">BBD</button>
        </div>
      </div>

      <div class="model-wrap">
        <div class="block-title">DELAY MODEL</div>
        <select id="delayModelSelect"></select>
      </div>

      <div class="mini-knob-block">
        <div class="block-title">HP FILTER</div>
        <div class="knob mini-knob" data-param="hp_filter_hz" data-min="20" data-max="800"><div class="ring"></div></div>
        <div class="knob-value" id="hp_filter_hzValue">120 Hz</div>
      </div>

      <div class="mini-knob-block">
        <div class="block-title">LP FILTER</div>
        <div class="knob mini-knob" data-param="lp_filter_hz" data-min="1000" data-max="18000"><div class="ring"></div></div>
        <div class="knob-value" id="lp_filter_hzValue">6.0 kHz</div>
      </div>

      <div class="mini-knob-block">
        <div class="block-title">DUCKING</div>
        <div class="knob mini-knob" data-param="ducking" data-min="0" data-max="100"><div class="ring"></div></div>
        <div class="knob-value" id="duckingValue">20%</div>
      </div>
    </div>
  </div>
  </div>

  <script type="module" src="js/index.js?v=3"></script>
</body>
</html>
