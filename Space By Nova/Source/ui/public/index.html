<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Space</title>
  <style>
    :root {
      --outer-bg: #d8d1c6;
      --panel-bg: #f3efe8;
      --panel-line: #e1cfb0;
      --text-main: #26180f;
      --text-soft: #7d6650;
      --gold: #c39231;
      --gold-soft: #d8b56d;
      --gold-pale: #edd18c;
      --white: #fffdf8;
      --ease: 220ms cubic-bezier(0.22, 1, 0.36, 1);
      --base-width: 1200px;
      --base-height: 700px;
      --ui-scale: 0.80;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--outer-bg);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage {
      position: relative;
      width: calc(var(--base-width) * var(--ui-scale));
      height: calc(var(--base-height) * var(--ui-scale));
      overflow: hidden;
    }

    .plugin {
      position: absolute;
      inset: 0;
      width: var(--base-width);
      height: var(--base-height);
      background: linear-gradient(180deg, #f7f3ed 0%, #efeae2 100%);
      border: 2px solid var(--panel-line);
      border-radius: 40px;
      overflow: hidden;
      box-shadow:
        0 18px 40px rgba(118, 96, 66, 0.14),
        inset 0 1px 0 rgba(255,255,255,0.78),
        inset 0 -8px 18px rgba(188, 168, 138, 0.12);
      transform: scale(var(--ui-scale));
      transform-origin: top left;
    }

    .plugin::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 10px;
      background: linear-gradient(135deg, rgba(255,255,255,0.82) 0%, rgba(255,255,255,0.18) 28%, rgba(177,150,112,0.18) 72%, rgba(116,90,52,0.14) 100%);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.9;
    }

    .plugin::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 30px;
      border-top: 1px solid rgba(255,255,255,0.58);
      border-left: 1px solid rgba(255,255,255,0.32);
      border-right: 1px solid rgba(204,186,154,0.22);
      border-bottom: 1px solid rgba(170,146,108,0.16);
      pointer-events: none;
    }

    .nova-header {
      position: absolute;
      left: 56px;
      top: 34px;
      display: flex;
      align-items: flex-start;
      gap: 18px;
      min-height: 64px;
    }

    .nova-logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      margin-left: -10px;
      border-radius: 10px;
      background: rgba(60, 56, 48, 0.10);
      box-shadow: 0 2px 8px 0 rgba(60,56,48,0.07);
      backdrop-filter: blur(1.5px);
    }

    .nova-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      filter: grayscale(0.1) brightness(0.93) contrast(1.08);
      opacity: 1;
    }

    .nova-title-nova {
      font-size: 24px;
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-weight: 700;
      letter-spacing: 0.13em;
      color: #353535;
      margin: 0 0 2px 0;
      padding: 0;
      opacity: 0.97;
    }

    .nova-title-space {
      font-size: 30px;
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-weight: 950;
      letter-spacing: 0.04em;
      color: #282420;
      margin: 0;
      padding: 0;
      line-height: 1.0;
      opacity: 0.98;
    }

    .subtitle {
      position: absolute;
      left: 58px;
      top: 108px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text-soft);
    }

    .tagline {
      position: absolute;
      right: 60px;
      top: 42px;
      font-family: "Snell Roundhand", "Apple Chancery", "URW Chancery L", "Brush Script MT", cursive;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: #8f7654;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.42),
        0 2px 3px rgba(126, 98, 62, 0.12);
    }

    .spectrum-section {
      position: absolute;
      top: 136px;
      left: 58px;
      right: 58px;
      height: 148px;
    }

    .spectrum-frame {
      width: 100%;
      height: 126px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(180deg, #0d1324 0%, #06090f 100%);
      border: 1px solid rgba(200,165,80,0.16);
      box-shadow:
        inset 0 2px 10px rgba(0,0,0,0.45),
        0 2px 12px rgba(90, 68, 34, 0.12);
    }

    .spectrum-frame canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .spectrum-legend {
      position: absolute;
      top: 8px;
      right: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      pointer-events: none;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(214, 191, 151, 0.58);
      user-select: none;
    }

    .legend-swatch {
      width: 16px;
      height: 2px;
      border-radius: 2px;
    }

    .freq-labels {
      display: flex;
      justify-content: space-between;
      padding: 4px 8px 0;
      pointer-events: none;
    }

    .freq-label {
      font-size: 8px;
      letter-spacing: 0.07em;
      color: var(--text-soft);
      opacity: 0.38;
      text-transform: uppercase;
      user-select: none;
    }

    .controls-grid {
      position: absolute;
      top: 298px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 0;
    }

    .knob-col {
      width: 190px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      user-select: none;
      -webkit-user-select: none;
    }

    .knob-col .knob-label {
      position: static;
      width: auto;
      text-align: center;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--text-soft);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .controls-grid .knob-shell {
      position: relative;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      cursor: ns-resize;
      touch-action: none;
    }

    .controls-grid .knob-shell.large {
      width: 110px;
      height: 110px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.94),
        inset 0 -10px 18px rgba(170, 138, 88, 0.13),
        0 10px 20px rgba(126, 100, 62, 0.11),
        0 0 0 8px rgba(255, 248, 236, 0.40);
    }

    .controls-grid .value {
      position: static;
      width: auto;
      margin-left: 0;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
      min-width: 58px;
      text-align: center;
      border-radius: 6px;
      padding: 1px 5px;
    }

    .controls-grid .value.width-value {
      width: auto;
      margin-left: 0;
      font-size: 13px;
    }

    .knob-label {
      position: absolute;
      width: 140px;
      text-align: center;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text-soft);
      user-select: none;
    }

    .value {
      position: absolute;
      width: 140px;
      margin-left: -70px;
      text-align: center;
      font-size: 28px;
      font-weight: 500;
      color: var(--text-main);
      cursor: text;
      border-radius: 10px;
      outline: none;
      user-select: text;
      transition: background var(--ease), box-shadow var(--ease);
    }

    .value[contenteditable="true"]:hover {
      background: rgba(255, 255, 255, 0.34);
    }

    .value[contenteditable="true"]:focus {
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 1px rgba(201, 150, 53, 0.22);
    }

    .value.width-value {
      width: 180px;
      margin-left: -90px;
      font-size: 26px;
    }

    .knob-shell {
      position: absolute;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.62) 16%, rgba(255,255,255,0.14) 26%, transparent 34%),
        linear-gradient(145deg, #f8f3eb 0%, #eadfcf 48%, #dbc8ae 100%);
      border: 1px solid rgba(206, 176, 120, 0.95);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.92),
        inset 0 -10px 18px rgba(170, 138, 88, 0.12),
        0 8px 18px rgba(126, 100, 62, 0.10),
        0 0 0 7px rgba(255, 248, 236, 0.42);
      overflow: visible;
      cursor: ns-resize;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: transform var(--ease), box-shadow var(--ease), filter var(--ease);
    }

    .knob-shell:hover,
    .knob-shell.dragging {
      transform: translateY(-1px);
      filter: brightness(1.01);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.94),
        inset 0 -10px 18px rgba(170, 138, 88, 0.14),
        0 12px 24px rgba(126, 100, 62, 0.13),
        0 0 0 7px rgba(255, 248, 236, 0.52);
    }

    .knob-shell::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.74);
      box-shadow:
        inset 0 0 0 1px rgba(211, 185, 138, 0.28),
        inset 0 -6px 10px rgba(162, 130, 81, 0.08);
      opacity: 0.9;
      pointer-events: none;
    }

    .knob-shell::after {
      content: none;
    }

    .knob-shell.large {
      background:
        radial-gradient(circle at 31% 23%, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.64) 16%, rgba(255,255,255,0.15) 27%, transparent 35%),
        linear-gradient(145deg, #f9f4ed 0%, #eadfce 46%, #d8c3a8 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.94),
        inset 0 -12px 22px rgba(170, 138, 88, 0.13),
        0 12px 26px rgba(126, 100, 62, 0.11),
        0 0 0 10px rgba(255, 248, 236, 0.38);
    }

    .indicator {
      position: absolute;
      inset: 0;
      transform: rotate(var(--rotation, -14deg));
      transition: transform var(--ease);
      pointer-events: none;
    }

    .indicator::before {
      content: "";
      position: absolute;
      inset: 11%;
      border-radius: 50%;
      background: conic-gradient(
        from 218deg,
        rgba(228, 215, 191, 0.80) 0deg 28deg,
        #ecd79b 28deg 74deg,
        #c88f2f 74deg 112deg,
        transparent 112deg 360deg
      );
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 10px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 10px));
      filter: drop-shadow(0 1px 1px rgba(124, 88, 28, 0.16));
      opacity: 0.96;
    }

    .indicator::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 21%;
      top: 8%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #f6e3b5 0%, #dab056 55%, #c08a2a 100%);
      box-shadow:
        0 0 0 4px rgba(255, 249, 238, 0.92),
        0 3px 8px rgba(152, 110, 34, 0.18);
    }

    .large .indicator::before {
      inset: 10%;
      background: conic-gradient(
        from 218deg,
        rgba(228, 215, 191, 0.82) 0deg 32deg,
        #f0ddab 32deg 78deg,
        #c88f2f 78deg 116deg,
        transparent 116deg 360deg
      );
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 15px), #000 calc(100% - 14px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 15px), #000 calc(100% - 14px));
      filter: drop-shadow(0 2px 2px rgba(124, 88, 28, 0.14));
    }

    .large .indicator::after {
      width: 24px;
      height: 24px;
      right: 6.5%;
      top: 16%;
      left: auto;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #f8e6bf 0%, #ddb45f 55%, #c38c2d 100%);
      box-shadow:
        0 0 0 5px rgba(255, 249, 238, 0.94),
        0 3px 9px rgba(170, 130, 54, 0.22);
    }

    .mini-dot {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--gold-soft) 0%, var(--gold) 100%);
      box-shadow: 0 0 0 4px rgba(255, 249, 238, 0.85);
      pointer-events: none;
    }

    .meter-title {
      position: absolute;
      left: 572px;
      top: 345px;
      width: 120px;
      margin-left: -60px;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text-soft);
      user-select: none;
    }

    .stereo-vu {
      position: absolute;
      left: 214px;
      top: 482px;
      width: 736px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .vu-wing {
      width: 250px;
      display: flex;
      align-items: center;
    }

    .vu-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(230,223,214,0.9), rgba(216,208,197,0.9));
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.7),
        inset 0 -1px 2px rgba(155,134,104,0.14);
      overflow: hidden;
    }

    .vu-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(246, 231, 181, 0.16) 0%, #f0d78e 20%, #c89a36 56%, #f2dc98 100%);
      box-shadow: 0 0 12px rgba(196, 149, 57, 0.22);
      opacity: 0.96;
    }

    .vu-fill.left {
      width: 88%;
      margin-left: auto;
      transform-origin: right center;
      animation: vuPulseLeft 2.2s ease-in-out infinite;
    }

    .vu-fill.right {
      width: 88%;
      transform-origin: left center;
      animation: vuPulseRight 2.2s ease-in-out infinite;
    }

    @keyframes vuPulseLeft {
      0%, 100% { transform: scaleX(0.62); }
      50% { transform: scaleX(1); }
    }

    @keyframes vuPulseRight {
      0%, 100% { transform: scaleX(0.58); }
      50% { transform: scaleX(0.96); }
    }

    .mode-button {
      position: absolute;
      width: 190px;
      height: 55px;
      border-radius: 24px;
      border: 2px solid rgba(224, 208, 182, 0.96);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.52) 14%, transparent 15%),
        linear-gradient(180deg, #f8f5ef 0%, #f1ece3 56%, #e8e0d3 100%);
      color: #6f5b44;
      font-size: 21px;
      font-weight: 500;
      letter-spacing: 0.16em;
      cursor: pointer;
      text-shadow: 0 1px 0 rgba(255,255,255,0.60);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.96),
        inset 0 -3px 5px rgba(208, 190, 160, 0.22),
        0 2px 0 rgba(216, 199, 171, 0.76),
        0 6px 12px rgba(150, 121, 72, 0.08);
      transition: background var(--ease), color var(--ease), box-shadow var(--ease), transform var(--ease), filter var(--ease);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.78),
        inset 0 -3px 6px rgba(120, 82, 29, 0.18),
        0 2px 0 rgba(167, 125, 49, 0.5),
        0 10px 16px rgba(161, 124, 58, 0.14);
    }

    .mode-button.active {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0.12) 16%, transparent 17%),
        linear-gradient(180deg, #f0d994 0%, #ddb760 34%, #c99635 66%, #ab7420 100%);
      color: #fffdf8;
      border-color: #b9842b;
      text-shadow: 0 1px 2px rgba(110, 72, 18, 0.28);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.36),
        inset 0 -4px 7px rgba(104, 67, 16, 0.24),
        0 2px 0 rgba(151, 107, 31, 0.55),
        0 10px 18px rgba(180, 136, 57, 0.18),
        0 0 16px rgba(224, 186, 95, 0.16);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="plugin" id="plugin-ui">
    <div class="nova-header">
      <div class="nova-logo-container">
        <img src="n_logo.png" alt="N" class="nova-logo" />
      </div>
      <div class="nova-title-stack">
        <span class="nova-title-nova">NOVA</span>
        <br style="line-height:0; margin:0; padding:0;" />
        <span class="nova-title-space">SPACE</span>
      </div>
    </div>
    <div class="subtitle">STUDIO GLOW FOR MODERN VOCALS</div>
    <div class="tagline">by International Nova</div>

    <div class="spectrum-section">
      <div class="spectrum-frame">
        <canvas id="space-canvas"></canvas>
        <div class="spectrum-legend">
          <div class="legend-item"><span class="legend-swatch" style="background: rgba(215,175,80,0.88);"></span>dry</div>
          <div class="legend-item"><span class="legend-swatch" style="background: rgba(80,130,240,0.88); box-shadow: 0 0 5px rgba(80,130,240,0.45);"></span>reverb tail</div>
          <div class="legend-item"><span class="legend-swatch" style="background: rgba(128,92,216,0.78); box-shadow: 0 0 5px rgba(128,92,216,0.40);"></span>wet bloom</div>
        </div>
      </div>
      <div class="freq-labels">
        <span class="freq-label">20 Hz</span>
        <span class="freq-label">100 Hz</span>
        <span class="freq-label">500 Hz</span>
        <span class="freq-label">1 kHz</span>
        <span class="freq-label">5 kHz</span>
        <span class="freq-label">10 kHz</span>
        <span class="freq-label">20 kHz</span>
      </div>
    </div>

    <div class="controls-grid">
      <div class="knob-col">
        <div class="knob-label">SPACE</div>
        <div class="knob-shell macro-knob" id="space-knob" data-param="space" data-default="18">
          <div class="indicator"></div>
        </div>
        <div class="value editable-value" id="space-value" data-param="space" contenteditable="true" spellcheck="false">18%</div>
      </div>

      <div class="knob-col">
        <div class="knob-label">AIR</div>
        <div class="knob-shell macro-knob" id="air-knob" data-param="air" data-default="32">
          <div class="indicator"></div>
        </div>
        <div class="value editable-value" id="air-value" data-param="air" contenteditable="true" spellcheck="false">32%</div>
      </div>

      <div class="knob-col">
        <div class="knob-label">DEPTH</div>
        <div class="knob-shell macro-knob" id="depth-knob" data-param="depth" data-default="26">
          <div class="indicator"></div>
        </div>
        <div class="value editable-value" id="depth-value" data-param="depth" contenteditable="true" spellcheck="false">26%</div>
      </div>

      <div class="knob-col">
        <div class="knob-label">WIDTH</div>
        <div class="knob-shell large macro-knob" id="width-knob" data-param="width" data-default="38">
          <div class="indicator"></div>
        </div>
        <div class="value width-value editable-value" id="width-value" data-param="width" contenteditable="true" spellcheck="false">38%</div>
      </div>

      <div class="knob-col">
        <div class="knob-label">MIX</div>
        <div class="knob-shell macro-knob" id="mix-knob" data-param="mix" data-default="16">
          <div class="indicator"></div>
        </div>
        <div class="value editable-value" id="mix-value" data-param="mix" contenteditable="true" spellcheck="false">16%</div>
      </div>
    </div>

    <button class="mode-button active" data-mode="Studio" data-mode-index="0" style="left: 60px; top: 628px;">STUDIO</button>
    <button class="mode-button" data-mode="Arena" data-mode-index="1" style="left: 340px; top: 628px;">ARENA</button>
    <button class="mode-button" data-mode="Dream" data-mode-index="2" style="left: 620px; top: 628px;">DREAM</button>
    <button class="mode-button" data-mode="Vintage" data-mode-index="3" style="left: 900px; top: 628px;">VINTAGE</button>
    </div>
  </div>

  <script>
    (function () {
      var parameterStates = {};
      var modeNames = ["Studio", "Arena", "Dream", "Vintage"];
      var macroParams = ["space", "air", "depth", "mix", "width"];
      var presets = {
        Studio:  { space: 18, air: 32, depth: 26, mix: 16, width: 38 },
        Arena:   { space: 66, air: 60, depth: 70, mix: 28, width: 86 },
        Dream:   { space: 84, air: 64, depth: 82, mix: 34, width: 90 },
        Vintage: { space: 42, air: 20, depth: 52, mix: 24, width: 48 }
      };

      var currentValues = {
        space: presets.Studio.space,
        air: presets.Studio.air,
        depth: presets.Studio.depth,
        mix: presets.Studio.mix,
        width: presets.Studio.width
      };

      var juceAvailable = false;
      var activeDrag = null;
      var spectrumCanvas = null;
      var spectrumCtx = null;
      var spectrumAnimationId = null;
      var spectrumTime = 0;
      var SPECTRUM_BINS = 120;
      var smoothedDry = new Float32Array(SPECTRUM_BINS);
      var smoothedTail = new Float32Array(SPECTRUM_BINS);
      var smoothedBloom = new Float32Array(SPECTRUM_BINS);

      function clamp(value, min, max) {
        var safeMin = typeof min === "number" ? min : 0;
        var safeMax = typeof max === "number" ? max : 100;
        return Math.min(safeMax, Math.max(safeMin, value));
      }

      function moveCaretToEnd(element) {
        if (!window.getSelection || !document.createRange) return;

        var selection = window.getSelection();
        var range = document.createRange();
        range.selectNodeContents(element);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function getDataAttribute(element, name) {
        if (!element) return "";
        if (element.dataset && Object.prototype.hasOwnProperty.call(element.dataset, name)) {
          return element.dataset[name];
        }
        return element.getAttribute("data-" + name) || "";
      }

      function updateVisual(param, percent) {
        var safeValue = clamp(Number(percent) || 0);
        var knob = document.getElementById(param + "-knob");
        var readout = document.getElementById(param + "-value");

        currentValues[param] = safeValue;

        if (knob) {
          var indicator = knob.querySelector(".indicator");
          var rotation = -120 + (safeValue / 100) * 240;
          if (indicator && indicator.style) {
            indicator.style.setProperty("--rotation", rotation + "deg");
          }
        }

        if (readout && document.activeElement !== readout) {
          readout.textContent = String(Math.round(safeValue)) + "%";
        }
      }

      function createListenerList() {
        return {
          listeners: [],
          addListener: function (fn) {
            this.listeners.push(fn);
            return this.listeners.length - 1;
          },
          callListeners: function (payload) {
            for (var i = 0; i < this.listeners.length; i += 1) {
              this.listeners[i](payload);
            }
          }
        };
      }

      function createSliderState(name) {
        if (!juceAvailable || !window.__JUCE__ || !window.__JUCE__.backend) return null;

        var backend = window.__JUCE__.backend;
        var state = {
          name: name,
          identifier: "__juce__slider" + name,
          scaledValue: 0,
          properties: {
            start: 0,
            end: 1,
            skew: 1,
            interval: 0,
            numSteps: 100
          },
          valueChangedEvent: createListenerList(),
          getNormalisedValue: function () {
            var start = typeof this.properties.start === "number" ? this.properties.start : 0;
            var end = typeof this.properties.end === "number" ? this.properties.end : 1;
            var range = end - start;

            if (range === 0) return 0;
            return clamp((this.scaledValue - start) / range, 0, 1);
          },
          setNormalisedValue: function (newValue) {
            var normalised = clamp(newValue, 0, 1);
            var start = typeof this.properties.start === "number" ? this.properties.start : 0;
            var end = typeof this.properties.end === "number" ? this.properties.end : 1;
            var interval = typeof this.properties.interval === "number" ? this.properties.interval : 0;
            var scaled = start + (normalised * (end - start));

            if (interval > 0) {
              scaled = Math.round(scaled / interval) * interval;
            }

            this.scaledValue = scaled;
            backend.emitEvent(this.identifier, {
              eventType: "valueChanged",
              value: scaled
            });
          },
          sliderDragStarted: function () {
            backend.emitEvent(this.identifier, { eventType: "sliderDragStarted" });
          },
          sliderDragEnded: function () {
            backend.emitEvent(this.identifier, { eventType: "sliderDragEnded" });
          }
        };

        backend.addEventListener(state.identifier, function (event) {
          if (!event) return;

          if (event.eventType === "valueChanged") {
            if (typeof event.value === "number") {
              state.scaledValue = event.value;
            }
            state.valueChangedEvent.callListeners(event);
          }

          if (event.eventType === "propertiesChanged") {
            var updatedProperties = {};
            for (var key in event) {
              if (Object.prototype.hasOwnProperty.call(event, key) && key !== "eventType") {
                updatedProperties[key] = event[key];
              }
            }
            state.properties = updatedProperties;
          }
        });

        backend.emitEvent(state.identifier, { eventType: "requestInitialUpdate" });
        return state;
      }

      function pushToBackend(param, percent, useGesture) {
        var state = parameterStates[param];
        if (!state) return;

        try {
          if (useGesture) state.sliderDragStarted();
          state.setNormalisedValue(clamp(percent) / 100);
          if (useGesture) state.sliderDragEnded();
        } catch (error) {
          console.warn("Failed to update " + param + ":", error && error.message ? error.message : error);
        }
      }

      function setParamPercent(param, percent, options) {
        var safeValue = clamp(percent);
        var settings = options || {};

        updateVisual(param, safeValue);

        if (settings.pushToBackend) {
          pushToBackend(param, safeValue, !!settings.useGesture);
        }
      }

      function setActiveMode(modeName) {
        var buttons = document.querySelectorAll(".mode-button");
        Array.prototype.forEach.call(buttons, function (button) {
          button.classList.toggle("active", getDataAttribute(button, "mode") === modeName);
        });
      }

      function applyPreset(modeName, pushModeToBackend) {
        var preset = presets[modeName];
        var shouldPush = pushModeToBackend !== false;

        if (!preset) return;

        setActiveMode(modeName);

        Array.prototype.forEach.call(macroParams, function (param) {
          setParamPercent(param, preset[param], { pushToBackend: shouldPush });
        });

        if (shouldPush && parameterStates.nova_mode) {
          try {
            var modeIndex = modeNames.indexOf(modeName);
            parameterStates.nova_mode.setNormalisedValue(modeIndex / (modeNames.length - 1));
          } catch (error) {
            console.warn("Failed to set mode:", error && error.message ? error.message : error);
          }
        }
      }

      function initialiseParameterStates() {
        if (!juceAvailable) return;

        Array.prototype.forEach.call(macroParams.concat(["nova_mode"]), function (param) {
          parameterStates[param] = createSliderState(param);
        });

        Array.prototype.forEach.call(macroParams, function (param) {
          var state = parameterStates[param];
          if (!state || !state.valueChangedEvent) return;

          state.valueChangedEvent.addListener(function () {
            updateVisual(param, state.getNormalisedValue() * 100);
          });
        });

        if (parameterStates.nova_mode && parameterStates.nova_mode.valueChangedEvent) {
          parameterStates.nova_mode.valueChangedEvent.addListener(function () {
            var modeIndex = Math.round(parameterStates.nova_mode.getNormalisedValue() * (modeNames.length - 1));
            setActiveMode(modeNames[clamp(modeIndex, 0, modeNames.length - 1)]);
          });
        }

        window.setTimeout(function () {
          Array.prototype.forEach.call(macroParams, function (param) {
            var state = parameterStates[param];
            if (state) {
              updateVisual(param, state.getNormalisedValue() * 100);
            }
          });

          if (parameterStates.nova_mode) {
            var modeIndex = Math.round(parameterStates.nova_mode.getNormalisedValue() * (modeNames.length - 1));
            setActiveMode(modeNames[clamp(modeIndex, 0, modeNames.length - 1)]);
          }
        }, 60);
      }

      function getClientY(event) {
        if (!event) return 0;
        if (event.touches && event.touches.length > 0) return event.touches[0].clientY;
        if (event.changedTouches && event.changedTouches.length > 0) return event.changedTouches[0].clientY;
        return typeof event.clientY === "number" ? event.clientY : 0;
      }

      function startDrag(param, knob, event, defaultPercent) {
        if (event && typeof event.button === "number" && event.button !== 0) return;

        if (event && event.preventDefault) event.preventDefault();
        if (event && event.stopPropagation) event.stopPropagation();

        knob.classList.add("dragging");
        activeDrag = {
          param: param,
          knob: knob,
          pointerId: event && typeof event.pointerId !== "undefined" ? event.pointerId : null,
          startY: getClientY(event),
          startValue: typeof currentValues[param] === "number" ? currentValues[param] : defaultPercent
        };

        if (typeof knob.setPointerCapture === "function" && event && typeof event.pointerId !== "undefined") {
          try {
            knob.setPointerCapture(event.pointerId);
          } catch (error) {
            console.warn(error && error.message ? error.message : error);
          }
        }

        if (parameterStates[param]) {
          try {
            parameterStates[param].sliderDragStarted();
          } catch (error) {
            console.warn(error && error.message ? error.message : error);
          }
        }
      }

      function updateActiveDrag(event) {
        if (!activeDrag) return;
        if (activeDrag.pointerId !== null && event && typeof event.pointerId !== "undefined" && event.pointerId !== activeDrag.pointerId) {
          return;
        }

        if (event && event.preventDefault) event.preventDefault();

        var deltaY = activeDrag.startY - getClientY(event);
        var nextValue = clamp(activeDrag.startValue + (deltaY * 0.45));
        setParamPercent(activeDrag.param, nextValue, { pushToBackend: true });
      }

      function finishActiveDrag(event) {
        if (!activeDrag) return;
        if (activeDrag.pointerId !== null && event && typeof event.pointerId !== "undefined" && event.pointerId !== activeDrag.pointerId) {
          return;
        }

        if (parameterStates[activeDrag.param]) {
          try {
            parameterStates[activeDrag.param].sliderDragEnded();
          } catch (error) {
            console.warn(error && error.message ? error.message : error);
          }
        }

        if (typeof activeDrag.knob.releasePointerCapture === "function" && activeDrag.pointerId !== null) {
          try {
            activeDrag.knob.releasePointerCapture(activeDrag.pointerId);
          } catch (error) {
            console.warn(error && error.message ? error.message : error);
          }
        }

        activeDrag.knob.classList.remove("dragging");
        activeDrag = null;
      }

      function initialiseKnobs() {
        var knobs = document.querySelectorAll(".macro-knob");

        Array.prototype.forEach.call(knobs, function (knob) {
          var param = getDataAttribute(knob, "param");
          var defaultPercent = Number(getDataAttribute(knob, "default") || 0);

          updateVisual(param, typeof currentValues[param] === "number" ? currentValues[param] : defaultPercent);

          var startHandler = function (event) {
            startDrag(param, knob, event, defaultPercent);
          };

          knob.addEventListener("pointerdown", startHandler);
          knob.addEventListener("mousedown", startHandler);
          knob.addEventListener("touchstart", startHandler, { passive: false });

          knob.addEventListener("dblclick", function () {
            setParamPercent(param, defaultPercent, { pushToBackend: true });
          });
        });

        document.addEventListener("pointermove", updateActiveDrag);
        document.addEventListener("mousemove", updateActiveDrag);
        document.addEventListener("touchmove", updateActiveDrag, { passive: false });

        document.addEventListener("pointerup", finishActiveDrag);
        document.addEventListener("mouseup", finishActiveDrag);
        document.addEventListener("touchend", finishActiveDrag);
        document.addEventListener("pointercancel", finishActiveDrag);
        document.addEventListener("touchcancel", finishActiveDrag);
        document.addEventListener("mouseleave", finishActiveDrag);
      }

      function initialiseReadouts() {
        var readouts = document.querySelectorAll(".editable-value");

        Array.prototype.forEach.call(readouts, function (readout) {
          var param = getDataAttribute(readout, "param");

          readout.addEventListener("focus", function () {
            readout.textContent = String(Math.round(typeof currentValues[param] === "number" ? currentValues[param] : 0));
            moveCaretToEnd(readout);
          });

          readout.addEventListener("input", function () {
            var cleaned = readout.textContent.replace(/[^0-9.]/g, "");
            if (readout.textContent !== cleaned) {
              readout.textContent = cleaned;
              moveCaretToEnd(readout);
            }
          });

          readout.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
              event.preventDefault();
              readout.blur();
            }

            if (event.key === "Escape") {
              event.preventDefault();
              updateVisual(param, typeof currentValues[param] === "number" ? currentValues[param] : 0);
              readout.blur();
            }
          });

          readout.addEventListener("blur", function () {
            var raw = readout.textContent.replace(/[^0-9.]/g, "");
            var nextValue = raw === "" ? (typeof currentValues[param] === "number" ? currentValues[param] : 0) : clamp(Number(raw));
            setParamPercent(param, nextValue, { pushToBackend: true });
          });
        });
      }

      function initialiseModeButtons() {
        var buttons = document.querySelectorAll(".mode-button");

        Array.prototype.forEach.call(buttons, function (button) {
          var clickHandler = function (event) {
            if (event && event.preventDefault) event.preventDefault();
            applyPreset(getDataAttribute(button, "mode"), true);
          };

          button.addEventListener("click", clickHandler);
          button.addEventListener("touchend", clickHandler);
        });
      }

      function resizeSpectrumCanvas() {
        if (!spectrumCanvas) return;
        var frame = spectrumCanvas.parentElement;
        if (!frame) return;
        spectrumCanvas.width = frame.clientWidth;
        spectrumCanvas.height = frame.clientHeight;
      }

      function generateSpectrumFrame() {
        var spacePct = currentValues.space / 100;
        var airPct = currentValues.air / 100;
        var depthPct = currentValues.depth / 100;
        var widthPct = currentValues.width / 100;
        var mixPct = currentValues.mix / 100;
        var t0 = spectrumTime;

        for (var i = 0; i < SPECTRUM_BINS; i += 1) {
          var f = i / (SPECTRUM_BINS - 1);

          var dryBase = Math.pow(1 - f * 0.60, 0.72);
          var dryP1 = 0.42 * Math.exp(-Math.pow(f - (0.19 + 0.04 * Math.sin(t0 * 0.55)), 2) / 0.0034);
          var dryP2 = 0.28 * Math.exp(-Math.pow(f - (0.44 + 0.03 * Math.sin(t0 * 0.36 + 1.1)), 2) / 0.0055);
          var dryP3 = 0.18 * Math.exp(-Math.pow(f - (0.71 + 0.02 * Math.sin(t0 * 0.82 + 2.0)), 2) / 0.0078);
          var rawDry = clamp((dryBase + dryP1 + dryP2 + dryP3) * (0.50 + 0.16 * Math.sin(t0 * 0.24 + f * 1.8)), 0, 1);

          var tailBase = Math.pow(1 - f * 0.70, 1.20) * spacePct;
          var tailSwell = 0.48 * spacePct * Math.exp(-Math.pow(f - 0.30, 2) / (0.05 + spacePct * 0.10));
          var tailAir = 0.30 * airPct * Math.exp(-Math.pow(f - 0.72, 2) / (0.06 + airPct * 0.08));
          var tailDepth = 0.26 * depthPct * Math.exp(-Math.pow(f - 0.10, 2) / (0.04 + depthPct * 0.07));
          var tailDecay = 0.62 + 0.38 * (0.5 + 0.5 * Math.sin(t0 * 0.96 - f * 10.0));
          var highShimmer = airPct * Math.pow(f, 3.2) * (0.36 + 0.64 * (0.5 + 0.5 * Math.sin(t0 * 4.3 + f * 26.0)));
          var rawTail = (tailBase + tailSwell + tailAir + tailDepth)
                      * (0.70 + 0.30 * Math.sin(t0 * 0.20 + f * 2.8 + spacePct * 1.8))
                      * tailDecay;
          rawTail = clamp(rawTail + 0.13 * highShimmer, 0, 1);

          var bloomEnergy = mixPct * (0.56 * spacePct + 0.44 * depthPct)
                          * (0.55 + 0.45 * Math.sin(t0 * 0.22 + f * 4.8));
          var bloomShape = Math.sin(Math.PI * f) * bloomEnergy * (0.86 + widthPct * 0.24);
          var rawBloom = clamp(bloomShape * (0.90 + 0.10 * Math.random()), 0, 1);

          smoothedDry[i] = smoothedDry[i] + (rawDry - smoothedDry[i]) * 0.22;
          smoothedTail[i] = smoothedTail[i] + (rawTail - smoothedTail[i]) * 0.09;
          smoothedBloom[i] = smoothedBloom[i] + (rawBloom - smoothedBloom[i]) * 0.08;
        }
      }

      function drawSpectrumFrame() {
        if (!spectrumCtx || !spectrumCanvas) return;
        var ctx = spectrumCtx;
        var W = spectrumCanvas.width;
        var H = spectrumCanvas.height;
        var depthPct = currentValues.depth / 100;
        var widthPct = currentValues.width / 100;
        var airPct = currentValues.air / 100;
        var mixPct = currentValues.mix / 100;
        var spreadPx = 8 + widthPct * 36;

        ctx.clearRect(0, 0, W, H);

        var bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, "#0d1325");
        bg.addColorStop(1, "#06090f");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        var hazeAlpha = 0.05 + depthPct * 0.20;
        var hazeRadius = H * (0.38 + depthPct * 0.68);
        var hazeA = ctx.createRadialGradient(W * 0.33, H * 0.64, H * 0.05, W * 0.33, H * 0.64, hazeRadius);
        hazeA.addColorStop(0, "rgba(64,108,215," + hazeAlpha.toFixed(3) + ")");
        hazeA.addColorStop(1, "rgba(64,108,215,0)");
        ctx.fillStyle = hazeA;
        ctx.fillRect(0, 0, W, H);

        var hazeB = ctx.createRadialGradient(W * 0.68, H * 0.58, H * 0.05, W * 0.68, H * 0.58, hazeRadius);
        hazeB.addColorStop(0, "rgba(92,74,206," + (hazeAlpha * 0.72).toFixed(3) + ")");
        hazeB.addColorStop(1, "rgba(92,74,206,0)");
        ctx.fillStyle = hazeB;
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = "rgba(200,170,90,0.07)";
        ctx.lineWidth = 1;
        var gridFreqs = [0.07, 0.18, 0.34, 0.5, 0.66, 0.8, 0.93];
        for (var gi = 0; gi < gridFreqs.length; gi += 1) {
          var gx = Math.round(gridFreqs[gi] * W) + 0.5;
          ctx.beginPath();
          ctx.moveTo(gx, 0);
          ctx.lineTo(gx, H);
          ctx.stroke();
        }

        var binW = W / SPECTRUM_BINS;

        for (var i = 0; i < SPECTRUM_BINS; i += 1) {
          var x = i * binW;
          var bloomH = smoothedBloom[i] * H * 0.80;
          var centerBias = Math.abs((i / (SPECTRUM_BINS - 1)) - 0.5) * 2;
          var localSpread = spreadPx * (0.36 + centerBias * 0.64);
          var bloomGrad = ctx.createLinearGradient(0, H - bloomH, 0, H);
          bloomGrad.addColorStop(0, "rgba(98,72,204,0)");
          bloomGrad.addColorStop(0.45, "rgba(95,72,196,0.12)");
          bloomGrad.addColorStop(1, "rgba(76,52,178,0.24)");
          ctx.fillStyle = bloomGrad;
          ctx.fillRect(x - localSpread * 0.10, H - bloomH, binW + 1 + localSpread * 0.20, bloomH);
        }

        ctx.beginPath();
        ctx.moveTo(0, H);
        for (var t = 0; t < SPECTRUM_BINS; t += 1) {
          var tx = t * binW + binW * 0.5;
          var ts = ((tx / W) - 0.5) * 2;
          tx += ts * spreadPx;
          var th = smoothedTail[t] * H * 0.84;
          ctx.lineTo(tx, H - th);
        }
        ctx.lineTo(W, H);
        ctx.closePath();
        var tailGrad = ctx.createLinearGradient(0, 0, 0, H);
        tailGrad.addColorStop(0, "rgba(62,102,224,0.38)");
        tailGrad.addColorStop(0.5, "rgba(52,88,198,0.24)");
        tailGrad.addColorStop(1, "rgba(42,72,178,0.08)");
        ctx.fillStyle = tailGrad;
        ctx.fill();

        ctx.beginPath();
        for (var l = 0; l < SPECTRUM_BINS; l += 1) {
          var lx = l * binW + binW * 0.5;
          var ls = ((lx / W) - 0.5) * 2;
          lx += ls * spreadPx;
          var lh = smoothedTail[l] * H * 0.84;
          if (l === 0) ctx.moveTo(lx, H - lh);
          else ctx.lineTo(lx, H - lh);
        }
        ctx.strokeStyle = "rgba(84,136,245,0.76)";
        ctx.lineWidth = 1.5;
        ctx.shadowColor = "rgba(76,128,238,0.55)";
        ctx.shadowBlur = 6;
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.beginPath();
        for (var l2 = 0; l2 < SPECTRUM_BINS; l2 += 1) {
          var lx2 = l2 * binW + binW * 0.5;
          var ls2 = ((lx2 / W) - 0.5) * 2;
          lx2 -= ls2 * spreadPx * 0.52;
          var lh2 = smoothedTail[l2] * H * 0.76;
          if (l2 === 0) ctx.moveTo(lx2, H - lh2);
          else ctx.lineTo(lx2, H - lh2);
        }
        ctx.strokeStyle = "rgba(92,146,250,0.42)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        for (var d = 0; d < SPECTRUM_BINS; d += 1) {
          var dx = d * binW + binW * 0.5;
          var dh = smoothedDry[d] * H * 0.70;
          if (d === 0) ctx.moveTo(dx, H - dh);
          else ctx.lineTo(dx, H - dh);
        }
        ctx.strokeStyle = "rgba(218,176,82,0.88)";
        ctx.lineWidth = 1.2;
        ctx.shadowColor = "rgba(218,176,82,0.40)";
        ctx.shadowBlur = 4;
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.globalCompositeOperation = "screen";
        var shimmer = ctx.createLinearGradient(0, 0, W, 0);
        shimmer.addColorStop(0, "rgba(255,220,130,0)");
        shimmer.addColorStop(0.55, "rgba(255,220,130,0)");
        shimmer.addColorStop(0.75, "rgba(248,204,112," + (0.05 + airPct * 0.09).toFixed(3) + ")");
        shimmer.addColorStop(1, "rgba(255,236,168," + (0.08 + mixPct * 0.1).toFixed(3) + ")");
        ctx.fillStyle = shimmer;
        ctx.fillRect(0, 0, W, H);

        for (var p = 0; p < 7; p += 1) {
          var px = W * (0.69 + (p / 7) * 0.28) + Math.sin(spectrumTime * 2 + p * 1.4) * 7;
          var py = H * (0.2 + 0.6 * (0.5 + 0.5 * Math.sin(spectrumTime * 1.3 + p * 0.8)));
          var pr = 7 + airPct * 10 + mixPct * 6;
          var peak = ctx.createRadialGradient(px, py, 0, px, py, pr);
          peak.addColorStop(0, "rgba(255,230,150," + (0.12 + airPct * 0.18).toFixed(3) + ")");
          peak.addColorStop(1, "rgba(255,230,150,0)");
          ctx.fillStyle = peak;
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function renderSpectrum() {
        spectrumTime += 0.016;
        generateSpectrumFrame();
        drawSpectrumFrame();
        spectrumAnimationId = window.requestAnimationFrame(renderSpectrum);
      }

      function initialiseSpectrum() {
        spectrumCanvas = document.getElementById("space-canvas");
        if (!spectrumCanvas) return;
        spectrumCtx = spectrumCanvas.getContext("2d");
        if (!spectrumCtx) return;
        resizeSpectrumCanvas();
        window.addEventListener("resize", resizeSpectrumCanvas);
        if (spectrumAnimationId) window.cancelAnimationFrame(spectrumAnimationId);
        renderSpectrum();
      }

      function bootUi() {
        juceAvailable = !!(window.__JUCE__ && window.__JUCE__.backend && typeof window.__JUCE__.backend.emitEvent === "function");

        initialiseKnobs();
        initialiseReadouts();
        initialiseModeButtons();
        initialiseSpectrum();

        if (juceAvailable) {
          try {
            initialiseParameterStates();
          } catch (error) {
            juceAvailable = false;
            console.warn("Parameter sync unavailable, keeping local UI active:", error && error.message ? error.message : error);
            applyPreset("Studio", false);
          }
        } else {
          applyPreset("Studio", false);
        }

        document.body.setAttribute("data-ui-ready", "true");
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", bootUi, { once: true });
      } else {
        bootUi();
      }
    }());
  </script>
</body>
</html>
