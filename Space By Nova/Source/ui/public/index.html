<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Space</title>
  <style>
    :root {
      --outer-bg: #040913;
      --panel-bg: #08111d;
      --panel-line: rgba(102, 133, 178, 0.28);
      --panel-line-soft: rgba(156, 186, 228, 0.10);
      --text-main: #f4f2ee;
      --text-soft: #aeb5c4;
      --gold: #ff8a2a;
      --gold-soft: #ffb347;
      --gold-deep: #de6612;
      --white: #f7f7f4;
      --ease: 220ms cubic-bezier(0.22, 1, 0.36, 1);
      --base-width: 1200px;
      --base-height: 700px;
      --ui-scale: 0.80;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(110% 92% at 50% 8%, #173c79 0%, #0c1d38 27%, #08111e 58%, #02060d 100%),
        linear-gradient(180deg, #09111e 0%, #03070f 100%);
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage {
      position: relative;
      width: calc(var(--base-width) * var(--ui-scale));
      height: calc(var(--base-height) * var(--ui-scale));
      overflow: hidden;
    }

    .plugin {
      position: absolute;
      inset: 0;
      width: var(--base-width);
      height: var(--base-height);
      background:
        radial-gradient(58% 62% at 50% 8%, rgba(39, 83, 157, 0.56) 0%, rgba(22, 47, 88, 0.22) 34%, rgba(10, 18, 31, 0) 78%),
        radial-gradient(34% 42% at 22% 74%, rgba(23, 51, 96, 0.14) 0%, rgba(23, 51, 96, 0) 100%),
        radial-gradient(34% 42% at 82% 72%, rgba(23, 51, 96, 0.12) 0%, rgba(23, 51, 96, 0) 100%),
        repeating-linear-gradient(90deg, rgba(61, 93, 142, 0.02) 0px, rgba(61, 93, 142, 0.02) 1px, transparent 1px, transparent 14px),
        linear-gradient(180deg, #091220 0%, #07101a 56%, #040911 100%);
      border: 1px solid var(--panel-line);
      border-radius: 34px;
      overflow: hidden;
      box-shadow:
        0 24px 56px rgba(0, 0, 0, 0.52),
        0 0 0 1px rgba(103, 135, 183, 0.08),
        inset 0 1px 0 rgba(196, 218, 245, 0.12),
        inset 0 -16px 28px rgba(0, 0, 0, 0.36),
        inset 0 0 46px rgba(6, 14, 24, 0.42),
        inset 0 0 120px rgba(0, 0, 0, 0.18);
      transform: scale(var(--ui-scale));
      transform-origin: top left;
    }

    .plugin::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 10px;
      background: linear-gradient(135deg, rgba(212, 231, 255, 0.24) 0%, rgba(212, 231, 255, 0.05) 24%, rgba(79, 125, 183, 0.10) 72%, rgba(11, 20, 34, 0.10) 100%);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.82;
    }

    .plugin::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 26px;
      border-top: 1px solid rgba(205, 226, 252, 0.10);
      border-left: 1px solid rgba(205, 226, 252, 0.07);
      border-right: 1px solid rgba(79, 112, 150, 0.12);
      border-bottom: 1px solid rgba(45, 70, 98, 0.16);
      pointer-events: none;
    }

    .plugin::selection {
      background: rgba(255, 179, 71, 0.18);
    }

    .plugin > .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .nova-header {
      position: absolute;
      left: 54px;
      top: 28px;
      display: flex;
      align-items: flex-start;
      gap: 18px;
      min-height: 72px;
      z-index: 2;
    }

    .nova-logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      margin-left: -8px;
      margin-top: 2px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(31, 42, 60, 0.88) 0%, rgba(8, 14, 26, 0.98) 100%);
      border: 1px solid rgba(116, 142, 182, 0.36);
      box-shadow:
        inset 0 1px 0 rgba(208, 225, 250, 0.18),
        inset 0 -8px 16px rgba(0, 0, 0, 0.38),
        0 10px 20px rgba(0, 0, 0, 0.24);
    }

    .nova-logo {
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: grayscale(0.0) brightness(1.08) contrast(1.04);
      opacity: 0.94;
    }

    .nova-title-stack {
      display: flex;
      flex-direction: column;
      line-height: 0.92;
      padding-top: 1px;
    }

    .nova-title-nova {
      font-size: 24px;
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-weight: 700;
      letter-spacing: 0.13em;
      color: #d7deea;
      margin: 0 0 2px 0;
      padding: 0;
      opacity: 0.98;
    }

    .nova-title-space {
      font-size: 46px;
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-weight: 950;
      letter-spacing: 0.04em;
      color: #f7f8fb;
      margin: 0;
      padding: 0;
      line-height: 1.0;
      opacity: 0.98;
    }

    .subtitle {
      display: none;
    }

    .tagline {
      position: absolute;
      right: 60px;
      top: 32px;
      font-family: "Snell Roundhand", "Apple Chancery", "URW Chancery L", "Brush Script MT", cursive;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: #ffb76c;
      text-shadow:
        0 0 10px rgba(255, 149, 50, 0.18),
        0 1px 2px rgba(0,0,0,0.30);
      z-index: 2;
    }

    .spectrum-section {
      position: absolute;
      top: 100px;
      left: 34px;
      right: 34px;
      height: 348px;
      z-index: 1;
    }

    .spectrum-frame {
      width: 100%;
      height: 320px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(52% 78% at 50% 0%, rgba(33, 70, 130, 0.26) 0%, rgba(18, 34, 59, 0.10) 36%, rgba(5, 10, 18, 0) 100%),
        linear-gradient(180deg, #091322 0%, #040a13 100%);
      border: 1px solid rgba(112, 144, 192, 0.28);
      box-shadow:
        0 0 18px rgba(58, 108, 190, 0.10),
        inset 0 1px 0 rgba(191, 215, 249, 0.06),
        inset 0 -10px 24px rgba(0,0,0,0.56),
        0 12px 24px rgba(0, 0, 0, 0.16);
    }

    .spectrum-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px rgba(186, 208, 240, 0.04);
      pointer-events: none;
    }

    .spectrum-frame canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .spectrum-legend {
      position: absolute;
      top: 16px;
      right: 18px;
      display: flex;
      gap: 22px;
      align-items: center;
      pointer-events: none;
      z-index: 2;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(222, 227, 238, 0.82);
      user-select: none;
    }

    .legend-swatch {
      width: 26px;
      height: 3px;
      border-radius: 2px;
    }

    .freq-labels {
      display: flex;
      justify-content: space-between;
      padding: 12px 12px 0;
      pointer-events: none;
    }

    .freq-label {
      font-size: 12px;
      letter-spacing: 0.02em;
      color: #b4b8c3;
      opacity: 0.92;
      user-select: none;
    }

    .controls-grid {
      position: absolute;
      top: 412px;
      left: 66px;
      right: 66px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      z-index: 2;
    }

    .knob-col {
      position: relative;
      width: 156px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      user-select: none;
      -webkit-user-select: none;
    }

    .knob-col:not(:last-child)::after {
      content: "";
      position: absolute;
      right: -12px;
      top: 24px;
      width: 1px;
      height: 132px;
      background: linear-gradient(180deg, rgba(255, 166, 69, 0) 0%, rgba(255, 158, 56, 0.32) 44%, rgba(255, 158, 56, 0) 100%);
      opacity: 0.28;
    }

    .knob-col .knob-label {
      position: static;
      width: auto;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.13em;
      color: #f0ece7;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    .controls-grid .knob-shell {
      position: relative;
      width: 106px;
      height: 106px;
      border-radius: 50%;
      cursor: ns-resize;
      touch-action: none;
    }

    .controls-grid .knob-shell.large {
      width: 106px;
      height: 106px;
      box-shadow:
        inset 0 1px 0 rgba(220,236,255,0.32),
        inset 0 -10px 18px rgba(0, 0, 0, 0.44),
        0 10px 20px rgba(0, 0, 0, 0.28),
        0 0 0 8px rgba(10, 17, 29, 0.56);
    }

    #depth-knob {
      width: 122px;
      height: 122px;
      box-shadow:
        inset 0 1px 0 rgba(232,244,255,0.34),
        inset 0 -12px 20px rgba(0, 0, 0, 0.48),
        0 12px 26px rgba(0, 0, 0, 0.36),
        0 0 0 10px rgba(9, 16, 28, 0.58);
      margin-top: -2px;
    }

    .controls-grid .value {
      position: static;
      width: 108px;
      margin-left: 0;
      margin-top: 8px;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.2;
      min-width: 108px;
      text-align: center;
      border-radius: 13px;
      padding: 7px 12px 6px;
      background: linear-gradient(180deg, rgba(16, 24, 37, 0.90) 0%, rgba(9, 14, 24, 0.98) 100%);
      border: 1px solid rgba(88, 112, 148, 0.44);
      color: var(--gold-soft);
      box-shadow:
        inset 0 1px 0 rgba(192, 214, 246, 0.08),
        inset 0 0 10px rgba(90, 122, 171, 0.10),
        0 8px 16px rgba(0, 0, 0, 0.18);
    }

    .controls-grid .value.width-value {
      width: 108px;
      margin-left: 0;
      font-size: 18px;
    }

    .knob-label {
      position: absolute;
      width: 140px;
      text-align: center;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text-soft);
      user-select: none;
    }

    .value {
      position: absolute;
      width: 140px;
      margin-left: -70px;
      text-align: center;
      font-size: 28px;
      font-weight: 500;
      color: var(--text-main);
      cursor: text;
      border-radius: 10px;
      outline: none;
      user-select: text;
      transition: background var(--ease), box-shadow var(--ease);
    }

    .value[contenteditable="true"]:hover {
      background: rgba(255, 255, 255, 0.34);
    }

    .value[contenteditable="true"]:focus {
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 1px rgba(201, 150, 53, 0.22);
    }

    .value.width-value {
      width: 180px;
      margin-left: -90px;
      font-size: 26px;
    }

    .knob-shell {
      position: absolute;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 22%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.06) 16%, transparent 40%),
        radial-gradient(circle at 68% 76%, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.12) 26%, transparent 48%),
        radial-gradient(circle at 50% 48%, rgba(255, 163, 70, 0.16) 0%, rgba(255, 138, 42, 0.08) 24%, rgba(255, 138, 42, 0.0) 52%),
        repeating-conic-gradient(from -8deg, rgba(190, 214, 244, 0.018) 0deg 4deg, rgba(12, 18, 30, 0.0) 4deg 11deg),
        radial-gradient(circle at 50% 42%, #25364d 0%, #162334 42%, #0a111d 78%, #060b14 100%);
      border: 1px solid rgba(132, 168, 209, 0.32);
      box-shadow:
        inset 0 1px 0 rgba(232, 244, 255, 0.20),
        inset 0 0 18px rgba(255, 154, 60, 0.08),
        inset 0 -14px 20px rgba(0, 0, 0, 0.54),
        0 12px 20px rgba(0, 0, 0, 0.20),
        0 0 0 1px rgba(122, 154, 202, 0.10),
        0 0 0 4px rgba(6, 11, 19, 0.72);
      overflow: visible;
      cursor: ns-resize;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: transform var(--ease), box-shadow var(--ease), filter var(--ease);
    }

    .knob-shell:hover,
    .knob-shell.dragging {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow:
        inset 0 1px 0 rgba(224,240,255,0.28),
        inset 0 -10px 18px rgba(0, 0, 0, 0.54),
        0 14px 24px rgba(0, 0, 0, 0.28),
        0 0 0 4px rgba(9, 15, 26, 0.72);
    }

    .knob-shell::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(220,236,255,0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 0 0 1px rgba(120, 153, 192, 0.14),
        inset 0 -8px 12px rgba(0, 0, 0, 0.22);
      opacity: 0.9;
      pointer-events: none;
    }

    .knob-shell::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: repeating-conic-gradient(from -118deg, rgba(184, 202, 228, 0.11) 0deg 1.2deg, transparent 1.2deg 12deg);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1px));
      opacity: 0.07;
      pointer-events: none;
    }

    .knob-shell.large {
      background:
        radial-gradient(circle at 31% 23%, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0.08) 16%, transparent 42%),
        radial-gradient(circle at 50% 50%, rgba(255, 160, 62, 0.18) 0%, rgba(255, 138, 42, 0.07) 28%, rgba(255, 138, 42, 0.0) 52%),
        repeating-conic-gradient(from -6deg, rgba(196,215,242,0.02) 0deg 4deg, rgba(10,16,28,0.0) 4deg 11deg),
        radial-gradient(circle at 50% 42%, #293b53 0%, #18263a 42%, #0b1421 78%, #060b14 100%);
      box-shadow:
        inset 0 1px 0 rgba(225,240,255,0.22),
        inset 0 -12px 22px rgba(0, 0, 0, 0.52),
        0 12px 22px rgba(0, 0, 0, 0.20),
        0 0 0 1px rgba(122,154,202,0.10),
        0 0 0 5px rgba(9, 15, 26, 0.68);
    }

    .indicator {
      position: absolute;
      inset: 0;
      transform: rotate(var(--rotation, -14deg));
      transition: transform var(--ease);
      pointer-events: none;
    }

    .indicator .bloom {
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 36%, rgba(255, 179, 71, 0.28) 0%, rgba(255, 138, 42, 0.14) 26%, rgba(255, 138, 42, 0.0) 62%);
      filter: blur(6px);
      opacity: 0.98;
    }

    .indicator::before {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      background: conic-gradient(
        from 220deg,
        rgba(255, 138, 42, 0.00) 0deg 8deg,
        rgba(255, 138, 42, 0.68) 8deg 16deg,
        #ff8a2a 16deg 60deg,
        #ffb347 60deg 98deg,
        rgba(255, 179, 71, 0.14) 98deg 108deg,
        transparent 114deg 360deg
      );
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 16px), #000 calc(100% - 9px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 16px), #000 calc(100% - 9px));
      filter: drop-shadow(0 0 5px rgba(255, 138, 42, 0.26));
      opacity: 0.98;
    }

    .indicator::after {
      content: "";
      position: absolute;
      width: 13px;
      height: 22px;
      left: 50%;
      top: 16%;
      transform: translateX(-50%);
      clip-path: polygon(28% 100%, 72% 100%, 82% 24%, 50% 0%, 18% 24%);
      background: linear-gradient(180deg, rgba(255,242,218,0.98) 0%, rgba(255,222,170,0.96) 32%, rgba(255,181,97,0.92) 76%, rgba(255,138,42,0.82) 100%);
      box-shadow:
        0 0 11px rgba(255, 187, 104, 0.38),
        0 0 2px rgba(255, 244, 225, 0.84);
    }

    .large .indicator::before {
      inset: 10%;
      background: conic-gradient(
        from 220deg,
        rgba(255, 138, 42, 0.00) 0deg 10deg,
        rgba(255, 138, 42, 0.68) 10deg 20deg,
        #ff8a2a 20deg 66deg,
        #ffb347 66deg 102deg,
        rgba(255, 179, 71, 0.14) 102deg 112deg,
        transparent 118deg 360deg
      );
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 18px), #000 calc(100% - 10px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 18px), #000 calc(100% - 10px));
      filter: drop-shadow(0 0 5px rgba(255, 151, 58, 0.24));
    }

    .large .indicator::after {
      width: 14px;
      height: 32px;
      top: 12%;
      left: 50%;
      right: auto;
      transform: translateX(-50%);
      clip-path: polygon(34% 100%, 66% 100%, 84% 24%, 50% 0%, 16% 24%);
      background: linear-gradient(180deg, rgba(255,246,230,0.98) 0%, rgba(255,229,190,0.96) 34%, rgba(255,188,109,0.92) 76%, rgba(255,141,44,0.84) 100%);
      box-shadow:
        0 0 12px rgba(255, 188, 109, 0.34),
        0 0 2px rgba(255, 244, 225, 0.84);
    }

    .mini-dot {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--gold-soft) 0%, var(--gold) 100%);
      box-shadow: 0 0 0 4px rgba(255, 249, 238, 0.85);
      pointer-events: none;
    }

    .meter-title {
      position: absolute;
      left: 572px;
      top: 345px;
      width: 120px;
      margin-left: -60px;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text-soft);
      user-select: none;
    }

    .stereo-vu {
      position: absolute;
      left: 214px;
      top: 482px;
      width: 736px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .vu-wing {
      width: 250px;
      display: flex;
      align-items: center;
    }

    .vu-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(230,223,214,0.9), rgba(216,208,197,0.9));
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.7),
        inset 0 -1px 2px rgba(155,134,104,0.14);
      overflow: hidden;
    }

    .vu-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(246, 231, 181, 0.16) 0%, #f0d78e 20%, #c89a36 56%, #f2dc98 100%);
      box-shadow: 0 0 12px rgba(196, 149, 57, 0.22);
      opacity: 0.96;
    }

    .vu-fill.left {
      width: 88%;
      margin-left: auto;
      transform-origin: right center;
      animation: vuPulseLeft 2.2s ease-in-out infinite;
    }

    .vu-fill.right {
      width: 88%;
      transform-origin: left center;
      animation: vuPulseRight 2.2s ease-in-out infinite;
    }

    @keyframes vuPulseLeft {
      0%, 100% { transform: scaleX(0.62); }
      50% { transform: scaleX(1); }
    }

    @keyframes vuPulseRight {
      0%, 100% { transform: scaleX(0.58); }
      50% { transform: scaleX(0.96); }
    }

    .mode-rail {
      position: absolute;
      left: 36px;
      right: 36px;
      bottom: 26px;
      height: 78px;
      padding: 12px 24px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
      border-radius: 24px;
      border: 1px solid rgba(80, 108, 149, 0.30);
      background:
        linear-gradient(180deg, rgba(17, 27, 43, 0.76) 0%, rgba(6, 11, 20, 0.92) 100%);
      box-shadow:
        inset 0 1px 0 rgba(191, 215, 249, 0.06),
        0 10px 24px rgba(0, 0, 0, 0.14);
      z-index: 1;
    }

    .mode-rail::before {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: -1px;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(136, 169, 219, 0.10) 20%, rgba(136, 169, 219, 0.16) 50%, rgba(136, 169, 219, 0.10) 80%, rgba(255,255,255,0) 100%);
      pointer-events: none;
    }

    .mode-button {
      position: static;
      width: 100%;
      height: 50px;
      align-self: center;
      border-radius: 18px;
      border: 1px solid rgba(93, 119, 160, 0.42);
      background:
        linear-gradient(180deg, rgba(214,232,255,0.08) 0%, rgba(214,232,255,0.02) 14%, transparent 15%),
        linear-gradient(180deg, #102035 0%, #091321 100%);
      color: #b8beca;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.11em;
      cursor: pointer;
      text-shadow: none;
      box-shadow:

      color: #fff9f1;

    #depth-knob + .value {

  </style>
</head>
<body>
  <div class="stage">

          <div class="legend-item"><span class="legend-swatch" style="background: rgba(132,176,246,0.86); box-shadow: 0 0 6px rgba(132,176,246,0.24);"></span>early reflections</div>
          <div class="legend-item"><span class="legend-swatch" style="background: rgba(68,157,255,0.92); box-shadow: 0 0 7px rgba(68,157,255,0.28);"></span>reverb tail</div>

    <div class="controls-grid">

      <div class="knob-col">

        <div class="knob-shell macro-knob" id="mix-knob" data-param="mix" data-default="16">
          <div class="indicator"><div class="bloom"></div></div>

    <div class="mode-rail">
      <button class="mode-button active" data-mode="Studio" data-mode-index="0">STUDIO</button>
      <button class="mode-button" data-mode="Arena" data-mode-index="1">ARENA</button>
      <button class="mode-button" data-mode="Dream" data-mode-index="2">DREAM</button>
      <button class="mode-button" data-mode="Vintage" data-mode-index="3">VINTAGE</button>
    </div>
    </div>
  </div>

  <script>
    (function () {
      var parameterStates = {};
      var modeNames = ["Studio", "Arena", "Dream", "Vintage"];
      var macroParams = ["space", "air", "depth", "pre_delay_ms", "mix", "width"];
      var presets = {
        Studio:  { space: 18, air: 32, depth: 26, pre_delay_ms: 37.4, mix: 16, width: 38 },
        Arena:   { space: 66, air: 60, depth: 70, pre_delay_ms: 58.0, mix: 28, width: 86 },
        Dream:   { space: 84, air: 64, depth: 82, pre_delay_ms: 73.0, mix: 34, width: 90 },
        Vintage: { space: 42, air: 20, depth: 52, pre_delay_ms: 30.0, mix: 24, width: 48 }
      };

      var currentValues = {
        space: presets.Studio.space,
        air: presets.Studio.air,
        depth: presets.Studio.depth,
        pre_delay_ms: presets.Studio.pre_delay_ms,
        mix: presets.Studio.mix,
        width: presets.Studio.width
      };

      var juceAvailable = false;
      var activeDrag = null;
      var spectrumCanvas = null;
      var spectrumCtx = null;
      var spectrumAnimationId = null;
      var spectrumTime = 0;
      var SPECTRUM_BINS = 120;
      var preDelayVisualMs = 22;
      var wetOnsetVisual = 1;
      var smoothedDry = new Float32Array(SPECTRUM_BINS);
      var smoothedEarly = new Float32Array(SPECTRUM_BINS);
      var smoothedTail = new Float32Array(SPECTRUM_BINS);
      var smoothedBloom = new Float32Array(SPECTRUM_BINS);
      var particleLayers = [];
      var particleClusters = [
        { x: 0.72, y: 0.62, weight: 0.36 },
        { x: 0.79, y: 0.46, weight: 0.34 },
        { x: 0.87, y: 0.58, weight: 0.20 },
        { x: 0.93, y: 0.72, weight: 0.10 }
      ];

      function randomRange(min, max) {
        return min + (Math.random() * (max - min));
      }

      function pickClusterIndex() {
        var r = Math.random();
        var sum = 0;
        for (var i = 0; i < particleClusters.length; i += 1) {
          sum += particleClusters[i].weight;
          if (r <= sum) return i;
        }
        return particleClusters.length - 1;
      }

      function smoothstep(edge0, edge1, x) {
        var t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
        return t * t * (3 - (2 * t));
      }

      function respawnParticle(p, spec) {
        var clusterIndex = pickClusterIndex();
        var cluster = particleClusters[clusterIndex];

        p.homeX = clamp(cluster.x + randomRange(-spec.spreadX, spec.spreadX), 0.58, 0.988);
        p.homeY = clamp(cluster.y + randomRange(-spec.spreadY, spec.spreadY), 0.10, 0.94);
        p.xNorm = p.homeX + randomRange(-spec.spawnJitterX, spec.spawnJitterX);
        p.yNorm = p.homeY + randomRange(-spec.spawnJitterY, spec.spawnJitterY);
        p.size = randomRange(spec.sizeMin, spec.sizeMax);
        p.alpha = randomRange(spec.alphaMin, spec.alphaMax);
        p.phase = randomRange(0, Math.PI * 2);
        p.warmth = Math.random() < 0.34 ? randomRange(0.70, 0.98) : randomRange(0.06, 0.34);
        p.twinkle = randomRange(0.7, 1.4);
      }

      function createParticle(spec) {
        var particle = {
          xNorm: 0.8,
          yNorm: 0.5,
          homeX: 0.8,
          homeY: 0.5,
          size: randomRange(spec.sizeMin, spec.sizeMax),
          alpha: randomRange(spec.alphaMin, spec.alphaMax),
          speed: randomRange(spec.speedMin, spec.speedMax),
          drift: randomRange(spec.driftMin, spec.driftMax),
          phase: randomRange(0, Math.PI * 2),
          warmth: randomRange(0.06, 0.95),
          twinkle: randomRange(0.7, 1.4)
        };
        respawnParticle(particle, spec);
        return particle;
      }

      function initialiseParticles() {
        var layerSpecs = [
          { count: 14, sizeMin: 1.9, sizeMax: 2.9, alphaMin: 0.060, alphaMax: 0.120, speedMin: 0.00005, speedMax: 0.00011, driftMin: 0.00028, driftMax: 0.00072, spreadX: 0.040, spreadY: 0.105, spawnJitterX: 0.008, spawnJitterY: 0.024 },
          { count: 30, sizeMin: 1.15, sizeMax: 1.95, alphaMin: 0.044, alphaMax: 0.086, speedMin: 0.00004, speedMax: 0.00009, driftMin: 0.00020, driftMax: 0.00056, spreadX: 0.060, spreadY: 0.145, spawnJitterX: 0.012, spawnJitterY: 0.032 },
          { count: 56, sizeMin: 0.70, sizeMax: 1.28, alphaMin: 0.026, alphaMax: 0.056, speedMin: 0.00002, speedMax: 0.00006, driftMin: 0.00014, driftMax: 0.00038, spreadX: 0.086, spreadY: 0.205, spawnJitterX: 0.018, spawnJitterY: 0.042 }
        ];

        particleLayers = [];
        for (var li = 0; li < layerSpecs.length; li += 1) {
          var spec = layerSpecs[li];
          var layer = [];
          for (var i = 0; i < spec.count; i += 1) {
            layer.push(createParticle(spec));
          }
          particleLayers.push({ spec: spec, particles: layer });
        }
      }

      function drawParticles(ctx, W, chartTop, chartBottom, mixPct, spacePct, airPct) {
        if (!particleLayers || particleLayers.length === 0) return;

        var chartHeight = chartBottom - chartTop;
        var energy = 1.10 + (mixPct * 0.22) + (spacePct * 0.14) + (airPct * 0.12);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (var li = 0; li < particleLayers.length; li += 1) {
          var layerRef = particleLayers[li];
          var particles = layerRef.particles;
          var spec = layerRef.spec;

          for (var i = 0; i < particles.length; i += 1) {
            var p = particles[i];

            p.yNorm -= p.speed;
            if (p.yNorm < 0.10) {
              respawnParticle(p, spec);
            }

            p.xNorm += (p.homeX - p.xNorm) * 0.0038;
            p.yNorm += (p.homeY - p.yNorm) * 0.0008;

            var driftA = Math.sin((spectrumTime * 0.050) + p.phase) * p.drift;
            var driftB = Math.sin((spectrumTime * 0.021) + (p.phase * 1.34)) * p.drift * 0.38;
            var xNorm = clamp(p.xNorm + driftA + driftB, 0.58, 0.988);
            var yNorm = clamp(p.yNorm + Math.sin((spectrumTime * 0.015) + p.phase) * 0.0009, 0.10, 0.94);

            var x = xNorm * W;
            var y = chartTop + (yNorm * chartHeight);
            var breathe = 0.86 + (0.14 * (0.5 + 0.5 * Math.sin((spectrumTime * (0.095 + (p.twinkle * 0.02))) + p.phase)));

            var freqIn = smoothstep(0.54, 0.66, xNorm);
            var freqOut = 1 - smoothstep(0.975, 0.988, xNorm);
            var freqPeak = 1 - clamp(Math.abs(xNorm - 0.82) / 0.25, 0, 1);

            var clusterMask = 0;
            for (var ci = 0; ci < particleClusters.length; ci += 1) {
              var c = particleClusters[ci];
              var dx = (xNorm - c.x) / 0.075;
              var dy = (yNorm - c.y) / 0.17;
              var g = Math.exp(-((dx * dx) + (dy * dy)));
              clusterMask += g * c.weight;
            }
            clusterMask = clamp(clusterMask * 1.56, 0, 1);

            var verticalMask = 0.80 + 0.20 * (1 - clamp(Math.abs(yNorm - 0.56) / 0.56, 0, 1));
            var zone = freqIn * freqOut * (0.22 + (0.78 * freqPeak)) * clusterMask * verticalMask;
            zone = Math.max(zone, 0.62 * freqIn * freqOut);

            var twinklePeak = 0.72 + (0.28 * (0.5 + 0.5 * Math.sin((spectrumTime * (0.55 + p.twinkle)) + (p.phase * 1.8))));
            var alpha = p.alpha * breathe * twinklePeak * energy * zone;
            alpha = Math.max(alpha, 0.08);
            var core = p.size * (2.30 + p.warmth * 0.64);
            var halo = core * (5.2 + (1 - p.warmth) * 2.7);

            var orb = ctx.createRadialGradient(x, y, 0, x, y, halo);
            orb.addColorStop(0, "rgba(244,250,255," + (alpha * (0.64 + (1 - p.warmth) * 0.16)).toFixed(4) + ")");
            orb.addColorStop(0.10, "rgba(169,212,255," + (alpha * (0.34 + (1 - p.warmth) * 0.22)).toFixed(4) + ")");
            orb.addColorStop(0.26, "rgba(255,193,112," + (alpha * (0.12 + p.warmth * 0.26)).toFixed(4) + ")");
            orb.addColorStop(0.62, "rgba(100,154,255," + (alpha * (0.07 + (1 - p.warmth) * 0.08)).toFixed(4) + ")");
            orb.addColorStop(1, "rgba(255,176,112,0)");

            ctx.fillStyle = orb;
            ctx.beginPath();
            ctx.arc(x, y, halo, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(247,250,255," + (alpha * (0.56 + (1 - p.warmth) * 0.22)).toFixed(4) + ")";
            ctx.beginPath();
            ctx.arc(x, y, core, 0, Math.PI * 2);
            ctx.fill();

            // Extra crisp star core to keep particles visible at smaller canvas scales.
            ctx.fillStyle = "rgba(255,248,226," + (alpha * (0.78 + p.warmth * 0.14)).toFixed(4) + ")";
            ctx.beginPath();
            ctx.arc(x, y, Math.max(0.8, core * 0.20), 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Accent sparkle layer ensures visible stars in the upper-right wet region.
        var accentCount = 30;
        var accentEnergy = 0.40 + (mixPct * 0.20) + (airPct * 0.22);
        for (var si = 0; si < accentCount; si += 1) {
          var sn = si / accentCount;
          var px = W * (0.66 + sn * 0.30) + Math.sin((spectrumTime * 0.55) + (si * 1.7)) * (5 + si * 0.1);
          var pyNorm = 0.22 + (0.56 * (0.5 + 0.5 * Math.sin((spectrumTime * 0.82) + (si * 1.13))));
          var py = chartTop + pyNorm * chartHeight;
          var pulse = 0.66 + (0.34 * (0.5 + 0.5 * Math.sin((spectrumTime * 1.25) + (si * 2.1))));
          var pa = accentEnergy * pulse;
          var pr = 1.7 + (si % 3) * 0.45;

          var star = ctx.createRadialGradient(px, py, 0, px, py, pr * 5.8);
          star.addColorStop(0, "rgba(255,238,188," + (pa * 0.92).toFixed(4) + ")");
          star.addColorStop(0.25, "rgba(171,216,255," + (pa * 0.42).toFixed(4) + ")");
          star.addColorStop(1, "rgba(171,216,255,0)");
          ctx.fillStyle = star;
          ctx.beginPath();
          ctx.arc(px, py, pr * 5.8, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(255,248,220," + (pa * 1.00).toFixed(4) + ")";
          ctx.beginPath();
          ctx.arc(px, py, pr * 0.75, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function clamp(value, min, max) {
        var safeMin = typeof min === "number" ? min : 0;
        var safeMax = typeof max === "number" ? max : 100;
        return Math.min(safeMax, Math.max(safeMin, value));
      }

      function moveCaretToEnd(element) {
        if (!window.getSelection || !document.createRange) return;

        var selection = window.getSelection();
        var range = document.createRange();
        range.selectNodeContents(element);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function getDataAttribute(element, name) {
        if (!element) return "";
        if (element.dataset && Object.prototype.hasOwnProperty.call(element.dataset, name)) {
          return element.dataset[name];
        }
        return element.getAttribute("data-" + name) || "";
      }

      function percentToPreDelayMs(percent) {
        var p = clamp(Number(percent) || 0, 0, 100);
        if (p <= 20) return (p / 20) * 12;
        if (p <= 60) return 12 + ((p - 20) / 40) * 23;
        return 35 + ((p - 60) / 40) * 85;
      }

      function preDelayMsToPercent(ms) {
        var t = clamp(Number(ms) || 0, 0, 120);
        if (t <= 12) return (t / 12) * 20;
        if (t <= 35) return 20 + ((t - 12) / 23) * 40;
        return 60 + ((t - 35) / 85) * 40;
      }

      function updateVisual(param, percent) {
        var safeValue = clamp(Number(percent) || 0);
        var knob = document.getElementById(param + "-knob");
        var readout = document.getElementById(param + "-value");

        currentValues[param] = safeValue;

        if (knob) {
          var indicator = knob.querySelector(".indicator");
          var rotation = -120 + (safeValue / 100) * 240;
          if (indicator && indicator.style) {
            indicator.style.setProperty("--rotation", rotation + "deg");
          }
        }

        if (readout && document.activeElement !== readout) {
          if (param === "pre_delay_ms") {
            readout.textContent = String(Math.round(percentToPreDelayMs(safeValue) * 10) / 10) + " ms";
          } else {
            readout.textContent = String(Math.round(safeValue)) + "%";
          }
        }
      }

      function createListenerList() {
        return {
          listeners: [],
          addListener: function (fn) {
            this.listeners.push(fn);
            return this.listeners.length - 1;
          },
          callListeners: function (payload) {
            for (var i = 0; i < this.listeners.length; i += 1) {
              this.listeners[i](payload);
            }
          }
        };
      }

      function createSliderState(name) {
        if (!juceAvailable || !window.__JUCE__ || !window.__JUCE__.backend) return null;

        var backend = window.__JUCE__.backend;
        var state = {
          name: name,
          identifier: "__juce__slider" + name,
          scaledValue: 0,
          properties: {
            start: 0,
            end: 1,
            skew: 1,
            interval: 0,
            numSteps: 100
          },
          valueChangedEvent: createListenerList(),
          getNormalisedValue: function () {
            var start = typeof this.properties.start === "number" ? this.properties.start : 0;
            var end = typeof this.properties.end === "number" ? this.properties.end : 1;
            var range = end - start;

            if (range === 0) return 0;
            return clamp((this.scaledValue - start) / range, 0, 1);
          },
          setNormalisedValue: function (newValue) {
            var normalised = clamp(newValue, 0, 1);
            var start = typeof this.properties.start === "number" ? this.properties.start : 0;
            var end = typeof this.properties.end === "number" ? this.properties.end : 1;
            var interval = typeof this.properties.interval === "number" ? this.properties.interval : 0;
            var scaled = start + (normalised * (end - start));

            if (interval > 0) {
              scaled = Math.round(scaled / interval) * interval;
            }

            this.scaledValue = scaled;
            backend.emitEvent(this.identifier, {
              eventType: "valueChanged",
              value: scaled
            });
          },
          sliderDragStarted: function () {
            backend.emitEvent(this.identifier, { eventType: "sliderDragStarted" });
          },
          sliderDragEnded: function () {
            backend.emitEvent(this.identifier, { eventType: "sliderDragEnded" });
          }
        };

        backend.addEventListener(state.identifier, function (event) {
          if (!event) return;

          if (event.eventType === "valueChanged") {
            if (typeof event.value === "number") {
              state.scaledValue = event.value;
            }
            state.valueChangedEvent.callListeners(event);
          }

          if (event.eventType === "propertiesChanged") {
            var updatedProperties = {};
            for (var key in event) {
              if (Object.prototype.hasOwnProperty.call(event, key) && key !== "eventType") {
                updatedProperties[key] = event[key];
              }
            }
            state.properties = updatedProperties;
          }
        });

        backend.emitEvent(state.identifier, { eventType: "requestInitialUpdate" });
        return state;
      }

      function pushToBackend(param, percent, useGesture) {
        var state = parameterStates[param];
        if (!state) return;

        try {
          var normalisedValue = clamp(percent) / 100;
          if (param === "pre_delay_ms") {
            var preMs = percentToPreDelayMs(percent);
            var start = typeof state.properties.start === "number" ? state.properties.start : 0;
            var end = typeof state.properties.end === "number" ? state.properties.end : 120;
            var range = end - start;
            normalisedValue = range !== 0 ? clamp((preMs - start) / range, 0, 1) : 0;
          }

          if (useGesture) state.sliderDragStarted();
          state.setNormalisedValue(normalisedValue);
          if (useGesture) state.sliderDragEnded();
        } catch (error) {
          console.warn("Failed to update " + param + ":", error && error.message ? error.message : error);
        }
      }

      function setParamPercent(param, percent, options) {
        var safeValue = clamp(percent);
        var settings = options || {};

        updateVisual(param, safeValue);

        if (settings.pushToBackend) {
          pushToBackend(param, safeValue, !!settings.useGesture);
        }
      }

      function setActiveMode(modeName) {
        var buttons = document.querySelectorAll(".mode-button");
        Array.prototype.forEach.call(buttons, function (button) {
          button.classList.toggle("active", getDataAttribute(button, "mode") === modeName);
        });
      }

      function applyPreset(modeName, pushModeToBackend) {
        var preset = presets[modeName];
        var shouldPush = pushModeToBackend !== false;

        if (!preset) return;

        setActiveMode(modeName);

        Array.prototype.forEach.call(macroParams, function (param) {
          setParamPercent(param, preset[param], { pushToBackend: shouldPush });
        });

        if (shouldPush && parameterStates.nova_mode) {
          try {
            var modeIndex = modeNames.indexOf(modeName);
            parameterStates.nova_mode.setNormalisedValue(modeIndex / (modeNames.length - 1));
          } catch (error) {
            console.warn("Failed to set mode:", error && error.message ? error.message : error);
          }
        }
      }

      function initialiseParameterStates() {
        if (!juceAvailable) return;

        Array.prototype.forEach.call(macroParams.concat(["nova_mode"]), function (param) {
          parameterStates[param] = createSliderState(param);
        });

        Array.prototype.forEach.call(macroParams, function (param) {
          var state = parameterStates[param];
          if (!state || !state.valueChangedEvent) return;

          state.valueChangedEvent.addListener(function () {
            if (param === "pre_delay_ms") {
              var start = typeof state.properties.start === "number" ? state.properties.start : 0;
              var end = typeof state.properties.end === "number" ? state.properties.end : 120;
              var preMs = start + state.getNormalisedValue() * (end - start);
              updateVisual(param, preDelayMsToPercent(preMs));
            } else {
              updateVisual(param, state.getNormalisedValue() * 100);
            }
          });
        });

        if (parameterStates.nova_mode && parameterStates.nova_mode.valueChangedEvent) {
          parameterStates.nova_mode.valueChangedEvent.addListener(function () {
            var modeIndex = Math.round(parameterStates.nova_mode.getNormalisedValue() * (modeNames.length - 1));
            setActiveMode(modeNames[clamp(modeIndex, 0, modeNames.length - 1)]);
          });
        }

        window.setTimeout(function () {
          Array.prototype.forEach.call(macroParams, function (param) {
            var state = parameterStates[param];
            if (state) {
              if (param === "pre_delay_ms") {
                var start = typeof state.properties.start === "number" ? state.properties.start : 0;
                var end = typeof state.properties.end === "number" ? state.properties.end : 120;
                var preMs = start + state.getNormalisedValue() * (end - start);
                updateVisual(param, preDelayMsToPercent(preMs));
              } else {
                updateVisual(param, state.getNormalisedValue() * 100);
              }
            }
          });

          if (parameterStates.nova_mode) {
            var modeIndex = Math.round(parameterStates.nova_mode.getNormalisedValue() * (modeNames.length - 1));
            setActiveMode(modeNames[clamp(modeIndex, 0, modeNames.length - 1)]);
          }
        }, 60);
      }

      function getClientY(event) {
        if (!event) return 0;
        if (event.touches && event.touches.length > 0) return event.touches[0].clientY;
        if (event.changedTouches && event.changedTouches.length > 0) return event.changedTouches[0].clientY;
        return typeof event.clientY === "number" ? event.clientY : 0;
      }

      function startDrag(param, knob, event, defaultPercent) {
        if (event && typeof event.button === "number" && event.button !== 0) return;

        if (event && event.preventDefault) event.preventDefault();
        if (event && event.stopPropagation) event.stopPropagation();

        knob.classList.add("dragging");
        activeDrag = {
          param: param,
          knob: knob,
          pointerId: event && typeof event.pointerId !== "undefined" ? event.pointerId : null,
          startY: getClientY(event),
          startValue: typeof currentValues[param] === "number" ? currentValues[param] : defaultPercent
        };

        if (typeof knob.setPointerCapture === "function" && event && typeof event.pointerId !== "undefined") {
          try {
            knob.setPointerCapture(event.pointerId);
          } catch (error) {
            console.warn(error && error.message ? error.message : error);
          }
        }

        if (parameterStates[param]) {
          try {
            parameterStates[param].sliderDragStarted();
          } catch (error) {
            console.warn(error && error.message ? error.message : error);
          }
        }
      }

      function updateActiveDrag(event) {
        if (!activeDrag) return;
        if (activeDrag.pointerId !== null && event && typeof event.pointerId !== "undefined" && event.pointerId !== activeDrag.pointerId) {
          return;
        }

        if (event && event.preventDefault) event.preventDefault();

        var deltaY = activeDrag.startY - getClientY(event);
        var nextValue = clamp(activeDrag.startValue + (deltaY * 0.45));
        setParamPercent(activeDrag.param, nextValue, { pushToBackend: true });
      }

      function finishActiveDrag(event) {
        if (!activeDrag) return;
        if (activeDrag.pointerId !== null && event && typeof event.pointerId !== "undefined" && event.pointerId !== activeDrag.pointerId) {
          return;
        }

        if (parameterStates[activeDrag.param]) {
          try {
            parameterStates[activeDrag.param].sliderDragEnded();
          } catch (error) {
            console.warn(error && error.message ? error.message : error);
          }
        }

        if (typeof activeDrag.knob.releasePointerCapture === "function" && activeDrag.pointerId !== null) {
          try {
            activeDrag.knob.releasePointerCapture(activeDrag.pointerId);
          } catch (error) {
            console.warn(error && error.message ? error.message : error);
          }
        }

        activeDrag.knob.classList.remove("dragging");
        activeDrag = null;
      }

      function initialiseKnobs() {
        var knobs = document.querySelectorAll(".macro-knob");

        Array.prototype.forEach.call(knobs, function (knob) {
          var param = getDataAttribute(knob, "param");
          var defaultPercent = Number(getDataAttribute(knob, "default") || 0);

          updateVisual(param, typeof currentValues[param] === "number" ? currentValues[param] : defaultPercent);

          var startHandler = function (event) {
            startDrag(param, knob, event, defaultPercent);
          };

          knob.addEventListener("pointerdown", startHandler);
          knob.addEventListener("mousedown", startHandler);
          knob.addEventListener("touchstart", startHandler, { passive: false });

          knob.addEventListener("dblclick", function () {
            setParamPercent(param, defaultPercent, { pushToBackend: true });
          });
        });

        document.addEventListener("pointermove", updateActiveDrag);
        document.addEventListener("mousemove", updateActiveDrag);
        document.addEventListener("touchmove", updateActiveDrag, { passive: false });

        document.addEventListener("pointerup", finishActiveDrag);
        document.addEventListener("mouseup", finishActiveDrag);
        document.addEventListener("touchend", finishActiveDrag);
        document.addEventListener("pointercancel", finishActiveDrag);
        document.addEventListener("touchcancel", finishActiveDrag);
        document.addEventListener("mouseleave", finishActiveDrag);
      }

      function initialiseReadouts() {
        var readouts = document.querySelectorAll(".editable-value");

        Array.prototype.forEach.call(readouts, function (readout) {
          var param = getDataAttribute(readout, "param");

          readout.addEventListener("focus", function () {
            if (param === "pre_delay_ms") {
              readout.textContent = String(Math.round(percentToPreDelayMs(typeof currentValues[param] === "number" ? currentValues[param] : 0) * 10) / 10);
            } else {
              readout.textContent = String(Math.round(typeof currentValues[param] === "number" ? currentValues[param] : 0));
            }
            moveCaretToEnd(readout);
          });

          readout.addEventListener("input", function () {
            var cleaned = readout.textContent.replace(/[^0-9.]/g, "");
            if (readout.textContent !== cleaned) {
              readout.textContent = cleaned;
              moveCaretToEnd(readout);
            }
          });

          readout.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
              event.preventDefault();
              readout.blur();
            }

            if (event.key === "Escape") {
              event.preventDefault();
              updateVisual(param, typeof currentValues[param] === "number" ? currentValues[param] : 0);
              readout.blur();
            }
          });

          readout.addEventListener("blur", function () {
            var raw = readout.textContent.replace(/[^0-9.]/g, "");
            var nextValue;
            if (raw === "") {
              nextValue = typeof currentValues[param] === "number" ? currentValues[param] : 0;
            } else if (param === "pre_delay_ms") {
              nextValue = preDelayMsToPercent(clamp(Number(raw), 0, 120));
            } else {
              nextValue = clamp(Number(raw));
            }
            setParamPercent(param, nextValue, { pushToBackend: true });
          });
        });
      }

      function initialiseModeButtons() {
        var buttons = document.querySelectorAll(".mode-button");

        Array.prototype.forEach.call(buttons, function (button) {
          var clickHandler = function (event) {
            if (event && event.preventDefault) event.preventDefault();
            applyPreset(getDataAttribute(button, "mode"), true);
          };

          button.addEventListener("click", clickHandler);
          button.addEventListener("touchend", clickHandler);
        });
      }

      function resizeSpectrumCanvas() {
        if (!spectrumCanvas) return;
        var frame = spectrumCanvas.parentElement;
        if (!frame) return;
        spectrumCanvas.width = frame.clientWidth;
        spectrumCanvas.height = frame.clientHeight;
      }

      function generateSpectrumFrame() {
        var spacePct = currentValues.space / 100;
        var airPct = currentValues.air / 100;
        var depthPct = currentValues.depth / 100;
        var prePct = currentValues.pre_delay_ms / 100;
        var widthPct = currentValues.width / 100;
        var mixPct = currentValues.mix / 100;
        var preMs = percentToPreDelayMs(currentValues.pre_delay_ms);
        preDelayVisualMs = preMs;

        var pulsePeriod = 1.30;
        var pulsePos = spectrumTime % pulsePeriod;
        var onsetStart = 0.08 + (prePct * 0.28);
        var onsetRise = 0.14 + (prePct * 0.08);
        var onsetT = clamp((pulsePos - onsetStart) / onsetRise, 0, 1);
        wetOnsetVisual = onsetT * onsetT * (3 - (2 * onsetT));
        var wetOnsetGain = 0.42 + (0.58 * wetOnsetVisual);
        var t0 = spectrumTime;

        for (var i = 0; i < SPECTRUM_BINS; i += 1) {
          var f = i / (SPECTRUM_BINS - 1);

          var drySlope = 0.48 * Math.pow(1 - f, 0.56);
          var dryPeakLow = 0.22 * Math.exp(-Math.pow(f - 0.20, 2) / 0.0046);
          var dryPeakMid = 0.14 * Math.exp(-Math.pow(f - 0.43, 2) / 0.0104);
          var dryMotion = 0.016 * Math.sin(t0 * 0.8 + f * 12.0);
          var rawDry = clamp(drySlope + dryPeakLow + dryPeakMid + dryMotion, 0, 1);

          var earlyBody = (0.082 + 0.064 * spacePct) * Math.exp(-Math.pow(f - (0.22 + 0.05 * spacePct), 2) / (0.028 + depthPct * 0.02));
          var earlyShelf = 0.034 * Math.pow(1 - Math.abs(f - 0.26) / 0.34, 2);
          var prePosition = clamp((f - (0.05 + prePct * 0.16)) / 0.20, 0, 1);
          var preGate = prePosition * prePosition * (3 - (2 * prePosition));
          var rawEarly = clamp((earlyBody + earlyShelf) * preGate * (0.74 - 0.22 * depthPct), 0, 1);

          var tailShelf = (0.050 + 0.050 * spacePct) * Math.exp(-Math.pow(f - 0.18, 2) / 0.034);
          var tailAir = (0.014 + 0.030 * airPct) * Math.exp(-Math.pow(f - 0.78, 2) / 0.018);
          var tailBed = 0.022 * Math.pow(1 - f, 1.1);
          var rawTail = clamp((tailShelf + tailAir + tailBed) * (0.90 + 0.08 * Math.sin(t0 * 0.9 + f * 8.0)) * wetOnsetGain, 0, 1);

          var bloomShape = Math.exp(-Math.pow(f - (0.30 + widthPct * 0.08), 2) / (0.028 + widthPct * 0.02));
          var rawBloom = clamp(bloomShape * (0.020 + mixPct * 0.030 + depthPct * 0.018) * wetOnsetGain, 0, 1);

          smoothedDry[i] = smoothedDry[i] + (rawDry - smoothedDry[i]) * 0.16;
          smoothedEarly[i] = smoothedEarly[i] + (rawEarly - smoothedEarly[i]) * 0.12;
          smoothedTail[i] = smoothedTail[i] + (rawTail - smoothedTail[i]) * 0.10;
          smoothedBloom[i] = smoothedBloom[i] + (rawBloom - smoothedBloom[i]) * 0.08;
        }
      }

      function drawSpectrumFrame() {
        if (!spectrumCtx || !spectrumCanvas) return;
        var ctx = spectrumCtx;
        var W = spectrumCanvas.width;
        var H = spectrumCanvas.height;
        var chartTop = 12;
        var chartBottom = H - 22;
        var chartHeight = chartBottom - chartTop;
        var depthPct = currentValues.depth / 100;
        var spacePct = currentValues.space / 100;
        var widthPct = currentValues.width / 100;
        var airPct = currentValues.air / 100;
        var mixPct = currentValues.mix / 100;
        var prePct = currentValues.pre_delay_ms / 100;
        var spreadPx = 4 + widthPct * 10;

        ctx.clearRect(0, 0, W, H);

        var bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, "#07101d");
        bg.addColorStop(1, "#030913");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        var hazeAlpha = 0.03 + depthPct * 0.12;
        var hazeRadius = H * (0.44 + depthPct * 0.46);
        var hazeA = ctx.createRadialGradient(W * 0.50, H * 0.12, H * 0.04, W * 0.50, H * 0.12, hazeRadius);
        hazeA.addColorStop(0, "rgba(76,132,224," + (hazeAlpha * 0.9).toFixed(3) + ")");
        hazeA.addColorStop(1, "rgba(76,132,224,0)");
        ctx.fillStyle = hazeA;
        ctx.fillRect(0, 0, W, H);

        var hazeB = ctx.createRadialGradient(W * 0.70, H * 0.70, H * 0.02, W * 0.70, H * 0.70, H * 0.34);
        hazeB.addColorStop(0, "rgba(41,85,176," + (0.02 + airPct * 0.05).toFixed(3) + ")");
        hazeB.addColorStop(1, "rgba(41,85,176,0)");
        ctx.fillStyle = hazeB;
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = "rgba(160,188,222,0.075)";
        ctx.lineWidth = 1;
        var gridFreqs = [0.07, 0.18, 0.34, 0.5, 0.66, 0.8, 0.93];
        for (var gi = 0; gi < gridFreqs.length; gi += 1) {
          var gx = Math.round(gridFreqs[gi] * W) + 0.5;
          ctx.beginPath();
          ctx.moveTo(gx, chartTop);
          ctx.lineTo(gx, chartBottom);
          ctx.stroke();
        }

        var binW = W / SPECTRUM_BINS;

        ctx.beginPath();
        for (var e2 = 0; e2 < SPECTRUM_BINS; e2 += 1) {
          var ex2 = e2 * binW + binW * 0.5;
          var es2 = ((ex2 / W) - 0.5) * 2;
          ex2 += es2 * spreadPx * 0.18;
          var eh2 = smoothedEarly[e2] * chartHeight * 0.44;
          if (e2 === 0) ctx.moveTo(ex2, chartBottom - eh2);
          else ctx.lineTo(ex2, chartBottom - eh2);
        }
        ctx.strokeStyle = "rgba(133,178,241,0.76)";
        ctx.lineWidth = 1.0;
        ctx.shadowColor = "rgba(118,162,234,0.20)";
        ctx.shadowBlur = 4;
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.beginPath();
        ctx.moveTo(0, chartBottom);
        for (var t = 0; t < SPECTRUM_BINS; t += 1) {
          var tx = t * binW + binW * 0.5;
          var ts = ((tx / W) - 0.5) * 2;
          tx += ts * spreadPx;
          var th = smoothedTail[t] * chartHeight * 0.26;
          ctx.lineTo(tx, chartBottom - th);
        }
        ctx.lineTo(W, chartBottom);
        ctx.closePath();
        var tailGrad = ctx.createLinearGradient(0, 0, 0, H);
        tailGrad.addColorStop(0, "rgba(54,140,255,0.10)");
        tailGrad.addColorStop(0.5, "rgba(54,140,255,0.04)");
        tailGrad.addColorStop(1, "rgba(54,140,255,0)");
        ctx.fillStyle = tailGrad;
        ctx.fill();

        ctx.beginPath();
        for (var l = 0; l < SPECTRUM_BINS; l += 1) {
          var lx = l * binW + binW * 0.5;
          var ls = ((lx / W) - 0.5) * 2;
          lx += ls * spreadPx;
          var lh = smoothedTail[l] * chartHeight * 0.26;
          if (l === 0) ctx.moveTo(lx, chartBottom - lh);
          else ctx.lineTo(lx, chartBottom - lh);
        }
        ctx.strokeStyle = "rgba(58,156,255,0.82)";
        ctx.lineWidth = 1.25;
        ctx.shadowColor = "rgba(58,156,255,0.18)";
        ctx.shadowBlur = 4;
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.beginPath();
        for (var b = 0; b < SPECTRUM_BINS; b += 1) {
          var bx = b * binW + binW * 0.5;
          var bh = smoothedBloom[b] * chartHeight * 0.26;
          if (b === 0) ctx.moveTo(bx, chartBottom - bh);
          else ctx.lineTo(bx, chartBottom - bh);
        }
        ctx.strokeStyle = "rgba(122, 86, 216, 0.58)";
        ctx.lineWidth = 0.9;
        ctx.shadowColor = "rgba(122, 86, 216, 0.12)";
        ctx.shadowBlur = 3;
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.beginPath();
        for (var d = 0; d < SPECTRUM_BINS; d += 1) {
          var dx = d * binW + binW * 0.5;
          var dh = smoothedDry[d] * chartHeight * 0.64;
          if (d === 0) ctx.moveTo(dx, chartBottom - dh);
          else ctx.lineTo(dx, chartBottom - dh);
        }
        ctx.strokeStyle = "rgba(255,168,77,0.98)";
        ctx.lineWidth = 2.4;
        ctx.shadowColor = "rgba(255,138,42,0.20)";
        ctx.shadowBlur = 4;
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.globalCompositeOperation = "screen";
        drawParticles(ctx, W, chartTop, chartBottom, mixPct, spacePct, airPct);
        ctx.globalCompositeOperation = "source-over";
      }

      function renderSpectrum() {
        spectrumTime += 0.016;
        generateSpectrumFrame();
        drawSpectrumFrame();
        spectrumAnimationId = window.requestAnimationFrame(renderSpectrum);
      }

      function initialiseSpectrum() {
        spectrumCanvas = document.getElementById("space-canvas");
        if (!spectrumCanvas) return;
        spectrumCtx = spectrumCanvas.getContext("2d");
        if (!spectrumCtx) return;
        resizeSpectrumCanvas();
        initialiseParticles();
        window.addEventListener("resize", resizeSpectrumCanvas);
        if (spectrumAnimationId) window.cancelAnimationFrame(spectrumAnimationId);
        renderSpectrum();
      }

      function bootUi() {
        juceAvailable = !!(window.__JUCE__ && window.__JUCE__.backend && typeof window.__JUCE__.backend.emitEvent === "function");

        initialiseKnobs();
        initialiseReadouts();
        initialiseModeButtons();
        initialiseSpectrum();

        if (juceAvailable) {
          try {
            initialiseParameterStates();
          } catch (error) {
            juceAvailable = false;
            console.warn("Parameter sync unavailable, keeping local UI active:", error && error.message ? error.message : error);
            applyPreset("Studio", false);
          }
        } else {
          applyPreset("Studio", false);
        }

        document.body.setAttribute("data-ui-ready", "true");
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", bootUi, { once: true });
      } else {
        bootUi();
      }
    }());
  </script>
</body>
</html>
